[recipe.standard.ingredients]
items = [
    "2 cans (160g each) tuna in water, drained",
    "2 large whole wheat flour tortillas (10-inch/25cm)",
    "2 tbsp mayonnaise",
    "1 tsp Dijon mustard",
    "1/2 celery stalk, finely diced",
    "1/4 red onion, finely diced",
    "4 romaine lettuce leaves",
    "1 medium tomato, sliced",
    "1/4 cucumber, sliced thin",
    "Salt, black pepper, and lemon juice to taste",
    "Optional: hot sauce or pickle slices"
]

[recipe.standard.instructions]
steps = [
    "Drain tuna cans thoroughly — press the lid against the tuna and squeeze out all liquid.",
    "In a bowl, combine tuna with mayonnaise, mustard, celery, and red onion. Season with salt, pepper, and a squeeze of lemon juice. Mix well.",
    "Lay tortilla flat on a clean surface. Place 2 romaine leaves in the center, leaving 2 inches of border on all sides.",
    "Spoon half the tuna mixture onto the lettuce. Add tomato slices and cucumber.",
    "Fold the two side edges inward, then roll tightly from the bottom edge upward.",
    "Cut diagonally in half. Serve immediately or wrap in foil for later."
]

