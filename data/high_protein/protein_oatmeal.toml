[metadata]
doc_id = "high_protein_protein_oatmeal"
cuisine = "Fitness"
dish_name = "Protein Oatmeal"
alternate_names = ["Proats", "Protein Porridge", "Muscle Oats"]
category = "breakfast"
tags = ["breakfast", "high_protein", "fitness", "meal_prep", "vegetarian", "contains_dairy", "contains_gluten"]
allergens = ["gluten", "dairy"]
difficulty = "easy"
total_time_minutes = 10

[recipe.standard]
serving_size = "1 bowl (approximately 350g cooked)"
servings_per_recipe = 1
prep_time_minutes = 2
cook_time_minutes = 8

[recipe.standard.ingredients]
items = [
    "1/2 cup rolled oats",
    "1 cup low-fat milk (or water + splash of milk)",
    "1 scoop (30g) vanilla whey protein powder",
    "1 ripe banana, sliced",
    "1 tbsp natural peanut butter",
    "1 tsp honey",
    "1/2 tsp cinnamon",
    "Pinch of salt",
    "Optional toppings: chopped walnuts, extra banana slices, drizzle of peanut butter"
]

[recipe.standard.instructions]
steps = [
    "Combine oats, milk, cinnamon, and salt in a small saucepan over medium heat.",
    "Stir frequently and cook 5-7 minutes until oats are creamy and have absorbed most of the liquid.",
    "Remove from heat. This step is critical: let the oatmeal cool slightly for 1-2 minutes before adding protein powder — adding whey to boiling liquid can make it lumpy and rubbery.",
    "Stir in protein powder until fully dissolved and smooth.",
    "Transfer to a bowl. Top with sliced banana and peanut butter.",
    "Drizzle honey over the top. Add optional toppings if desired and serve immediately."
]

