    "The night before: combine oats, casein powder, chia seeds, almond milk, Greek yogurt, cinnamon, vanilla, and sweetener in a jar or container with a lid.",
    "Stir thoroughly until protein powder is fully incorporated — no dry pockets.",
    "Seal and refrigerate overnight (at least 6 hours). The chia seeds and oats will absorb the liquid.",
    "In the morning: remove from fridge, give it a stir. The texture should be thick like pudding.",
    "Add a splash of almond milk if you prefer a looser consistency.",
    "Top with mixed berries and serve cold — or microwave 1-2 minutes if you prefer warm."
