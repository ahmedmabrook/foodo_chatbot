[metadata]
doc_id = "high_protein_egg_white_omelette"
cuisine = "Fitness"
dish_name = "Egg White Omelette"
alternate_names = ["Egg White Omelette", "White Omelette", "Fitness Omelette"]
category = "breakfast"
tags = ["breakfast", "high_protein", "low_fat", "fitness", "keto_friendly", "contains_eggs", "contains_dairy"]
allergens = ["eggs", "dairy"]
difficulty = "easy"
total_time_minutes = 15

[recipe.standard]
serving_size = "1 large omelette (approximately 280g)"
servings_per_recipe = 1
prep_time_minutes = 5
cook_time_minutes = 10

[recipe.standard.ingredients]
items = [
    "4 large eggs (whole)",
    "1 tbsp olive oil",
    "1/2 cup baby spinach",
    "1/4 cup cherry tomatoes, halved",
    "1/4 cup mushrooms, sliced",
    "1/4 cup red bell pepper, diced",
    "30g (1 oz) shredded mozzarella or cheddar cheese",
    "Salt and black pepper to taste",
    "Fresh herbs (chives, parsley) for garnish"
]

[recipe.standard.instructions]
steps = [
    "Whisk eggs in a bowl with salt and pepper until well combined and slightly frothy.",
    "Heat 1/2 tbsp olive oil in a non-stick pan over medium heat. Add mushrooms and bell pepper; sauté 3 minutes until softened.",
    "Add spinach and tomatoes; cook 1 more minute until spinach wilts. Remove vegetables and set aside.",
    "Wipe the pan clean, add remaining olive oil, and heat over medium heat (325°F/160°C).",
    "Pour in whisked eggs. As edges begin to set, use a spatula to gently push edges toward center, tilting pan so uncooked egg flows to the edges.",
    "When the surface is nearly set but still slightly glossy, add cheese and cooked vegetables to one half.",
    "Fold omelette in half over the filling. Slide onto a plate.",
    "Garnish with fresh herbs and serve immediately."
]

[recipe.standard.macros]
calories = 320
protein_g = 28
carbs_g = 6
fat_g = 20
fiber_g = 2
sugar_g = 3
sodium_mg = 380
