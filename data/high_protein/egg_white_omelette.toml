[recipe.healthy_variant.ingredients]
items = [
    "6 large egg whites (or 200ml carton egg whites)",
    "60g (2 oz) lean turkey breast, diced or sliced",
    "1 cup baby spinach",
    "1/4 cup cherry tomatoes, halved",
    "1/4 cup mushrooms, sliced",
    "1/4 cup onion, finely diced",
    "Cooking spray",
    "Salt, black pepper, garlic powder to taste",
    "Fresh chives for garnish"
]

[recipe.healthy_variant.instructions]
steps = [
    "Season egg whites with salt, pepper, and garlic powder. Whisk vigorously until very frothy — this adds volume.",
    "Spray a non-stick pan with cooking spray and heat over medium heat.",
    "Add turkey and onion; cook 3-4 minutes until turkey is cooked through and onion is translucent.",
    "Add mushrooms and spinach; cook 1 more minute. Add tomatoes and stir briefly. Remove everything and set aside.",
    "Re-spray pan. Pour in egg whites over medium-low heat (300°F/150°C). Egg whites cook faster than whole eggs — watch carefully.",
    "As the edges set, gently fold them toward center. The whites will look slightly different from whole eggs — more uniform white, less golden.",
    "When surface is just set (not wet), add turkey-vegetable filling to one half.",
    "Fold and slide onto plate. Garnish with chives."
]

