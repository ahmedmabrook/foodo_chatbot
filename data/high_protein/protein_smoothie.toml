[recipe.standard.ingredients]
items = [
    "1 scoop (30g) vanilla whey protein powder",
    "1 ripe banana (fresh or frozen)",
    "1 cup whole milk",
    "1 tbsp natural peanut butter",
    "1/4 cup rolled oats",
    "1 tbsp honey",
    "1/2 cup ice cubes",
    "Optional: 1 tsp cocoa powder for chocolate flavour"
]

[recipe.standard.instructions]
steps = [
    "Add all ingredients to blender in this order: liquid first (milk), then soft ingredients (banana, peanut butter, honey), then dry (oats, protein powder), then ice last.",
    "Blend on high for 45-60 seconds until completely smooth.",
    "Check consistency: if too thick, add a splash of milk. If too thin, add more frozen banana or a few ice cubes.",
    "Pour into a large glass and drink immediately — protein smoothies are best consumed fresh.",
    "Post-workout timing: drink within 30-45 minutes of training for optimal muscle protein synthesis."
]

