[metadata]
doc_id = "high_protein_protein_pancakes"
cuisine = "Fitness"
dish_name = "Protein Pancakes"
alternate_names = ["Whey Pancakes", "Macro Pancakes", "Fitness Pancakes"]
category = "breakfast"
tags = ["breakfast", "high_protein", "fitness", "post_workout", "contains_dairy", "contains_eggs", "contains_gluten"]
allergens = ["gluten", "dairy", "eggs"]
difficulty = "easy"
total_time_minutes = 20

[recipe.standard]
serving_size = "3 pancakes (approximately 230g)"
servings_per_recipe = 4
prep_time_minutes = 5
cook_time_minutes = 15

[recipe.standard.ingredients]
items = [
    "1 cup rolled oats (blended into oat flour)",
    "1 scoop (30g) vanilla whey protein powder",
    "1 tsp baking powder",
    "1/4 tsp salt",
    "1/2 tsp cinnamon",
    "2 large eggs",
    "3/4 cup low-fat milk",
    "1 tbsp honey",
    "1 tsp vanilla extract",
    "1 tbsp coconut oil (for griddle)",
    "Fresh berries and Greek yogurt for serving"
]

[recipe.standard.instructions]
steps = [
    "Blend rolled oats in a blender until a fine oat flour forms.",
    "In a bowl, whisk together oat flour, protein powder, baking powder, salt, and cinnamon.",
    "In a separate bowl, whisk eggs, milk, honey, and vanilla.",
    "Pour wet ingredients into dry and stir gently until just combined. Let rest 3 minutes — the batter will thicken slightly.",
    "Heat a non-stick griddle or pan over medium heat (350°F/175°C). Brush with coconut oil.",
    "Pour 1/4 cup batter per pancake. Cook 2-3 minutes until bubbles appear on surface and edges look dry.",
    "Flip and cook 1-2 more minutes until golden.",
    "Serve with fresh berries and a dollop of Greek yogurt."
]

