[recipe.standard.instructions]
steps = [
    "Cook rice according to package directions. White jasmine rice: bring 3 cups water to boil, add rice, cover and simmer 18 minutes.",
    "Meanwhile, season chicken breasts with paprika, cumin, salt, pepper, and a bit of garlic.",
    "Heat 1 tbsp olive oil in a grill pan or skillet over medium-high heat (400°F/200°C). Cook chicken 6-7 minutes per side until internal temperature reaches 165°F/74°C. Rest 5 minutes, then slice.",
    "In a separate pan, heat remaining olive oil over medium heat. Sauté garlic 30 seconds.",
    "Add broccoli, zucchini, and bell pepper. Stir-fry 5-6 minutes until tender-crisp. Season with salt and pepper.",
    "Assemble bowls: rice on the bottom, sliced chicken on one side, roasted vegetables on the other.",
    "Serve with lemon wedges and optional sauce."
]

