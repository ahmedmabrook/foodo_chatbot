[recipe.healthy_variant.ingredients]
items = [
    "1/2 can (120g) canned chickpeas, rinsed and drained",
    "1/2 tbsp tahini (half the typical amount)",
    "1 tbsp lemon juice (fresh)",
    "1 small garlic clove, minced",
    "1-2 tbsp cold water (to thin to desired consistency)",
    "Pinch of cumin, salt, and smoked paprika",
    "2 medium carrots, cut into sticks",
    "1/2 cucumber, cut into sticks",
    "1/2 red or yellow bell pepper, cut into strips",
    "4 radishes, halved",
    "Celery sticks"
]

[recipe.healthy_variant.instructions]
steps = [
    "Make light hummus: blend chickpeas, tahini, lemon juice, garlic, cumin, and salt in a small food processor.",
    "With processor running, add cold water 1 tbsp at a time until smooth and creamy. Cold water makes hummus lighter and fluffier.",
    "Taste and adjust — more lemon for brightness, more garlic for punch, more cumin for depth.",
    "Spoon into a small bowl and dust with paprika.",
    "Cut all vegetables into uniform dipping sticks. Bell pepper strips are particularly good dippers — they add sweetness and crunch.",
    "Arrange vegetables around hummus and serve."
