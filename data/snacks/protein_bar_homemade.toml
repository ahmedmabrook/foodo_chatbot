[metadata]
doc_id = "snack_protein_bar_homemade"
cuisine = "Snacks"
dish_name = "Homemade No-Bake Protein Bar"
alternate_names = ["DIY Protein Bar", "No-Bake Energy Bar", "Homemade Fitness Bar"]
category = "snack"
tags = ["snack", "high_protein", "meal_prep", "no_bake", "fitness", "vegetarian", "contains_nuts", "contains_dairy", "contains_gluten"]
allergens = ["gluten", "dairy", "tree_nuts", "peanuts"]
difficulty = "easy"
total_time_minutes = 20

[recipe.standard]
serving_size = "1 bar (approximately 60g)"
servings_per_recipe = 10
prep_time_minutes = 20
cook_time_minutes = 0

[recipe.standard.ingredients]
items = [
    "1 cup rolled oats",
    "2 scoops (60g) vanilla whey protein powder",
    "1/2 cup natural peanut butter",
    "1/3 cup honey",
    "1/4 cup chopped almonds",
    "2 tbsp dark chocolate chips",
    "2 tbsp ground flaxseeds",
    "1 tsp vanilla extract",
    "Pinch of salt",
    "2-4 tbsp milk (to bind, as needed)"
]

[recipe.standard.instructions]
steps = [
    "Line an 8x8 inch (20x20cm) pan with parchment paper, leaving overhang on two sides.",
    "In a large bowl, combine rolled oats, protein powder, flaxseeds, chopped almonds, and salt. Stir to distribute evenly.",
    "In a separate microwave-safe bowl, combine peanut butter and honey. Microwave 30-45 seconds until warm and pourable. Stir well.",
    "Add vanilla extract to the peanut butter mixture, then pour over the dry ingredients.",
    "Mix thoroughly. The dough should hold together when pressed — if too dry, add milk 1 tbsp at a time.",
    "Press the mixture firmly and evenly into the prepared pan. Use the bottom of a measuring cup to compact it tightly.",
    "Sprinkle dark chocolate chips over the top and press them in lightly.",
    "Refrigerate at least 1 hour until firm.",
    "Lift out using parchment overhang, cut into 10 equal bars.",
    "Store in the refrigerator for up to 1 week, or freeze individual bars for up to 1 month."
]

[recipe.standard.macros]
calories = 240
protein_g = 20
carbs_g = 22
fat_g = 8
fiber_g = 3
sugar_g = 12
sodium_mg = 110
