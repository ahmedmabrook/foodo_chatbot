cuisine = "French"
dish_name = "Quiche Lorraine"
alternate_names = ["Lorraine Quiche", "French Bacon and Cream Tart", "Tarte Lorraine"]
category = "main_course"
tags = ["comfort_food", "traditional", "contains_dairy", "contains_eggs", "contains_gluten"]
