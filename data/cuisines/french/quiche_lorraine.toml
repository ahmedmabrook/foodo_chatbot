difficulty = "medium"
total_time_minutes = 90

[recipe.standard]
serving_size = "1 slice (approximately 200g)"
servings_per_recipe = 6
prep_time_minutes = 30
cook_time_minutes = 60

[recipe.standard.ingredients]
items = [
    "Pastry: 200g all-purpose flour, 100g cold butter, 1 egg yolk, 3 tbsp ice water, pinch salt",
    "Filling: 200g lardons or thick-cut bacon, diced",
    "Filling: 4 large eggs",
    "Filling: 250ml heavy cream",
    "Filling: 100ml whole milk",
    "Filling: 80g Gruyère cheese, grated",
    "Filling: pinch of nutmeg",
    "Filling: salt and white pepper to taste"
]

[recipe.standard.instructions]
steps = [
    "Make pastry: pulse flour, cold butter, and salt in a food processor until breadcrumbs form. Add egg yolk and ice water. Pulse until dough just comes together. Form a disc, wrap, refrigerate 30 minutes.",
    "Roll pastry to fit a 23cm tart pan. Press in gently. Prick the base with a fork. Blind bake at 375°F (190°C) with weights for 15 minutes. Remove weights, bake 5 more minutes until pale golden.",
    "Cook lardons in a dry pan until rendered and lightly colored. Drain on paper towels.",
    "Whisk together eggs, cream, milk, grated Gruyère, nutmeg, salt, and pepper.",
    "Scatter lardons evenly over the blind-baked pastry shell. Pour egg cream mixture over.",
    "Bake at 350°F (175°C) for 30-35 minutes until the filling is just set with a slight wobble in the center. It will firm up as it cools.",
    "Cool 10 minutes before slicing. Serve warm or at room temperature."
]

