servings_per_recipe = 6
prep_time_minutes = 30
cook_time_minutes = 90

[recipe.standard.ingredients]
items = [
    "800g mixed firm fish (monkfish, sea bass, mullet), cut into pieces",
    "400g mussels, scrubbed",
    "300g prawns or shrimp, shell-on",
    "1 large onion, diced",
    "2 leeks, sliced",
    "4 cloves garlic, minced",
    "4 large tomatoes, diced",
    "1/2 fennel bulb, diced",
    "1/2 tsp saffron threads, soaked in 2 tbsp hot water",
    "1 cup dry white wine",
    "1.5 liters fish stock (or water with fish bones)",
    "3 tbsp olive oil",
    "1 tsp dried thyme",
    "1 bay leaf",
    "1 strip orange peel (dried or fresh)",
    "Salt and black pepper",
    "Rouille: 4 cloves garlic, 1 egg yolk, 200ml olive oil, 1/2 tsp saffron, pinch cayenne, 1 tsp lemon juice",
    "Grilled baguette slices for serving"
]

[recipe.standard.instructions]
steps = [
    "Heat olive oil in a large pot over medium heat. Sauté onion, leeks, and fennel until very soft, 10 minutes. Add garlic, cook 1 minute.",
    "Add diced tomatoes, saffron water, thyme, bay leaf, and orange peel. Cook 5 minutes.",
    "Add white wine. Cook until reduced by half.",
    "Add fish stock. Bring to a boil. Add the firmest fish pieces first (monkfish). Boil vigorously for 5 minutes — the boiling emulsifies the broth.",
    "Add medium-firm fish. Boil 3 more minutes.",
    "Add mussels and shrimp. Cook 3-4 minutes until mussels open and shrimp turn pink. Discard any mussels that don't open.",
    "Make rouille: pound garlic in a mortar. Work in egg yolk. Slowly drizzle in olive oil while stirring to create a thick emulsion. Add saffron and cayenne.",
    "Spread rouille on grilled baguette slices. Serve soup in bowls with the bread floating on top."
]

