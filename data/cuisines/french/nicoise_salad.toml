category = "salad"
tags = ["traditional", "high_protein", "gluten_free", "contains_eggs", "contains_shellfish", "healthy"]
allergens = ["eggs", "shellfish"]
difficulty = "easy"
total_time_minutes = 30

[recipe.standard]
serving_size = "1 large plate (approximately 400g)"
servings_per_recipe = 4
prep_time_minutes = 20
cook_time_minutes = 10

[recipe.standard.ingredients]
items = [
    "2 cans (160g each) tuna in olive oil, drained",
    "200g green beans (haricots verts), trimmed and blanched",
    "4 medium boiled eggs, halved",
    "200g cherry tomatoes, halved",
    "100g Niçoise olives (or Kalamata olives)",
    "4 medium boiled potatoes (waxy variety), sliced",
    "6 anchovy fillets",
    "4 tbsp extra-virgin olive oil",
    "1.5 tbsp red wine vinegar",
    "1 tsp Dijon mustard",
    "1 clove garlic, minced",
    "Salt and black pepper to taste",
    "Fresh basil leaves"
]

[recipe.standard.instructions]
steps = [
    "Boil eggs: place in cold water, bring to boil, cook 8-9 minutes for hard-boiled. Cool in ice water. Peel and halve.",
    "Blanch green beans: cook in salted boiling water for 3-4 minutes until bright green and tender-crisp. Transfer to ice water immediately. Drain.",
    "Boil potatoes until just tender, about 15 minutes. Cool and slice.",
    "Make dressing: whisk together olive oil, red wine vinegar, Dijon mustard, minced garlic, salt, and pepper.",
    "Arrange the salad: arrange green beans, potato slices, cherry tomatoes, and olives on a large platter.",
    "Place tuna in chunks on top. Arrange boiled egg halves. Lay anchovy fillets over the tuna.",
    "Drizzle dressing generously over everything. Garnish with fresh basil.",
    "Serve at room temperature — do not toss. This is a composed salad."
]

[recipe.standard.macros]
calories = 460
protein_g = 32
carbs_g = 28
fat_g = 24
fiber_g = 6
sugar_g = 4
sodium_mg = 740
