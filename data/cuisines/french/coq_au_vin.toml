[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "Burgundy or Pinot Noir wine", substitute = "Any dry table red wine or cooking wine", saving_percent = 60, reason = "Inexpensive dry red wine delivers the same braising acidity and depth without the premium price tag" },
    { original = "Pearl onions", substitute = "Regular yellow onion cut into wedges", saving_percent = 50, reason = "Wedge-cut yellow onions break down similarly during braising and cost a fraction of pearl onions" },
    { original = "Cremini mushrooms", substitute = "White button mushrooms", saving_percent = 30, reason = "Button mushrooms have a milder flavour but are widely available and far cheaper" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "Lardons", substitute = "Thick-cut bacon cut into small cubes", reason = "Regular bacon cut into cubes mimics the texture and smoky fat of lardons, available in any supermarket" },
    { original = "Bouquet garni (fresh herbs tied together)", substitute = "1 teaspoon dried thyme and 2 bay leaves added loose to the pot", reason = "Dried herbs are pantry staples that deliver the same aromatic profile without requiring fresh bundles" },
    { original = "Dutch oven", substitute = "Large oven-safe pot or deep skillet with a tight-fitting lid", reason = "Any heavy-bottomed pot that can go from stovetop to oven or maintain low heat will work" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "All-purpose flour (as thickener)", substitute = "Cornstarch slurry (1 tablespoon cornstarch + 2 tablespoons cold water)", reason = "Cornstarch is a common pantry item and produces a glossy, clear sauce rather than an opaque one" },
    { original = "Chicken stock (store-bought)", substitute = "Water with 1 teaspoon soy sauce and a pinch of salt", reason = "Adds umami and depth in a pinch using common condiments already in most kitchens" },
    { original = "Tomato paste", substitute = "2 tablespoons ketchup or 3 tablespoons crushed canned tomatoes, reduced", reason = "Both options add the necessary tomato flavour and acidity available in virtually every home" }
]
