[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "Duck confit legs (store-bought)", substitute = "Bone-in chicken thighs roasted with duck fat or olive oil until crispy", saving_percent = 70, reason = "Chicken thighs achieve similar richness at a fraction of the price when well-seasoned and roasted until golden" },
    { original = "Tarbais beans (specialty French beans)", substitute = "Dried cannellini beans or Great Northern beans", saving_percent = 60, reason = "These white beans have nearly identical texture and flavour and are widely available at a much lower cost" },
    { original = "Toulouse sausage (specialty butcher)", substitute = "Fresh coarse pork sausages or Italian-style pork sausages", saving_percent = 45, reason = "Coarse-ground pork sausages provide the same meaty texture and are sold in every supermarket" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "Smoked pork rind (couenne)", substitute = "2 strips of thick-cut smoked bacon left whole during cooking", reason = "Whole strips of smoked bacon add the same gelatinous body and smokiness during long braising" },
    { original = "Duck or goose fat for roasting", substitute = "Olive oil or vegetable oil", reason = "While less rich, a neutral oil still achieves golden browning and is universally available" },
    { original = "Coarse breadcrumbs (fresh)", substitute = "Panko breadcrumbs from a packet", reason = "Panko creates an equally crispy, golden crust and is available in most grocery stores" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "Dried haricot beans soaked overnight", substitute = "2 cans (400 g each) of drained white cannellini beans", reason = "Canned beans save the overnight soak and 45-minute par-boil; skip directly to the assembly step" },
    { original = "Bouquet garni", substitute = "1 teaspoon dried thyme, 2 bay leaves, and a few parsley stems added loose", reason = "Dried herbs from the pantry deliver the same aromatic depth over the long braise" },
    { original = "Dutch oven (heavy braiser)", substitute = "Any large oven-safe casserole dish or deep baking pan covered tightly with foil", reason = "A tightly sealed baking dish retains moisture well enough for the long, slow braise" }
]
