[recipe.standard]
serving_size = "1 generous bowl (approximately 400g)"
servings_per_recipe = 4
prep_time_minutes = 25
cook_time_minutes = 50

[recipe.standard.ingredients]
items = [
    "2 medium eggplants, diced",
    "2 medium zucchini, diced",
    "2 medium bell peppers (1 red, 1 yellow), diced",
    "4 large ripe tomatoes, diced",
    "2 medium onions, diced",
    "4 cloves garlic, minced",
    "4 tbsp extra-virgin olive oil",
    "1 tsp dried thyme",
    "1 tsp dried herbes de Provence",
    "2 sprigs fresh rosemary",
    "1 bay leaf",
    "Salt and black pepper to taste",
    "Fresh basil and olive oil for serving"
]

[recipe.standard.instructions]
steps = [
    "Salt eggplant cubes. Let rest on paper towels for 20 minutes. Pat dry — this removes bitterness and excess moisture.",
    "Heat 2 tbsp olive oil in a large Dutch oven over medium-high heat (375°F/190°C). Sauté eggplant until golden, about 6 minutes. Remove.",
    "In the same pot, heat 1 tbsp olive oil. Sauté zucchini until lightly golden, about 4 minutes. Remove.",
    "Add remaining oil. Sauté onions until soft, 5 minutes. Add garlic, bell peppers, thyme, herbes de Provence, and bay leaf. Cook 8 minutes.",
    "Add diced tomatoes. Cook down for 10 minutes until sauce thickens.",
    "Return eggplant and zucchini to the pot. Add rosemary. Stir gently.",
    "Cover and simmer on low heat for 20-25 minutes, stirring occasionally, until all vegetables are tender and flavors melded.",
    "Remove bay leaf and rosemary. Taste and season. Finish with fresh basil and a drizzle of olive oil. Serve hot or at room temperature — it improves the next day."
]

