[recipe.standard.ingredients]
items = [
    "Batter: 1 cup all-purpose flour",
    "Batter: 2 large eggs",
    "Batter: 1.5 cups whole milk",
    "Batter: 2 tbsp melted butter",
    "Batter: pinch of salt",
    "Filling: 8 slices good-quality ham",
    "Filling: 120g Gruyère or Emmental cheese, grated",
    "Filling: 4 large eggs",
    "Butter for cooking",
    "Fresh parsley for garnish"
]

[recipe.standard.instructions]
steps = [
    "Make batter: blend flour, eggs, milk, melted butter, and salt until completely smooth. The batter should be thin — like heavy cream consistency. Rest 30 minutes in the refrigerator.",
    "Heat a 25cm crêpe pan or non-stick pan over medium-high heat (375°F/190°C). Add a small pat of butter.",
    "Pour 3-4 tbsp of batter and immediately swirl to coat the pan in a thin, even circle.",
    "Cook for 1-2 minutes until edges lift and surface is set. For galette-style: sprinkle Gruyère in the center, add 1-2 slices of ham.",
    "Crack an egg in the center of the crêpe. Let the egg white set while the yolk remains runny, about 2 minutes.",
    "Fold the four edges inward to form a square, exposing the egg yolk. Slide onto a plate.",
    "Serve immediately with fresh parsley. The signature is the runny egg yolk breaking into the melted cheese."
]

