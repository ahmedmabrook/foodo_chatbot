[recipe.standard]
serving_size = "1 croissant (approximately 80g)"
servings_per_recipe = 8
prep_time_minutes = 480
cook_time_minutes = 20

[recipe.standard.ingredients]
items = [
    "Dough: 500g bread flour (or all-purpose)",
    "Dough: 10g instant yeast",
    "Dough: 60g sugar",
    "Dough: 10g salt",
    "Dough: 300ml whole milk, warm",
    "Dough: 40g softened butter",
    "Laminating butter: 250g cold unsalted European-style butter",
    "Egg wash: 1 egg + 1 tbsp milk"
]

[recipe.standard.instructions]
steps = [
    "Make dough: combine flour, yeast, sugar, and salt. Add warm milk and softened butter. Knead until smooth dough forms. Shape into a rectangle, wrap, and refrigerate overnight.",
    "Prepare laminating butter: beat cold butter into a flat 20cm square between parchment sheets. Refrigerate until firm but pliable (same temperature as dough).",
    "Lamination: roll dough into a rectangle twice the size of the butter block. Place butter in center. Fold dough over butter (book fold). Seal edges. Roll out to a long rectangle.",
    "Perform first fold (letter fold): fold dough in thirds. Wrap and rest in refrigerator 30 minutes. This is 1 turn. Repeat for 3 turns total with 30-minute rests between each.",
    "After 3 turns: roll dough to 5mm thickness. Cut into long triangles (base ~12cm).",
    "Roll each triangle from base to tip, stretching gently. Curve into a crescent shape. Place on parchment-lined baking sheets.",
    "Proof at room temperature (70°F/21°C) for 2-3 hours until doubled and visibly layered.",
    "Brush with egg wash. Bake at 400°F (200°C) for 16-20 minutes until deep amber brown. Cool on a rack — resist eating immediately; they improve as they cool slightly."
]

