[recipe.standard]
serving_size = "1 plate with potatoes (approximately 420g)"
servings_per_recipe = 6
prep_time_minutes = 30
cook_time_minutes = 180

[recipe.standard.ingredients]
items = [
    "1.2 kg beef chuck, cut into 4cm cubes",
    "200g lardons (or thick-cut bacon, cubed)",
    "300g mushrooms, quartered",
    "20 pearl onions (or 2 medium onions, quartered)",
    "3 carrots, cut into 3cm pieces",
    "4 cloves garlic, minced",
    "1 bottle (750ml) Burgundy or Pinot Noir red wine",
    "2 cups beef broth",
    "2 tbsp tomato paste",
    "3 tbsp all-purpose flour",
    "2 tbsp olive oil",
    "1 bouquet garni (thyme, bay leaf, parsley stems)",
    "2 tbsp butter (for mushrooms)",
    "Salt and black pepper to taste"
]

[recipe.standard.instructions]
steps = [
    "Optional marinade: marinate beef in wine overnight with carrots, garlic, and bouquet garni for deeper flavor.",
    "Preheat oven to 325°F (165°C). Pat beef dry. Season with salt and pepper.",
    "Cook lardons in a Dutch oven until rendered. Remove. Brown beef in batches in the bacon fat — do not crowd. Remove.",
    "Sauté pearl onions until golden. Remove.",
    "Add garlic and tomato paste. Cook 1 minute. Stir in flour. Gradually add wine, scraping up browned bits.",
    "Add broth, bouquet garni. Return beef and lardons. Bring to a simmer.",
    "Cover and braise in oven for 1.5-2 hours until beef is fork-tender.",
    "Meanwhile, sauté mushrooms in butter until golden. Add pearl onions and mushrooms to the pot in the last 30 minutes.",
    "Remove bouquet garni. Taste and season. The sauce should be rich and slightly thickened. Serve with crusty bread, potatoes, or noodles."
]

