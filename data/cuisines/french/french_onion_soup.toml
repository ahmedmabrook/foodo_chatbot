[metadata]
doc_id = "french_french_onion_soup"
cuisine = "French"
dish_name = "French Onion Soup"
alternate_names = ["Soupe à l'oignon gratinée", "Gratinée Lyonnaise", "Onion Gratin Soup"]
category = "soup"
tags = ["comfort_food", "traditional", "contains_dairy", "contains_gluten", "contains_alcohol"]
allergens = ["dairy", "gluten"]
difficulty = "medium"
total_time_minutes = 90

[recipe.standard]
serving_size = "1 crock (approximately 380g)"
servings_per_recipe = 4
prep_time_minutes = 15
cook_time_minutes = 75

[recipe.standard.ingredients]
items = [
    "1.2 kg yellow onions (about 5-6 large), thinly sliced",
    "4 tbsp unsalted butter",
    "1 tbsp olive oil",
    "1 tsp sugar",
    "3 cloves garlic, minced",
    "1/2 cup dry white wine (or dry sherry)",
    "1 liter good beef broth",
    "2 sprigs fresh thyme (or 1/2 tsp dried)",
    "1 bay leaf",
    "Salt and black pepper to taste",
    "4 thick slices baguette",
    "150g Gruyère cheese, grated"
]

[recipe.standard.instructions]
steps = [
    "Melt butter with olive oil in a large heavy pot over medium heat. Add onions with 1 tsp sugar and 1/2 tsp salt. Stir to coat.",
    "Cook onions, stirring every 5-8 minutes, for 45-60 minutes until deeply caramelized and dark brown. Reduce heat if sticking. This is the foundation — do not rush it.",
    "Add garlic and cook 1 minute. Add wine and scrape up any browned bits. Cook until wine evaporates.",
    "Add beef broth, thyme, and bay leaf. Bring to a simmer. Cook 15 minutes. Season with salt and pepper.",
    "Toast baguette slices under the broiler at 450°F (230°C) until golden.",
    "Ladle soup into oven-safe crocks or bowls. Float a baguette slice on top. Cover generously with Gruyère.",
    "Place under broiler at 500°F (260°C) for 3-5 minutes until cheese is bubbling, browned, and forms a crust. Serve immediately."
]

