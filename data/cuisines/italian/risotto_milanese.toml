[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "saffron threads", substitute = "1/4 tsp turmeric for color + a pinch of paprika", saving_percent = 95, reason = "Saffron is extremely expensive; turmeric provides the golden color at a tiny fraction of the cost" },
    { original = "Parmigiano-Reggiano", substitute = "Grana Padano or any hard Italian cheese", saving_percent = 25, reason = "Grana Padano has a similar flavor profile and is typically cheaper than Parmigiano-Reggiano" },
    { original = "dry white wine", substitute = "extra broth + 1 tbsp white wine vinegar", saving_percent = 80, reason = "The alcohol evaporates; what remains is acidity and flavor — vinegar provides the acid" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "Arborio or Carnaroli rice", substitute = "any short-grain rice (sushi rice works)", reason = "Short-grain rice has the starch needed to create a creamy risotto; long-grain will not work" },
    { original = "saffron", substitute = "turmeric (provides color only) + extra Parmesan (for richness)", reason = "Saffron provides both color and a unique floral metallic flavor; turmeric covers the color part" },
    { original = "bone marrow", substitute = "1 extra tbsp butter added to onions", reason = "Bone marrow adds richness; extra butter provides a similar fat-enriched base" }
]

