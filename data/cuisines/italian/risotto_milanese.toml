category = "main_course"
tags = ["vegetarian", "comfort_food", "festive", "contains_dairy", "traditional"]
allergens = ["dairy"]
difficulty = "medium"
total_time_minutes = 45

[recipe.standard]
serving_size = "1 plate (approximately 320g)"
servings_per_recipe = 4
prep_time_minutes = 10
cook_time_minutes = 35

[recipe.standard.ingredients]
items = [
    "320g Arborio or Carnaroli rice",
    "1.2 liters chicken or beef broth, kept hot",
    "1 large onion, very finely diced",
    "1/2 tsp saffron threads, soaked in 1/2 cup warm broth",
    "120ml dry white wine",
    "60g butter, divided",
    "60g Parmesan cheese (Parmigiano-Reggiano), grated",
    "2 tbsp beef bone marrow (optional, traditional in Milan)",
    "Salt and white pepper to taste"
]

[recipe.standard.instructions]
steps = [
    "Keep broth in a separate pot over low heat — it must be hot when added to the rice.",
    "Melt half the butter in a wide, heavy-bottomed pan over medium heat. Add finely diced onion and cook gently for 8-10 minutes until very soft and translucent but not browned.",
    "If using bone marrow, add it now and let it melt into the onion.",
    "Add dry rice and toast for 2 minutes, stirring, until the edges look translucent and the rice smells nutty.",
    "Pour in white wine. Stir until completely absorbed.",
    "Add hot broth one ladle at a time, stirring frequently and adding the next ladle only when the previous one is absorbed. This process takes 18-20 minutes.",
    "About halfway through, add the saffron broth. The risotto will turn a beautiful deep golden yellow.",
    "When rice is al dente (a slight firmness at center) and sauce is creamy, remove from heat. Add remaining cold butter and Parmesan. Vigorously stir to emulsify — this is 'mantecatura' and creates the creamy texture. Rest 1 minute.",
    "Serve immediately on warm plates. Risotto should spread like a wave (all'onda) on the plate."
]

