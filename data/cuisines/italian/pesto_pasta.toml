    "Pesto: 50g pine nuts",
    "Pesto: 50g Parmesan (Parmigiano-Reggiano), grated",
    "Pesto: 20g Pecorino Romano, grated",
    "Pesto: 2 cloves garlic",
    "Pesto: 120ml extra-virgin olive oil",
    "Pesto: pinch of salt",
    "200g small potatoes, cubed (traditional addition)",
    "100g green beans (traditional addition)",
    "Extra Parmesan for serving"
]

[recipe.standard.instructions]
steps = [
    "Make pesto: in a mortar and pestle (traditional) or food processor, blend basil, pine nuts, garlic, and a pinch of salt to a coarse paste. Gradually add olive oil while blending. Fold in both grated cheeses. Do not over-process — pesto should have some texture.",
    "Bring a large pot of heavily salted water to a boil.",
    "Add cubed potatoes. Cook 5 minutes.",
    "Add green beans. Cook 3 minutes.",
    "Add pasta. Cook according to package directions until al dente.",
    "Reserve 1/2 cup pasta cooking water before draining.",
    "Drain pasta, potatoes, and beans together. Transfer to a large bowl. Let cool slightly (do not add pesto to very hot pasta or the cheese will clump).",
    "Toss with pesto, adding pasta water 1 tbsp at a time to create a creamy, loose sauce. Serve with extra Parmesan."
]

