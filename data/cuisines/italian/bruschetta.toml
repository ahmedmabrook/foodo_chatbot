[recipe.standard]
serving_size = "3 bruschetta pieces (approximately 180g)"
servings_per_recipe = 4
prep_time_minutes = 15
cook_time_minutes = 5

[recipe.standard.ingredients]
items = [
    "1 large baguette or ciabatta loaf, sliced into 12 rounds",
    "4 large ripe tomatoes, finely diced",
    "4 cloves garlic (2 for rubbing on bread, 2 minced for topping)",
    "15 fresh basil leaves, torn",
    "4 tbsp extra-virgin olive oil",
    "1 tbsp balsamic vinegar (optional)",
    "Salt and black pepper to taste"
]

[recipe.standard.instructions]
steps = [
    "Dice tomatoes and place in a colander. Salt lightly and let drain 10 minutes to remove excess liquid — this prevents soggy bruschetta.",
    "Toast or grill bread slices under the broiler at 450°F (230°C) for 2-3 minutes per side until golden and crispy with char marks.",
    "Immediately rub one side of each hot toasted slice with a cut garlic clove — the rough surface acts like a grater.",
    "Drizzle rubbed side generously with olive oil.",
    "Combine drained tomatoes with minced garlic, torn basil, remaining olive oil, salt, and pepper. Toss.",
    "Spoon tomato mixture generously onto each slice just before serving — do not assemble too early or the bread will get soggy.",
    "Optional: add a drizzle of balsamic vinegar. Serve immediately."
]

