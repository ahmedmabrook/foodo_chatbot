[recipe.standard]
serving_size = "3 arancini (approximately 270g)"
servings_per_recipe = 6
prep_time_minutes = 45
cook_time_minutes = 45

[recipe.standard.ingredients]
items = [
    "Rice base: 2 cups Arborio rice",
    "Rice base: 4 cups chicken broth",
    "Rice base: 60g Parmesan, grated",
    "Rice base: 2 tbsp butter",
    "Rice base: 1/2 tsp saffron in 2 tbsp warm broth",
    "Filling: 200g ground beef",
    "Filling: 100g peas (fresh or frozen)",
    "Filling: 100g tomato sauce",
    "Filling: 1 small onion, diced",
    "Filling: 80g fresh mozzarella, cubed",
    "Coating: 2 eggs, beaten",
    "Coating: 1.5 cups breadcrumbs",
    "Coating: 1/2 cup all-purpose flour",
    "Vegetable oil for deep frying",
    "Salt and pepper to taste"
]

[recipe.standard.instructions]
steps = [
    "Cook Arborio rice: bring broth with saffron water to a boil. Add rice. Cook covered on low heat until all liquid is absorbed, about 18 minutes. Remove from heat. Stir in Parmesan, butter, salt, and pepper. Spread on a baking sheet to cool completely — the rice must be very cold to shape.",
    "Make filling: sauté onion in a little oil. Add ground beef and brown. Add tomato sauce and peas. Season. Cook until thick. Cool completely.",
    "Shape arancini: take 3 tbsp cold rice and flatten in your palm. Place 1 tsp filling and a cube of mozzarella in the center. Enclose with rice, pressing firmly to form a ball or cone shape. Chill 20 minutes.",
    "Set up breading station: flour, beaten egg, breadcrumbs.",
    "Coat each arancino: flour → egg → breadcrumbs. Press breadcrumbs firmly.",
    "Heat oil to 350°F (175°C) in a deep pot. Fry in batches for 3-4 minutes until deep golden brown. Drain on paper towels.",
    "Serve hot. The center should be melted and gooey."
]

