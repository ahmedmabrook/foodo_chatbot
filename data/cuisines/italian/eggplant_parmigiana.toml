[recipe.standard.ingredients]
items = [
    "2 large eggplants (about 1.2 kg total), sliced 1cm thick",
    "2 cups simple tomato sauce (San Marzano tomatoes, garlic, basil)",
    "200g fresh mozzarella, sliced",
    "80g Parmesan cheese, grated",
    "2 large eggs, beaten",
    "1 cup breadcrumbs (or plain flour for lighter version)",
    "Olive oil for frying",
    "Salt for drawing out eggplant moisture",
    "Fresh basil leaves"
]

[recipe.standard.instructions]
steps = [
    "Salt eggplant slices generously on both sides. Let sit on a wire rack for 30 minutes to draw out moisture. Pat thoroughly dry with paper towels — this step is critical for crispy, non-oily eggplant.",
    "Make tomato sauce: simmer crushed San Marzano tomatoes with 2 cloves minced garlic and fresh basil for 15 minutes. Season with salt.",
    "Dip dry eggplant slices in beaten egg, then breadcrumbs.",
    "Fry coated eggplant in olive oil over medium-high heat (375°F/190°C) in batches for 2-3 minutes per side until golden. Drain on paper towels.",
    "Preheat oven to 375°F (190°C). In a baking dish, spread a thin layer of tomato sauce.",
    "Layer fried eggplant slices. Cover with tomato sauce, slices of mozzarella, and a sprinkle of Parmesan. Repeat layers, finishing with sauce and Parmesan.",
    "Bake 30-35 minutes until bubbling and top is golden brown.",
    "Rest 15 minutes before serving. Garnish with fresh basil."
]

