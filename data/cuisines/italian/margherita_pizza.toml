[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "San Marzano canned tomatoes", substitute = "Good-quality generic canned whole plum tomatoes", saving_percent = 50, reason = "San Marzano DOP commands a premium; high-quality generic plum tomatoes produce an excellent sauce when seasoned well." },
    { original = "Fior di latte mozzarella", substitute = "Supermarket block whole-milk mozzarella, sliced thin", saving_percent = 60, reason = "Fresh imported mozzarella is expensive; block mozzarella melts well and costs a fraction of the price." },
    { original = "00 flour", substitute = "All-purpose (plain) flour", saving_percent = 30, reason = "00 flour produces a finer crumb, but all-purpose flour is widely available and yields a very acceptable Neapolitan-style crust at lower cost." }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "Pizza stone", substitute = "Inverted heavy-duty baking sheet preheated in oven", reason = "A pizza stone requires a specialty purchase; an inverted baking sheet preheated at maximum temperature provides similar bottom-crust crisping." },
    { original = "Fresh basil leaves", substitute = "Dried basil (add with sauce, not after baking)", reason = "Fresh basil may be unavailable seasonally; dried basil stirred into the sauce still delivers herbal flavor." },
    { original = "Active dry yeast", substitute = "Instant (fast-action) yeast, same quantity", reason = "Instant yeast does not require proofing and is more commonly stocked in grocery stores; reduce rise time by about 25%." }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "Pizza peel", substitute = "Flat cookie sheet or cutting board dusted with flour", reason = "A pizza peel is a specialist tool; any flat, smooth surface works to slide the pizza onto the stone." },
    { original = "Kitchen scale for dough", substitute = "Standard measuring cups (1 cup 00 flour ≈ 120g)", reason = "A scale is ideal for precision, but volumetric measuring cups produce consistent results for home bakers." },
    { original = "Stand mixer with dough hook", substitute = "Hand kneading on a lightly floured surface for 10 minutes", reason = "A stand mixer speeds dough development, but traditional Neapolitan pizza is made entirely by hand." }
]
