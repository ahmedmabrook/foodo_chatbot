[metadata]
doc_id = "italian_margherita_pizza"
cuisine = "Italian"
dish_name = "Margherita Pizza"
alternate_names = ["Pizza Margherita", "Neapolitan Pizza"]
category = "main_course"
tags = ["pizza", "baked", "vegetarian", "neapolitan", "classic"]
allergens = ["gluten", "dairy"]
difficulty = "medium"
total_time_minutes = 90

[recipe.standard]
serving_size = "1 slice (approximately 175g, 2 slices per serving)"
servings_per_recipe = 4
prep_time_minutes = 30
cook_time_minutes = 12

[recipe.standard.ingredients]
items = [
    "500g (17.6 oz) 00 flour, plus extra for dusting",
    "325ml (11 fl oz) lukewarm water",
    "7g (0.25 oz) active dry yeast",
    "10g (0.35 oz) fine sea salt",
    "5g (1 tsp) sugar",
    "15ml (1 tbsp) extra-virgin olive oil",
    "400g (14 oz) canned San Marzano whole tomatoes, crushed by hand",
    "2 garlic cloves, minced",
    "5ml (1 tsp) extra-virgin olive oil (for sauce)",
    "4g (0.75 tsp) fine sea salt (for sauce)",
    "250g (8.8 oz) fresh fior di latte mozzarella, torn into pieces",
    "20 fresh basil leaves",
    "30ml (2 tbsp) extra-virgin olive oil (for finishing)"
]

[recipe.standard.instructions]
steps = [
    "Combine yeast, sugar, and 100ml lukewarm water in a small bowl. Let stand 5 minutes until foamy.",
    "Mound the flour on a clean work surface and make a well in the center. Pour in the yeast mixture, remaining 225ml water, and olive oil. Mix from the center outward until a shaggy dough forms.",
    "Knead the dough vigorously for 10 minutes until smooth and elastic. Shape into a ball, cover with a damp cloth, and let rise at room temperature for 2 hours until doubled.",
    "Prepare the sauce: combine crushed San Marzano tomatoes, garlic, olive oil, and salt in a bowl. Do not cook — the sauce is used raw for authentic Neapolitan flavor.",
    "Preheat oven to its highest setting, ideally 500°F (260°C) or higher, with a pizza stone or heavy baking sheet inside, for at least 45 minutes.",
    "Punch down the dough and divide into 4 equal balls (about 200g each). On a lightly floured surface, stretch each ball by hand into a 10–12 inch (25–30 cm) round, keeping the edges slightly thicker.",
    "Transfer the dough round to a floured pizza peel or parchment-lined paddle. Spoon 3–4 tablespoons of tomato sauce onto the base, spreading it in a circular motion, leaving a 1-inch (2.5 cm) border.",
    "Distribute torn mozzarella evenly over the sauce. Slide the pizza onto the preheated stone and bake for 10–12 minutes until the crust is charred in spots and the cheese is bubbling.",
    "Remove from oven, immediately scatter fresh basil leaves over the top, drizzle with extra-virgin olive oil, and serve at once."
]

[recipe.standard.macros]
calories = 560
protein_g = 22
carbs_g = 76
fat_g = 18
fiber_g = 4
sugar_g = 5
sodium_mg = 780

