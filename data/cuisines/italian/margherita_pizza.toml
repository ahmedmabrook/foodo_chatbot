[recipe.healthy_variant]
variant_name = "Cauliflower Crust Margherita"
variant_type = "low_calorie"
description = "A lighter take on the classic using a cauliflower-based crust instead of white flour dough, with reduced mozzarella and an abundance of fresh vegetables."
serving_size = "1 piece (approximately 200g, 2 pieces per serving)"
servings_per_recipe = 4
prep_time_minutes = 35
cook_time_minutes = 30

[recipe.healthy_variant.ingredients]
items = [
    "900g (2 lb) cauliflower florets (about 1 large head)",
    "2 large eggs, beaten",
    "60g (2.1 oz) part-skim mozzarella, shredded",
    "30g (1 oz) grated Parmesan",
    "5g (1 tsp) dried oregano",
    "3g (0.5 tsp) garlic powder",
    "3g (0.5 tsp) fine sea salt",
    "300g (10.5 oz) canned San Marzano whole tomatoes, crushed by hand",
    "2 garlic cloves, minced",
    "3g (0.5 tsp) fine sea salt (for sauce)",
    "100g (3.5 oz) part-skim fresh mozzarella, torn",
    "1 medium zucchini, thinly sliced",
    "1 medium tomato, thinly sliced",
    "15 fresh basil leaves",
    "10ml (2 tsp) extra-virgin olive oil"
]

[recipe.healthy_variant.instructions]
steps = [
    "Preheat oven to 425°F (220°C). Line two baking sheets with parchment paper.",
    "Pulse cauliflower florets in a food processor until they resemble fine rice. Place in a clean kitchen towel and squeeze out as much moisture as possible — this step is critical for a crisp crust.",
    "In a large bowl, combine the dried cauliflower rice, beaten eggs, shredded mozzarella, Parmesan, oregano, garlic powder, and salt. Mix until a cohesive dough forms.",
    "Divide the mixture in half and spread each portion into a thin, even round (about 10 inches / 25 cm) on the prepared baking sheets. Bake for 18–20 minutes until golden and firm.",
    "While the crusts bake, combine crushed tomatoes, minced garlic, and salt in a bowl to make the raw sauce.",
    "Remove crusts from oven and spread tomato sauce over each, leaving a small border. Arrange torn mozzarella, zucchini slices, and tomato slices evenly on top.",
    "Return to oven and bake for a further 8–10 minutes until the cheese is melted and the vegetables are tender.",
    "Scatter fresh basil over each pizza, drizzle with olive oil, and serve immediately."
]

[recipe.healthy_variant.macros]
calories = 310
