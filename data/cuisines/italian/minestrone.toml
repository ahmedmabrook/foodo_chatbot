[recipe.standard.ingredients]
items = [
    "1 large onion, diced",
    "3 cloves garlic, minced",
    "2 carrots, diced",
    "2 stalks celery, diced",
    "2 medium zucchini, diced",
    "200g green beans, cut into 2cm pieces",
    "400g canned cannellini beans, drained",
    "400g canned diced tomatoes",
    "1.5 liters vegetable broth",
    "1 cup small pasta (ditalini, elbow, or small shells)",
    "100g leafy greens (savoy cabbage or kale), shredded",
    "3 tbsp olive oil",
    "1 tbsp tomato paste",
    "1 tsp dried oregano",
    "1 tsp dried basil",
    "1 bay leaf",
    "Salt and black pepper to taste",
    "Parmesan rind (optional, for richness)",
    "Extra-virgin olive oil and grated Parmesan for serving"
]

[recipe.standard.instructions]
steps = [
    "Heat olive oil in a large pot over medium heat. Sauté onion, carrots, and celery for 8 minutes until softened. Add garlic and cook 1 minute.",
    "Add tomato paste and stir for 2 minutes.",
    "Add diced tomatoes, vegetable broth, oregano, basil, bay leaf, and Parmesan rind if using. Bring to a boil.",
    "Add carrots and green beans. Simmer 10 minutes.",
    "Add zucchini and shredded cabbage or kale. Simmer 8 more minutes.",
    "Add cannellini beans and pasta. Cook until pasta is al dente, about 8-10 minutes.",
    "Taste and season with salt and pepper. Remove bay leaf and Parmesan rind.",
    "Serve in deep bowls. Drizzle with extra-virgin olive oil and top with grated Parmesan."
]

