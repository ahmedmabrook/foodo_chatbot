[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "Guanciale (cured pork cheek)", substitute = "Pancetta or thick-cut smoked bacon", saving_percent = 55, reason = "Guanciale is an imported Italian specialty at a premium price; pancetta delivers a similar cured pork flavor and pancetta is widely available at a fraction of the cost." },
    { original = "Pecorino Romano DOP", substitute = "Grated Parmesan (100% substitution)", saving_percent = 25, reason = "Pecorino Romano is sharper and saltier; using all Parmesan produces a milder but still authentic-adjacent carbonara and is usually less expensive." },
    { original = "Parmigiano-Reggiano DOP", substitute = "Grana Padano", saving_percent = 35, reason = "Grana Padano is a close relative of Parmigiano-Reggiano with a slightly milder flavor, typically 30–40% cheaper." }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "Guanciale", substitute = "Thick-cut smoked streaky bacon", reason = "Guanciale is rarely stocked outside of Italian specialty stores; smoked bacon provides comparable fat content and savory depth." },
    { original = "Spaghetti", substitute = "Rigatoni, bucatini, or any long pasta shape", reason = "Carbonara is made with various pasta shapes in Rome; rigatoni and bucatini are common alternatives and are equally authentic." },
    { original = "Freshly cracked black pepper (large quantity)", substitute = "Pre-ground coarse black pepper", reason = "Freshly cracking pepper at home yields the best flavor, but pre-ground coarse black pepper is a perfectly usable pantry staple." }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "Fine grater (Microplane) for cheese", substitute = "Box grater, finest side", reason = "A Microplane produces fluffier, more quickly dissolving cheese; a standard box grater achieves the same result with slightly more effort." },
    { original = "Large pasta cooking pot (8+ litres)", substitute = "Any large pot; cook in two batches if needed", reason = "A large pot prevents pasta from sticking and maintains a rolling boil; a smaller pot works if pasta is added in stages." },
    { original = "Kitchen thermometer to monitor egg temperature", substitute = "Remove pan from heat entirely and work quickly", reason = "A thermometer ensures eggs do not scramble; removing the pan from heat before adding the egg mixture and tossing rapidly achieves the same safety margin." }
]
