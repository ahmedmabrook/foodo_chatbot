[metadata]
doc_id = "italian_spaghetti_carbonara"
cuisine = "Italian"
dish_name = "Spaghetti Carbonara"
alternate_names = ["Pasta alla Carbonara", "Roman Carbonara"]
category = "main_course"
tags = ["pasta", "roman", "stovetop", "pork", "egg", "no-cream", "classic"]
allergens = ["gluten", "dairy", "eggs"]
difficulty = "medium"
total_time_minutes = 35

[recipe.standard]
serving_size = "1 bowl (approximately 300g)"
servings_per_recipe = 4
prep_time_minutes = 10
cook_time_minutes = 25

[recipe.standard.ingredients]
items = [
    "400g (14 oz) spaghetti or rigatoni",
    "200g (7 oz) guanciale (cured pork cheek), cut into 1cm cubes",
    "6 large egg yolks",
    "1 whole large egg",
    "80g (2.8 oz) Pecorino Romano, finely grated, plus extra to serve",
    "40g (1.4 oz) Parmigiano-Reggiano, finely grated",
    "5g (1 tsp) coarsely ground black pepper, plus extra to serve",
    "Fine sea salt, for pasta water"
]

[recipe.standard.instructions]
steps = [
    "Bring a large pot of well-salted water to a boil. Use at least 1 tablespoon of salt per 4 litres — the water should taste of the sea.",
    "Place the cubed guanciale in a cold, dry large skillet. Set over medium-low heat (300°F / 150°C surface temp) and render slowly for 8–10 minutes, stirring occasionally, until the fat is translucent and the edges are lightly golden but still soft. Remove from heat and set aside with all its rendered fat.",
    "In a medium bowl, whisk together the 6 egg yolks and 1 whole egg until smooth. Add both grated cheeses and the black pepper. Mix vigorously until a thick, pale paste forms. Set aside.",
    "Cook spaghetti in the boiling water for 1 minute less than the package directs for al dente. Before draining, ladle out at least 300ml (1.25 cups) of starchy pasta water and set aside.",
    "Drain the spaghetti and immediately add it to the skillet with the guanciale over low heat (do not turn the heat back on if the pan is hot). Toss for 30 seconds to coat the pasta in the rendered fat.",
    "Remove the skillet from all heat. Add the egg-and-cheese paste to the pasta, tossing rapidly. Add pasta water a splash at a time (start with 60ml / 4 tbsp), tossing constantly, until the sauce becomes glossy, creamy, and clings to every strand. The residual heat should gently cook the eggs — the target temperature is below 160°F (71°C) to avoid scrambling.",
    "Plate immediately. Finish with an extra grating of Pecorino Romano and a generous crack of black pepper. Serve at once — carbonara waits for no one."
]

