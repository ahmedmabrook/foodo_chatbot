[recipe.healthy_variant]
variant_name = "Zucchini Noodle Carbonara"
variant_type = "low_carb"
description = "A low-carb, lower-calorie carbonara using spiralized zucchini noodles in place of spaghetti, with turkey bacon substituting guanciale and a lighter egg-to-cheese ratio."
serving_size = "1 bowl (approximately 350g)"
servings_per_recipe = 4
prep_time_minutes = 15
cook_time_minutes = 15

[recipe.healthy_variant.ingredients]
items = [
    "900g (2 lb) zucchini (about 4 medium), spiralized into noodles",
    "150g (5.3 oz) turkey bacon or lean pancetta, cut into small lardons",
    "4 large egg yolks",
    "1 whole large egg",
    "50g (1.75 oz) Pecorino Romano, finely grated",
    "20g (0.7 oz) Parmigiano-Reggiano, finely grated",
    "4g (0.75 tsp) coarsely ground black pepper",
    "2g (0.35 tsp) fine sea salt",
    "5ml (1 tsp) extra-virgin olive oil"
]

[recipe.healthy_variant.instructions]
steps = [
    "Spiralize the zucchini and spread on a clean kitchen towel. Sprinkle lightly with salt, toss, and let stand 10 minutes. Squeeze out as much moisture as possible — this prevents a watery sauce.",
    "Heat olive oil in a large nonstick skillet over medium heat (325°F / 165°C surface). Cook the turkey bacon lardons for 5–6 minutes until lightly crisped. Remove from heat.",
    "Whisk together egg yolks, whole egg, Pecorino Romano, Parmesan, and black pepper in a bowl until a smooth, thick paste forms.",
    "Add zucchini noodles to the skillet with the bacon over medium-low heat. Toss for 2–3 minutes, just until the noodles are warmed through and slightly tender but still have bite.",
    "Remove the skillet completely from heat. Add the egg-cheese paste and toss quickly and continuously, adding 2–3 tablespoons of warm water as needed to create a glossy sauce. Work fast — the goal is a creamy coating, not scrambled eggs.",
    "Plate immediately and finish with extra black pepper and a small extra grating of Pecorino Romano. Serve at once."
]

