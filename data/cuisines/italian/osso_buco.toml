[metadata]
doc_id = "italian_osso_buco"
cuisine = "Italian"
dish_name = "Osso Buco"
alternate_names = ["Ossobuco alla Milanese", "Braised Veal Shanks", "Osso Bucco"]
category = "main_course"
tags = ["festive", "high_protein", "comfort_food", "contains_dairy", "traditional"]
allergens = ["dairy", "gluten"]
difficulty = "hard"
total_time_minutes = 180

[recipe.standard]
serving_size = "1 veal shank with gremolata (approximately 380g)"
servings_per_recipe = 4
prep_time_minutes = 30
cook_time_minutes = 150

[recipe.standard.ingredients]
items = [
    "4 cross-cut veal shanks, about 4cm thick (total 1.6 kg)",
    "1 large onion, finely diced",
    "2 carrots, finely diced",
    "2 stalks celery, finely diced",
    "4 cloves garlic, minced",
    "400g canned crushed tomatoes",
    "1 cup dry white wine",
    "1 cup veal or chicken broth",
    "1/4 cup all-purpose flour",
    "3 tbsp olive oil",
    "1 tbsp butter",
    "1 bay leaf",
    "2 sprigs fresh thyme",
    "Salt and black pepper",
    "Gremolata: zest of 1 lemon, 2 cloves garlic (minced), 3 tbsp fresh parsley (finely chopped)"
]

[recipe.standard.instructions]
steps = [
    "Season veal shanks with salt and pepper. Tie kitchen string around the circumference of each shank to keep the meat in shape during cooking.",
    "Dust shanks lightly in flour, shaking off excess.",
    "Heat olive oil in a large Dutch oven over high heat (425°F/220°C). Sear shanks for 3-4 minutes per side until deep golden brown. Remove and set aside.",
    "Reduce heat to medium. Add butter. Sauté onion, carrot, and celery (soffritto) for 8-10 minutes until soft and golden. Add garlic and cook 1 minute.",
    "Add white wine and cook until reduced by half, about 5 minutes.",
    "Add crushed tomatoes, broth, bay leaf, and thyme. Return shanks to the pot — liquid should reach halfway up the shanks.",
    "Bring to a gentle simmer. Cover and braise in oven at 325°F (165°C) or on the stovetop on very low heat for 1.5-2 hours until meat is falling off the bone and tender.",
    "Make gremolata: combine lemon zest, minced garlic, and chopped parsley just before serving.",
    "Serve osso buco in its braising liquid, topped generously with gremolata. Traditionally served with Risotto alla Milanese."
]

