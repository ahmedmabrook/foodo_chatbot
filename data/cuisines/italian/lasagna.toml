[recipe.standard.ingredients]
items = [
    "12 lasagna pasta sheets",
    "Bolognese: 500g ground beef",
    "Bolognese: 200g Italian pork sausage, casing removed",
    "Bolognese: 1 large onion, finely diced",
    "Bolognese: 2 carrots, finely diced",
    "Bolognese: 2 stalks celery, finely diced",
    "Bolognese: 4 cloves garlic, minced",
    "Bolognese: 400g canned crushed tomatoes",
    "Bolognese: 2 tbsp tomato paste",
    "Bolognese: 1 cup dry red wine",
    "Bolognese: 1/2 cup whole milk",
    "Béchamel: 4 cups whole milk",
    "Béchamel: 4 tbsp butter",
    "Béchamel: 4 tbsp all-purpose flour",
    "Béchamel: pinch of nutmeg, salt, white pepper",
    "100g Parmesan cheese, grated",
    "2 tbsp olive oil, salt, pepper"
]

[recipe.standard.instructions]
steps = [
    "Make Bolognese: heat olive oil in a large pot. Cook onion, carrot, and celery (soffritto) until soft, 10 minutes. Add garlic, cook 1 minute. Add ground beef and sausage; brown completely, breaking up. Add tomato paste; cook 2 minutes. Add red wine; cook until evaporated. Add crushed tomatoes, milk, salt, and pepper. Simmer uncovered on very low heat for 45-60 minutes until rich and thick.",
    "Make Béchamel: melt butter in a saucepan over medium heat. Whisk in flour; cook 2 minutes. Gradually whisk in warm milk until smooth. Cook, stirring constantly, until thick, about 5-7 minutes. Season with nutmeg, salt, and white pepper.",
    "Cook lasagna sheets according to package directions. Drain and lay flat on a lightly oiled surface.",
    "Preheat oven to 375°F (190°C). Grease a 9x13 inch baking dish.",
    "Assemble: spread a thin layer of Bolognese on the bottom. Lay pasta sheets. Spread Bolognese, then béchamel, then a sprinkle of Parmesan. Repeat layers, finishing with béchamel and a generous layer of Parmesan.",
    "Cover with foil. Bake 30 minutes. Remove foil. Bake another 15-20 minutes until top is golden and bubbling.",
    "Rest 15-20 minutes before cutting. This is critical — it allows the layers to set."
]

