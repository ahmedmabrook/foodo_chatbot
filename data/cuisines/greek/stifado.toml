[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "pearl onions (fresh, to peel)", substitute = "frozen pearl onions, thawed", saving_percent = 30, reason = "Frozen pearl onions are pre-peeled, save enormous prep time, and cost less" },
    { original = "dry red wine", substitute = "beef broth + 1 tbsp red wine vinegar", saving_percent = 90, reason = "Broth provides liquid and depth; extra vinegar provides the acidity wine contributes" },
    { original = "beef chuck", substitute = "beef shoulder or neck (cheaper cuts with equal collagen)", saving_percent = 20, reason = "Any collagen-rich beef cut becomes tender with long braising" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "pearl onions", substitute = "small shallots, or large onion cut into thick wedges", reason = "Shallots stay mostly whole and have similar sweetness; wedges work but break down more" },
    { original = "allspice berries", substitute = "ground allspice (1/4 tsp)", reason = "Ground allspice is more available than whole berries; use sparingly as it is more potent" },
    { original = "whole cloves", substitute = "1/8 tsp ground cloves", reason = "Ground cloves are widely available; use very little as they are very potent" }
]

[recipe.substitutions.home_essentials]
items = [
