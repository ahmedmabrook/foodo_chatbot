total_time_minutes = 150

[recipe.standard]
serving_size = "1 plate with pasta or rice (approximately 400g)"
servings_per_recipe = 6
prep_time_minutes = 20
cook_time_minutes = 130

[recipe.standard.ingredients]
items = [
    "1.2 kg beef chuck, cut into 4cm cubes",
    "800g pearl onions (or small shallots), peeled",
    "400g canned crushed tomatoes",
    "1 cup dry red wine",
    "3 tbsp olive oil",
    "3 tbsp red wine vinegar",
    "2 tbsp tomato paste",
    "2 bay leaves",
    "1 cinnamon stick",
    "4 whole cloves",
    "6 allspice berries",
    "1/2 tsp black pepper",
    "Salt to taste",
    "Fresh parsley for garnish"
]

[recipe.standard.instructions]
steps = [
    "Heat olive oil in a large Dutch oven over high heat. Brown beef cubes on all sides in batches — do not crowd. Remove.",
    "Reduce heat to medium. Add whole peeled pearl onions and cook, stirring, until lightly browned on all sides, about 5 minutes.",
    "Add tomato paste and stir 1 minute. Add red wine and deglaze, scraping up browned bits.",
    "Add crushed tomatoes, red wine vinegar, bay leaves, cinnamon stick, cloves, allspice, salt, and pepper.",
    "Return beef to the pot. The liquid should mostly cover the ingredients.",
    "Bring to a boil, then reduce heat to very low. Cover and braise for 1.5-2 hours until beef is completely tender.",
    "Do not stir during cooking — this keeps the pearl onions whole and the sauce rich.",
    "Remove bay leaves, cinnamon stick, and whole spices. Taste and adjust seasoning.",
    "Serve over orzo pasta, egg noodles, or rice. Garnish with fresh parsley."
]

