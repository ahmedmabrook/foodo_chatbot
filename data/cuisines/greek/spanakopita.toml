[recipe.standard.ingredients]
items = [
    "500g fresh spinach (or 400g frozen, thawed and squeezed dry)",
    "300g feta cheese, crumbled",
    "3 large eggs",
    "1 large onion, finely diced",
    "4 green onions, chopped",
    "1/4 cup fresh dill, chopped",
    "1/4 cup fresh parsley, chopped",
    "1/4 tsp nutmeg",
    "Black pepper to taste",
    "12 sheets phyllo dough",
    "100ml olive oil or melted butter (for brushing phyllo)"
]

[recipe.standard.instructions]
steps = [
    "If using fresh spinach: wilt in a hot pan, then squeeze out ALL moisture with your hands. This step is critical — excess moisture makes soggy spanakopita.",
    "Sauté diced onion in 1 tbsp olive oil until soft. Cool.",
    "Mix together spinach, crumbled feta, eggs, sautéed onion, green onions, dill, parsley, nutmeg, and black pepper.",
    "Preheat oven to 375°F (190°C). Brush a 9x13 inch baking dish with olive oil.",
    "Lay 6 phyllo sheets in the dish, brushing each sheet lightly with olive oil. Let edges overhang.",
    "Spread the spinach-feta filling evenly.",
    "Lay remaining 6 phyllo sheets on top, brushing each with oil. Fold in the overhanging edges.",
    "Score the top into portion-sized pieces (do not cut all the way through — this prevents tearing when hot). Brush top generously with oil.",
    "Bake 40-45 minutes until golden and crispy. Rest 15 minutes before serving."
]

