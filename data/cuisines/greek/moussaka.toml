[metadata]
doc_id = "greek_moussaka"
cuisine = "Greek"
dish_name = "Moussaka"
alternate_names = ["Mousakas", "Greek Lasagna"]
category = "main_course"
tags = ["baked", "lamb", "eggplant", "bechamel", "comfort food", "traditional"]
allergens = ["gluten", "dairy", "eggs"]
difficulty = "hard"
total_time_minutes = 150

[recipe.standard]
serving_size = "1 slice (approximately 380g)"
servings_per_recipe = 6
prep_time_minutes = 45
cook_time_minutes = 105

[recipe.standard.ingredients]
items = [
    "3 large eggplants (about 1.2kg), sliced 1cm thick",
    "500g ground lamb",
    "2 medium onions, finely diced",
    "4 garlic cloves, minced",
    "400g canned crushed tomatoes",
    "120ml dry red wine",
    "3 tablespoons olive oil",
    "1 teaspoon ground cinnamon",
    "1/2 teaspoon ground allspice",
    "1/4 teaspoon ground nutmeg",
    "2 bay leaves",
    "Salt and black pepper to taste",
    "Olive oil for brushing eggplant",
    "70g unsalted butter",
    "70g all-purpose flour",
    "700ml whole milk, warmed",
    "2 large eggs, beaten",
    "80g Kefalotyri or Pecorino Romano, grated",
    "Pinch of nutmeg for bechamel"
]

[recipe.standard.instructions]
steps = [
    "Slice eggplants, sprinkle generously with salt, and let them drain in a colander for 30 minutes to remove bitterness. Rinse and pat dry thoroughly.",
    "Brush eggplant slices on both sides with olive oil and arrange on baking sheets. Roast in the oven at 400°F (200°C) for 20 minutes, flipping halfway, until golden and softened. Set aside.",
    "Heat 3 tablespoons olive oil in a large skillet over medium-high heat. Add onions and cook for 5 minutes until softened. Add garlic and cook 1 minute more.",
    "Add ground lamb to the skillet, breaking it up with a wooden spoon. Cook until no longer pink, about 8 minutes. Drain excess fat.",
    "Pour in red wine and let it reduce for 2 minutes. Add crushed tomatoes, cinnamon, allspice, nutmeg, bay leaves, salt, and pepper. Simmer uncovered for 25 minutes until the sauce thickens. Remove bay leaves and set aside.",
    "Prepare the bechamel: melt butter in a saucepan over medium heat. Whisk in flour and cook for 2 minutes to form a roux. Gradually whisk in warm milk, cooking and stirring constantly for 8 minutes until the sauce thickens and coats a spoon. Remove from heat, cool slightly, then whisk in beaten eggs, half the cheese, and a pinch of nutmeg.",
    "Preheat oven to 375°F (190°C). Lightly oil a 9x13 inch (23x33cm) baking dish. Arrange half the eggplant slices in an even layer on the bottom.",
    "Spread the entire meat sauce evenly over the eggplant layer. Top with the remaining eggplant slices.",
    "Pour the bechamel sauce evenly over the top layer, smoothing it out with a spatula. Sprinkle with remaining grated cheese.",
    "Bake at 375°F (190°C) for 45 minutes until the top is deep golden brown and bubbling at the edges. Rest for at least 20 minutes before slicing and serving."
]

