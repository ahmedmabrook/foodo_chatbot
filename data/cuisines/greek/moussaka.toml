[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "ground lamb", substitute = "ground beef (80/20)", saving_percent = 35, reason = "Ground beef is widely available and significantly cheaper than lamb while providing similar texture and richness in the meat sauce" },
    { original = "Kefalotyri cheese", substitute = "Parmesan or Pecorino Romano", saving_percent = 20, reason = "These aged hard cheeses share a similar sharp, salty profile and are much easier to find at standard grocery prices" },
    { original = "dry red wine", substitute = "beef broth with 1 teaspoon red wine vinegar", saving_percent = 40, reason = "Provides similar depth and acidity for braising at a fraction of the cost, using pantry staples" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "Kefalotyri cheese", substitute = "Pecorino Romano or aged Parmesan", reason = "Kefalotyri is a Greek hard sheep's milk cheese rarely found outside specialty stores; Pecorino or Parmesan are widely available in any supermarket" },
    { original = "ground lamb", substitute = "ground beef or a 50/50 beef-pork mixture", reason = "Ground lamb can be hard to source in many regions; ground beef or mixed pork-beef gives a comparable rich meatiness" },
    { original = "canned crushed tomatoes", substitute = "canned diced tomatoes, pulsed briefly", reason = "Diced tomatoes are universally stocked and can be roughly blended to achieve the same texture" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "9x13 inch baking dish", substitute = "any large oven-safe roasting pan or two 8x8 dishes", reason = "The layered assembly just needs adequate depth and surface area; two smaller pans work equally well" },
    { original = "basting brush for eggplant", substitute = "paper towel dipped in oil or hands", reason = "Rubbing oil onto eggplant slices by hand or with a paper towel achieves the same even coating without a specialized brush" },
    { original = "wire whisk for bechamel", substitute = "a fork or wooden spoon with vigorous stirring", reason = "A fork or wooden spoon can adequately incorporate the roux and milk if stirred constantly and quickly to prevent lumps" }
]
