[recipe.healthy_variant]
variant_name = "Light Moussaka with Zucchini"
variant_type = "low_calorie"
description = "A lighter version replacing half the eggplant with zucchini, using lean ground turkey instead of lamb, and a Greek yogurt-based bechamel with significantly less butter and flour."
serving_size = "1 slice (approximately 350g)"
servings_per_recipe = 6
prep_time_minutes = 45
cook_time_minutes = 90

[recipe.healthy_variant.ingredients]
items = [
    "2 medium eggplants (about 600g), sliced 1cm thick",
    "2 medium zucchini (about 400g), sliced 1cm thick",
    "450g lean ground turkey (93% lean)",
    "2 medium onions, finely diced",
    "4 garlic cloves, minced",
    "400g canned crushed tomatoes",
    "60ml dry red wine",
    "1 tablespoon olive oil",
    "1 teaspoon ground cinnamon",
    "1/2 teaspoon ground allspice",
    "1/4 teaspoon ground nutmeg",
    "2 bay leaves",
    "Salt and black pepper to taste",
    "Cooking spray for vegetables",
    "30g unsalted butter",
    "40g all-purpose flour",
    "400ml low-fat milk, warmed",
    "250g non-fat Greek yogurt",
    "1 large egg, beaten",
    "40g Kefalotyri or Parmesan, grated",
    "Pinch of nutmeg for sauce"
]

[recipe.healthy_variant.instructions]
steps = [
    "Slice eggplants, salt, and drain for 30 minutes. Rinse and pat dry. Slice zucchini and pat dry.",
    "Spray vegetable slices lightly with cooking spray. Arrange on baking sheets and roast at 400°F (200°C) for 18 minutes, flipping halfway, until golden. Set aside.",
    "Heat 1 tablespoon olive oil in a large skillet over medium-high heat. Cook onions for 5 minutes until soft. Add garlic and cook 1 minute.",
    "Add ground turkey, breaking it up as it cooks, about 7 minutes until cooked through. Drain any liquid.",
    "Add red wine and reduce for 2 minutes. Add tomatoes, cinnamon, allspice, nutmeg, bay leaves, salt, and pepper. Simmer 20 minutes until thickened. Remove bay leaves.",
    "For the yogurt bechamel: melt butter in a saucepan, whisk in flour, cook 2 minutes. Gradually add warm milk, stirring constantly for 5 minutes until thickened. Remove from heat, cool 5 minutes, then whisk in Greek yogurt, beaten egg, half the cheese, and nutmeg.",
    "Preheat oven to 375°F (190°C). Lightly spray a 9x13 inch (23x33cm) baking dish. Layer eggplant on the bottom, then alternate remaining eggplant and zucchini slices.",
    "Spread meat sauce evenly over the vegetable layer, then top with remaining vegetable slices.",
    "Pour yogurt bechamel over the top and spread evenly. Sprinkle with remaining cheese.",
    "Bake at 375°F (190°C) for 40 minutes until golden brown. Rest 20 minutes before serving."
]

