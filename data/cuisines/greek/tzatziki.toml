    "2 tbsp extra-virgin olive oil",
    "1 tbsp fresh dill, finely chopped",
    "1 tbsp fresh mint, finely chopped (optional)",
    "1 tbsp lemon juice or white wine vinegar",
    "Salt to taste"
]

[recipe.standard.instructions]
steps = [
    "Grate the cucumber using a box grater. Place in a clean kitchen towel and squeeze out as much liquid as possible — this is the most important step. Excess cucumber water makes tzatziki runny.",
    "In a bowl, combine Greek yogurt, squeezed cucumber, minced garlic, olive oil, dill, mint (if using), and lemon juice.",
    "Season with salt. Mix well.",
    "Taste — adjust garlic, lemon, and salt to preference.",
    "Cover and refrigerate for at least 30 minutes before serving to allow flavors to meld.",
    "Serve drizzled with olive oil and a sprinkle of fresh dill. Traditionally served with warm pita, as a dip with vegetables, or as a sauce for grilled meats."
]

