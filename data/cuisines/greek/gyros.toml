[recipe.standard.ingredients]
items = [
    "600g pork shoulder, thinly sliced",
    "4 round pita breads",
    "Marinade: 2 tbsp olive oil, 1 tbsp red wine vinegar, 1 tbsp dried oregano",
    "Marinade: 1 tsp cumin, 1 tsp paprika, 1/2 tsp garlic powder, salt and pepper",
    "Tzatziki (for serving): 200g Greek yogurt, 1/2 cucumber grated, 2 cloves garlic, 1 tbsp olive oil, 1 tsp dill",
    "Toppings: 2 tomatoes diced, 1/2 red onion thinly sliced, fresh parsley",
    "French fries (optional, traditional in Greek-style wrap)"
]

[recipe.standard.instructions]
steps = [
    "Thinly slice pork shoulder across the grain into 3-5mm strips.",
    "Combine marinade: olive oil, vinegar, oregano, cumin, paprika, garlic powder, salt, and pepper. Marinate pork for at least 30 minutes (or overnight for best results).",
    "Make tzatziki: grate cucumber, squeeze dry, mix with Greek yogurt, minced garlic, olive oil, dill, salt. Refrigerate.",
    "Cook pork: heat a cast-iron grill pan or heavy skillet over very high heat (450°F/230°C). Cook marinated pork in batches for 2-3 minutes per side until charred at edges and cooked through. The char flavor is essential.",
    "Warm pita breads directly over a gas flame or in a dry pan for 30 seconds per side.",
    "Assemble: spread tzatziki on warm pita. Add cooked pork. Top with diced tomatoes, sliced red onion, and fresh parsley.",
    "Roll or fold and serve immediately."
]

