[recipe.standard.ingredients]
items = [
    "400g dried white beans (cannellini or gigantes), soaked overnight",
    "2 large onions, diced",
    "3 carrots, diced",
    "3 stalks celery, diced",
    "4 cloves garlic, minced",
    "400g canned crushed tomatoes",
    "4 tbsp extra-virgin olive oil",
    "2 tbsp tomato paste",
    "1 tsp dried oregano",
    "1 bay leaf",
    "Salt and black pepper to taste",
    "Extra olive oil and crusty bread for serving"
]

[recipe.standard.instructions]
steps = [
    "Drain soaked beans. Rinse well.",
    "Bring beans to a boil in a large pot of fresh unsalted water. Boil 10 minutes, skimming foam. Drain.",
    "In the same pot, heat 2 tbsp olive oil over medium heat. Sauté onions until soft, about 6 minutes. Add garlic and cook 1 minute.",
    "Add carrots and celery. Cook 5 minutes.",
    "Add tomato paste and stir 2 minutes. Add crushed tomatoes, oregano, bay leaf, and drained beans.",
    "Cover with 1.5 liters of water or vegetable broth. Bring to a boil.",
    "Reduce heat and simmer covered for 70-80 minutes until beans are very tender and creamy.",
    "Remove bay leaf. Add remaining olive oil. Season generously with salt and pepper.",
    "Crush a few beans against the side to thicken the broth naturally.",
    "Serve hot with crusty bread and a drizzle of olive oil."
]

