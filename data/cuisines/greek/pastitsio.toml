    "Meat sauce: 1/4 tsp allspice",
    "Meat sauce: 1/2 cup dry red wine",
    "Meat sauce: 2 tbsp olive oil, salt, pepper",
    "Béchamel: 4 cups whole milk",
    "Béchamel: 4 tbsp butter",
    "Béchamel: 4 tbsp all-purpose flour",
    "Béchamel: 2 eggs",
    "Béchamel: 60g Kefalotyri or Parmesan, grated",
    "Béchamel: pinch nutmeg, salt, white pepper"
]

[recipe.standard.instructions]
steps = [
    "Make meat sauce: brown ground beef in olive oil. Add onion, garlic, cinnamon, and allspice. Add tomato paste, cook 2 minutes. Add wine (reduce by half), then crushed tomatoes. Simmer 25-30 minutes until thick.",
    "Make béchamel: melt butter, whisk in flour (2 min roux). Gradually whisk in hot milk until smooth. Cook until thick. Off heat, whisk in eggs and half the cheese. Season with nutmeg, salt, pepper.",
    "Cook pasta to al dente. Drain. Toss with 2 tbsp of béchamel sauce.",
    "Preheat oven to 375°F (190°C). Grease a 9x13 dish.",
    "Spread half the pasta in the dish. Layer all the meat sauce. Top with remaining pasta. Pour all of the béchamel over, spreading to cover completely. Sprinkle with remaining cheese.",
    "Bake 35-40 minutes until top is golden and set. Rest 20 minutes before cutting — crucial for clean slices."
]

