[recipe.standard.ingredients]
items = [
    "4 large ripe tomatoes, cut into wedges",
    "1 large cucumber, cut into half-moons",
    "1 green bell pepper, sliced into rings",
    "1 red onion, thinly sliced",
    "150g Kalamata olives (with pits — traditional)",
    "200g feta cheese, kept in one large block (not crumbled)",
    "4 tbsp extra-virgin olive oil",
    "1 tsp dried Greek oregano",
    "Salt and black pepper to taste",
    "Optional: 1 tbsp red wine vinegar"
]

[recipe.standard.instructions]
steps = [
    "Cut tomatoes into large wedges. Do not use refrigerated tomatoes — they must be room temperature for best flavor.",
    "Cut cucumber lengthwise in half, then slice into thick half-moons about 1cm.",
    "Slice green pepper into thin rings. Slice red onion very thinly.",
    "Arrange tomatoes, cucumber, bell pepper, and onion in a large shallow bowl.",
    "Add Kalamata olives.",
    "Place the block of feta on top — do not crumble it. This is traditional.",
    "Drizzle generously with extra-virgin olive oil. Sprinkle dried oregano over the feta and vegetables.",
    "Season with salt and pepper. Add red wine vinegar if desired.",
    "Serve immediately at room temperature. Do not toss — let diners break the feta as they eat."
]

