[metadata]
doc_id = "greek_souvlaki"
cuisine = "Greek"
dish_name = "Souvlaki"
alternate_names = ["Pork Souvlaki", "Souvlakia", "Greek Kebab"]
category = "main_course"
tags = ["grilled", "pork", "skewer", "street food", "marinade", "traditional"]
allergens = ["gluten"]
difficulty = "easy"
total_time_minutes = 50

[recipe.standard]
serving_size = "2 skewers with pita (approximately 320g)"
servings_per_recipe = 4
prep_time_minutes = 20
cook_time_minutes = 15

[recipe.standard.ingredients]
items = [
    "800g pork shoulder or pork neck, cut into 3cm cubes",
    "4 pita breads",
    "60ml extra virgin olive oil",
    "3 tablespoons fresh lemon juice",
    "4 garlic cloves, minced",
    "2 teaspoons dried oregano",
    "1 teaspoon sweet paprika",
    "1/2 teaspoon black pepper",
    "1 teaspoon salt",
    "8 wooden or metal skewers",
    "1 medium red onion, thinly sliced (for serving)",
    "2 medium tomatoes, sliced (for serving)",
    "Fresh parsley, chopped (for garnish)",
    "Tzatziki sauce (for serving)"
]

[recipe.standard.instructions]
steps = [
    "If using wooden skewers, soak them in water for 30 minutes to prevent burning.",
    "Combine olive oil, lemon juice, minced garlic, dried oregano, paprika, salt, and pepper in a bowl to make the marinade. Add the pork cubes, toss thoroughly to coat, and marinate for at least 30 minutes at room temperature or up to 24 hours refrigerated.",
    "Thread the marinated pork cubes onto skewers, 4 to 5 pieces per skewer, leaving a small gap between each piece to ensure even cooking.",
    "Preheat a charcoal grill or gas grill to high heat, around 450°F (230°C). A cast-iron grill pan over high heat also works well.",
    "Grill the skewers for 10 to 12 minutes total, turning every 3 to 4 minutes on all four sides, until the pork is charred at the edges and cooked through to an internal temperature of 160°F (71°C).",
    "While the pork grills, warm the pita breads directly on the grill for about 1 minute per side until lightly charred and pliable.",
    "Slide pork off the skewers onto warmed pita. Top with sliced onion, tomato, fresh parsley, and a generous spoonful of tzatziki. Fold and serve immediately."
]

