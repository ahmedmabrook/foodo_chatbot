[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "pork shoulder/neck", substitute = "pork butt or pork loin on sale", saving_percent = 25, reason = "Pork butt is often cheaper per kilo and still has enough fat for juicy skewers; pork loin works well for leaner preference" },
    { original = "fresh lemon juice", substitute = "bottled lemon juice", saving_percent = 50, reason = "Bottled lemon juice is a fraction of the cost and works perfectly in a marinade where subtle fresh nuances are masked by grilling" },
    { original = "extra virgin olive oil", substitute = "regular olive oil or sunflower oil", saving_percent = 30, reason = "For a high-heat marinade the premium qualities of extra virgin are largely lost; regular olive oil or a neutral oil produces the same result at lower cost" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "charcoal grill", substitute = "gas grill, grill pan, or oven broiler", reason = "Traditional souvlaki uses charcoal for smokiness, but a cast-iron grill pan or oven broiler at high heat delivers excellent char and flavor at home" },
    { original = "pork neck", substitute = "pork shoulder or chicken thighs", reason = "Pork neck can be hard to find in many butcher shops; shoulder has similar fat content, or boneless thighs provide equivalent juiciness" },
    { original = "dried Greek oregano", substitute = "regular dried Italian oregano", reason = "Greek oregano has a more intense aroma but standard dried oregano found in any supermarket gives a very comparable flavor in this dish" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "metal skewers", substitute = "soaked wooden chopsticks or bamboo satay skewers", reason = "Any long wooden skewer soaked in water for 30 minutes works just as well for threading meat on a home grill or grill pan" },
    { original = "grill or grill pan", substitute = "oven broiler set to high", reason = "Place skewers on a rack-lined baking sheet under the broiler at 500°F (260°C), turning halfway, for a similar charred finish without specialized equipment" },
    { original = "fresh garlic", substitute = "garlic powder (1/4 tsp per clove)", reason = "Garlic powder is a pantry staple that integrates evenly into the marinade and delivers the necessary garlic flavor without mincing" }
]
