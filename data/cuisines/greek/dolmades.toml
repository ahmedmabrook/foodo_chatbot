total_time_minutes = 90

[recipe.standard]
serving_size = "5-6 dolmades (approximately 180g)"
servings_per_recipe = 6
prep_time_minutes = 50
cook_time_minutes = 40

[recipe.standard.ingredients]
items = [
    "40 jarred grape leaves, rinsed",
    "1.5 cups short-grain rice, rinsed",
    "2 large onions, finely diced",
    "1/2 cup fresh dill, finely chopped",
    "1/2 cup fresh mint, finely chopped",
    "1/2 cup fresh parsley, finely chopped",
    "1/4 cup pine nuts (optional)",
    "1/4 cup raisins (optional)",
    "4 tbsp extra-virgin olive oil",
    "Juice of 2 lemons",
    "Salt and black pepper to taste",
    "Water or light broth for cooking"
]

[recipe.standard.instructions]
steps = [
    "Rinse grape leaves in cold water. Pat dry. Remove any tough stems.",
    "Sauté diced onions in 2 tbsp olive oil until soft and lightly golden. Cool.",
    "Mix raw rice with sautéed onions, dill, mint, parsley, pine nuts, raisins, remaining olive oil, juice of 1 lemon, salt, and pepper. The filling should be well-seasoned.",
    "Lay a grape leaf vein-side up. Place 1 tsp filling near the stem. Fold the bottom up, fold in sides, roll into a tight cylinder. Do not overfill — rice expands during cooking.",
    "Line the base of a pot with a few extra grape leaves. Arrange dolmades tightly in layers seam-side down.",
    "Mix remaining lemon juice with 1.5 cups water. Pour over the dolmades. Place a heavy plate on top to keep them in place.",
    "Bring to a simmer. Cover and cook on very low heat for 35-40 minutes until rice is fully cooked. Add more water if needed.",
    "Cool to room temperature. Serve with lemon wedges and Greek yogurt or tzatziki."
]

