# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 sandwich (approximately 280g)"
servings_per_recipe = 4
prep_time_minutes = 20
cook_time_minutes = 30

[recipe.standard.ingredients]
items = [
    "4 round pita bread rounds (thick Egyptian baladi bread preferred)",
    "500g ground beef (80% lean)",
    "1 large onion, very finely diced or grated",
    "1 medium green bell pepper, finely diced",
    "4 cloves garlic, minced",
    "1/2 cup fresh parsley, finely chopped",
    "1 medium tomato, finely diced",
    "1 tsp cumin",
    "1 tsp coriander",
    "1/2 tsp black pepper",
    "1/2 tsp chili flakes",
    "1/2 tsp cinnamon",
    "Salt to taste",
    "2 tbsp vegetable oil (for brushing)"
]

[recipe.standard.instructions]
steps = [
    "Combine ground beef, grated onion, diced bell pepper, garlic, parsley, tomato, cumin, coriander, black pepper, chili flakes, cinnamon, and salt in a large bowl. Mix very well with your hands for 2 minutes until fully combined.",
    "Slit each pita bread halfway around the edge to create a pocket. Do not fully separate the two halves.",
    "Stuff each pita generously with the raw meat mixture, pressing it to fill evenly. Seal the edges by pressing firmly.",
    "Brush both sides of each stuffed pita lightly with vegetable oil.",
    "Heat a heavy skillet, griddle, or panini press over medium-high heat (375°F/190°C). Cook each hawawshi for 4-5 minutes per side, pressing down firmly, until bread is crispy and golden brown and meat is fully cooked through.",
    "Alternatively, bake at 425°F (220°C) for 20-25 minutes, flipping halfway through.",
    "Let rest 2 minutes before cutting in half. Serve with sliced tomatoes and pickled vegetables."
]

[recipe.standard.macros]
calories = 500
protein_g = 28
carbs_g = 48
fat_g = 22
fiber_g = 4
sugar_g = 4
sodium_mg = 520
