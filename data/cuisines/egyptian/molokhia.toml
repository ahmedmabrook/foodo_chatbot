# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 bowl with rice (approximately 400g)"
servings_per_recipe = 4
prep_time_minutes = 20
cook_time_minutes = 55

[recipe.standard.ingredients]
items = [
    "1 whole chicken (about 1.5 kg), cut into pieces",
    "500g fresh or frozen molokhia leaves (jute mallow), finely chopped",
    "2 cups long-grain rice",
    "1 large onion, halved",
    "6 cloves garlic, minced",
    "2 tbsp coriander (ground)",
    "1 tbsp ghee or butter",
    "4 cups chicken broth (from boiling chicken)",
    "2 bay leaves",
    "1 cinnamon stick",
    "Salt and black pepper to taste",
    "1 tbsp white vinegar (for serving)",
    "Toasted bread pieces (for serving)"
]

[recipe.standard.instructions]
steps = [
    "Place chicken pieces in a large pot with onion halves, bay leaves, cinnamon stick, salt, and pepper. Cover with water and bring to a boil. Skim the foam, then reduce heat and simmer for 45 minutes until chicken is tender.",
    "Remove chicken pieces and strain the broth. Set aside 4 cups of broth for the molokhia. Cook rice in 2 cups of broth and 1.5 cups water until fluffy. Set aside.",
    "In a large pot, heat ghee over medium heat (350°F/175°C). Add minced garlic and ground coriander. Sauté for 30-45 seconds, stirring constantly, until fragrant — this is called 'ta'leyya' and is the defining flavor of molokhia.",
    "Immediately pour in the 4 cups of hot chicken broth over the garlic-coriander mixture. Bring to a boil.",
    "Add the finely chopped molokhia leaves all at once. Stir once and bring back to a boil. Cook for exactly 3-4 minutes — do not overcook or the texture becomes slimy.",
    "Taste and adjust seasoning with salt and pepper.",
    "To serve: place rice in a bowl, ladle molokhia soup over it, top with pieces of chicken. Serve with toasted bread and vinegar-soaked onions on the side."
]

[recipe.standard.macros]
calories = 350
protein_g = 28
carbs_g = 24
fat_g = 16
fiber_g = 4
sugar_g = 2
sodium_mg = 480
