# SUBSTITUTIONS
# ============================================================
[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "beef stew meat", substitute = "chicken thighs (bone-in)", saving_percent = 40, reason = "Chicken thighs are much cheaper than beef and become very tender in stews; okra pairs beautifully with chicken" },
    { original = "fresh okra", substitute = "frozen okra", saving_percent = 50, reason = "Frozen okra is available year-round at lower cost and works identically in stews" },
    { original = "canned crushed tomatoes", substitute = "fresh tomatoes, peeled and crushed", saving_percent = 30, reason = "Fresh tomatoes in season are cheaper; simply blanch, peel, and crush them" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "fresh okra", substitute = "green beans (trim ends, cut into 3cm pieces)", reason = "Green beans are universally available and create a similar hearty stew when the okra is unavailable" },
    { original = "cumin", substitute = "curry powder (use half the amount)", reason = "Curry powder contains cumin and will add warmth with a slightly different flavor profile" },
    { original = "canned crushed tomatoes", substitute = "2 tbsp tomato paste + 1.5 cups water", reason = "Diluted tomato paste creates a quick tomato base when canned tomatoes are unavailable" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "lemon juice", substitute = "white vinegar (use half the amount)", reason = "Vinegar provides the tartness that balances the richness of the meat stew" },
    { original = "coriander (ground)", substitute = "cumin (extra, or combined with black pepper)", reason = "Extra cumin and black pepper approximate the warmth of coriander" },
    { original = "vegetable oil", substitute = "any neutral cooking oil or butter", reason = "Any cooking fat works for browning the meat at the start" }
]
