# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 bowl with rice (approximately 380g)"
servings_per_recipe = 4
prep_time_minutes = 15
cook_time_minutes = 55

[recipe.standard.ingredients]
items = [
    "500g beef stew meat (chuck or round), cut into 3cm cubes",
    "500g fresh or frozen okra, ends trimmed",
    "1 large onion, diced",
    "6 cloves garlic, minced",
    "400g canned crushed tomatoes",
    "2 tbsp tomato paste",
    "2 tbsp vegetable oil",
    "1 tsp cumin",
    "1 tsp coriander",
    "1/2 tsp black pepper",
    "1/4 tsp cinnamon",
    "Salt to taste",
    "Juice of 1 lemon",
    "2 cups long-grain rice (for serving)"
]

[recipe.standard.instructions]
steps = [
    "Heat oil in a large heavy pot over medium-high heat (375°F/190°C). Brown beef cubes on all sides, about 5-6 minutes total. Remove and set aside.",
    "In the same pot, sauté diced onion until golden, about 5 minutes. Add garlic, cumin, coriander, cinnamon, and black pepper. Cook 1 minute.",
    "Add tomato paste and cook 2 minutes, stirring. Add crushed tomatoes and browned beef. Add 1.5 cups water. Season with salt.",
    "Bring to a boil, then reduce heat to low. Cover and simmer for 35-40 minutes until beef is nearly tender.",
    "Add okra to the pot. Do not stir too aggressively once okra is added to minimize sliminess.",
    "Add lemon juice. Cook uncovered for 15-20 minutes until okra is tender and sauce has thickened.",
    "Cook rice separately. Serve bamia over rice."
]

[recipe.standard.macros]
calories = 310
protein_g = 24
carbs_g = 22
fat_g = 14
fiber_g = 6
sugar_g = 5
sodium_mg = 440
