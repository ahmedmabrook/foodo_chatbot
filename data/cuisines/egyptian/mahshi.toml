    "1 cup fresh parsley, finely chopped",
    "1/2 cup fresh mint, finely chopped",
    "1/2 cup fresh dill, finely chopped",
    "1 tbsp olive oil",
    "1 tsp cumin",
    "1 tsp coriander",
    "1/2 tsp allspice",
    "Salt and black pepper to taste",
    "Juice of 3 lemons",
    "1 cup vegetable broth"
]

[recipe.healthy_variant.instructions]
