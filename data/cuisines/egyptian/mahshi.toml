# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 plate (approximately 350g, 8-10 pieces)"
servings_per_recipe = 6
prep_time_minutes = 60
cook_time_minutes = 60

[recipe.standard.ingredients]
items = [
    "30 fresh or jarred grape leaves (or 4 medium bell peppers and 2 zucchini)",
    "2 cups short-grain rice, washed and soaked 20 minutes",
    "400g ground beef or lamb (optional — omit for vegetarian)",
    "3 medium tomatoes, diced",
    "1 large onion, finely diced",
    "1/2 cup fresh parsley, finely chopped",
    "1/2 cup fresh dill, finely chopped",
    "4 tbsp olive oil",
    "2 tbsp tomato paste",
    "1 tsp cumin",
    "1 tsp coriander",
    "1 tsp allspice",
    "1/2 tsp cinnamon",
    "Salt and black pepper to taste",
    "Juice of 2 lemons",
    "1 cup chicken or vegetable broth"
]

[recipe.standard.instructions]
steps = [
    "Prepare the stuffing: combine soaked rice, diced tomatoes, onion, parsley, dill, 2 tbsp olive oil, tomato paste, cumin, coriander, allspice, cinnamon, salt, and pepper in a large bowl. If using meat, add it now. Mix thoroughly.",
    "If using grape leaves: blanch fresh leaves in boiling water for 2 minutes to soften. Rinse jarred leaves. Pat dry. If stuffing peppers or zucchini: cut tops off peppers and hollow out seeds; cut zucchini tops and hollow with a spoon.",
    "For grape leaves: place a leaf vein-side up. Add 1 tsp of stuffing near the stem end. Fold the bottom up, fold in the sides, then roll tightly into a finger-sized cylinder. Do not overfill — the rice will expand.",
    "For peppers/zucchini: fill each with stuffing, leaving 1 cm at the top for rice expansion.",
    "Line a heavy pot with sliced tomatoes or empty grape leaves to prevent sticking. Arrange stuffed grape leaves tightly in layers seam-side down. Place stuffed peppers/zucchini upright around the pot.",
    "Mix lemon juice, remaining olive oil, and broth. Pour over the mahshi. Place a heavy plate on top to keep rolls in place. Add water to just cover.",
    "Bring to a boil over high heat, then reduce to low. Cover and simmer for 45-55 minutes until rice is fully cooked and liquid is absorbed. Check after 40 minutes.",
    "Remove from heat and let rest 10 minutes before uncovering and serving."
]

[recipe.standard.macros]
calories = 410
protein_g = 18
carbs_g = 52
fat_g = 14
fiber_g = 5
sugar_g = 4
sodium_mg = 420
# VALIDATION: (18×4) + (52×4) + (14×9) = 72 + 208 + 126 = 406 ✓ (within ±10 of 410)

