# ============================================================
# SUBSTITUTIONS
# ============================================================
[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "fresh grape leaves", substitute = "jarred grape leaves in brine", saving_percent = 40, reason = "Jarred grape leaves are widely available, cost less, and require no blanching — just rinse to reduce saltiness" },
    { original = "ground lamb", substitute = "ground beef", saving_percent = 35, reason = "Ground beef is significantly cheaper than lamb and works equally well in the filling" },
    { original = "fresh dill and parsley", substitute = "dried herbs (use 1/3 the amount)", saving_percent = 70, reason = "Dried herbs cost a fraction of fresh and provide similar flavor when cooked into the filling" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "grape leaves", substitute = "cabbage leaves (blanched to soften)", reason = "Cabbage leaves are universally available and make excellent mahshi rolls with a mild flavor" },
    { original = "short-grain rice", substitute = "any white rice (medium-grain works best)", reason = "Short-grain is traditional but medium-grain rice is available everywhere and works well" },
    { original = "allspice", substitute = "equal parts cinnamon and black pepper", reason = "Allspice can be hard to find; this combination approximates its warm, slightly spicy flavor" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "fresh lemon juice", substitute = "2 tbsp white vinegar diluted in 2 tbsp water", reason = "Vinegar provides the same tartness needed for the cooking liquid" },
    { original = "tomato paste", substitute = "2 tbsp ketchup or crushed canned tomatoes", reason = "Both provide tomato flavor and color for the stuffing mixture" },
    { original = "vegetable broth", substitute = "water with 1 tsp salt and a pinch of turmeric", reason = "Plain water with seasoning works as the cooking liquid" }
]
