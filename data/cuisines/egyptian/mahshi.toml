    "Prepare cauliflower rice: grate or pulse cauliflower florets in a food processor until rice-sized. Squeeze out excess moisture with a clean towel.",
    "Mix cauliflower rice with diced tomatoes, onion, parsley, mint, dill, olive oil, cumin, coriander, allspice, salt, and pepper. Let sit 10 minutes.",
    "Blanch grape leaves in boiling water for 2 minutes. Pat dry.",
    "Roll grape leaves: place leaf vein-side up, add 1 tsp cauliflower filling near stem. Fold bottom up, fold in sides, roll into a tight cylinder.",
    "Line a pot with tomato slices. Arrange stuffed grape leaves tightly seam-side down in layers.",
    "Pour lemon juice, broth, and a pinch of salt over the rolls. Place a heavy plate on top.",
    "Bring to a boil, then reduce to low heat. Simmer for 30-35 minutes until grape leaves are very tender. Cauliflower cooks faster than rice — check at 25 minutes."
]

