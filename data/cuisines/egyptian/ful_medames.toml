items = [
    { original = "Canned small fava beans (ful medames)", substitute = "Dried fava beans soaked overnight and boiled 90 minutes", saving_percent = 60, reason = "Dried fava beans cost a fraction of canned versions and produce superior flavor when cooked from scratch" },
    { original = "Extra virgin olive oil", substitute = "Regular olive oil or sunflower oil", saving_percent = 30, reason = "Extra virgin olive oil is the most expensive olive oil tier; regular olive oil provides the same fat with similar flavor at lower cost" },
    { original = "Fresh lemon juice", substitute = "Bottled lemon juice (use same quantity)", saving_percent = 50, reason = "Bottled lemon juice is significantly cheaper and works well in cooked dishes like ful" }
]

