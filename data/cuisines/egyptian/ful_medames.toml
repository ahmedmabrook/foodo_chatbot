[metadata]
doc_id = "egyptian_ful_medames"
cuisine = "Egyptian"
dish_name = "Ful Medames"
alternate_names = ["Foul Medames", "Fool Medames", "Egyptian Fava Beans"]
category = "breakfast"
tags = ["vegan", "breakfast", "fava_beans", "street_food", "high_protein", "traditional", "gluten_free"]
allergens = ["none"]
difficulty = "easy"
total_time_minutes = 40

[recipe.standard]
serving_size = "1 bowl (approximately 300g)"
servings_per_recipe = 4
prep_time_minutes = 10
cook_time_minutes = 30

[recipe.standard.ingredients]
items = [
    "2 cans (800g total) small fava beans (ful medames), drained and rinsed",
    "4 cloves garlic, minced",
    "4 tablespoons fresh lemon juice (about 2 lemons)",
    "3 tablespoons extra virgin olive oil, divided",
    "1 teaspoon ground cumin",
    "1/2 teaspoon ground coriander",
    "1/4 teaspoon cayenne pepper",
    "Salt and black pepper to taste",
    "4 hard-boiled eggs, halved (for serving)",
    "1/4 cup fresh flat-leaf parsley, finely chopped",
    "2 medium tomatoes, diced",
    "1 small green chili, finely sliced (optional)",
    "4 rounds Egyptian baladi bread or pita, for serving"
]

[recipe.standard.instructions]
steps = [
    "Drain and rinse the canned fava beans. Place them in a medium saucepan with just enough water to cover (about 1 cup). Warm over medium heat (350°F/175°C).",
    "Once the beans are heated through, mash roughly one-third of the beans against the side of the pot with a fork or potato masher, leaving the rest whole. This creates a thick, creamy texture while retaining some whole beans.",
    "Add minced garlic, lemon juice, 2 tablespoons olive oil, cumin, coriander, cayenne, salt, and pepper to the pot. Stir well and simmer over medium-low heat for 10-12 minutes until flavors are fully absorbed and the mixture is thick and creamy.",
    "Taste and adjust seasoning — ful should be garlicky, lemony, and well-cumin-forward. Add more lemon or salt as needed.",
    "Ladle into shallow bowls. Drizzle remaining 1 tablespoon olive oil over each portion. Top with diced tomatoes, chopped parsley, and green chili slices.",
    "Serve hot alongside hard-boiled egg halves and warm baladi bread for scooping. Ful must be eaten immediately while hot."
]

[recipe.standard.macros]
calories = 390
protein_g = 20
carbs_g = 52
fat_g = 12
fiber_g = 14
sugar_g = 5
sodium_mg = 480

