# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "5-6 falafel pieces in pita (approximately 280g)"
servings_per_recipe = 4
prep_time_minutes = 30
cook_time_minutes = 30

[recipe.standard.ingredients]
items = [
    "2 cups dried fava beans (broad beans), soaked overnight and peeled",
    "1/2 cup fresh parsley",
    "1/2 cup fresh cilantro",
    "1/2 cup fresh dill",
    "1 small onion, roughly chopped",
    "6 cloves garlic",
    "1 tsp cumin",
    "1 tsp coriander",
    "1/2 tsp black pepper",
    "1/2 tsp baking powder",
    "Salt to taste",
    "Sesame seeds (for coating, optional)",
    "Vegetable oil for deep frying",
    "4 pita breads (for serving)",
    "Tahini sauce, sliced tomatoes, pickles (for serving)"
]

[recipe.standard.instructions]
steps = [
    "Soak dried fava beans in water overnight (at least 12 hours). Drain. Peel off the outer skins if not already split and peeled.",
    "IMPORTANT: Do NOT cook the beans. Egyptian falafel uses raw soaked fava beans, unlike some other versions. This gives them their unique bright green interior.",
    "In a food processor, combine peeled soaked fava beans, parsley, cilantro, dill, onion, and garlic. Pulse until a coarse paste forms — it should not be completely smooth. Small pieces should still be visible.",
    "Transfer to a bowl. Add cumin, coriander, black pepper, baking powder, and salt. Mix well. Refrigerate the mixture for 30 minutes — this helps the falafel hold together.",
    "Heat vegetable oil in a deep pan to 350°F (175°C). The oil should be at least 5cm deep.",
    "Using wet hands or a falafel mold, shape mixture into flat patties (Egyptian ta'ameya are disc-shaped, not ball-shaped). Roll edges in sesame seeds if using.",
    "Fry in batches of 4-5 for 3-4 minutes per side, flipping once, until deep golden brown. Do not crowd the pan. Drain on paper towels.",
    "Serve immediately in pita with tahini sauce, sliced tomatoes, pickles, and salad."
]

[recipe.standard.macros]
calories = 380
protein_g = 14
carbs_g = 36
fat_g = 20
fiber_g = 10
sugar_g = 3
sodium_mg = 480
