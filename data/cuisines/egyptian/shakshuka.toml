# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "2 eggs with sauce (approximately 320g)"
servings_per_recipe = 4
prep_time_minutes = 10
cook_time_minutes = 20

[recipe.standard.ingredients]
items = [
    "8 large eggs",
    "3 large ripe tomatoes, diced (or 400g canned crushed tomatoes)",
    "1 large green bell pepper, diced",
    "1 large onion, diced",
    "4 cloves garlic, minced",
    "2 tbsp tomato paste",
    "3 tbsp olive oil",
    "1 tsp cumin",
    "1 tsp paprika",
    "1/2 tsp chili powder or fresh chili",
    "1/2 tsp black pepper",
    "Salt to taste",
    "Fresh parsley or cilantro for garnish",
    "Crusty bread or pita for serving"
]

[recipe.standard.instructions]
steps = [
    "Heat olive oil in a large, wide skillet or cast-iron pan over medium heat (350°F/175°C). Add diced onion and bell pepper. Cook for 7-8 minutes until soft and slightly caramelized.",
    "Add garlic, cumin, paprika, chili, and black pepper. Cook for 1 minute until fragrant.",
    "Add tomato paste and stir for 1-2 minutes. Add diced tomatoes (or canned crushed tomatoes). Season with salt. Stir well.",
    "Simmer the tomato sauce over medium-low heat for 10 minutes until thickened and flavors meld. Taste and adjust seasoning.",
    "Use a spoon to create 8 wells in the sauce. Carefully crack one egg into each well.",
    "Cover the pan with a lid. Cook over medium-low heat for 6-8 minutes for runny yolks, or 10-12 minutes for fully set yolks.",
    "Garnish with fresh chopped parsley or cilantro. Serve immediately from the pan with warm pita or crusty bread."
]

[recipe.standard.macros]
calories = 310
protein_g = 18
carbs_g = 20
fat_g = 18
fiber_g = 4
sugar_g = 8
sodium_mg = 440
