    "100g kale, stems removed and chopped",
    "2 green bell peppers, diced",
    "1 large onion, diced",
    "4 cloves garlic, minced",
    "1 jalapeno or green chili, minced",
    "1 tsp cumin",
    "1/2 tsp coriander",
    "1 tbsp olive oil",
    "Juice of half a lemon",
    "Salt and black pepper to taste",
    "30g feta cheese, crumbled (optional, for serving)"
]

[recipe.healthy_variant.instructions]
steps = [
    "Heat olive oil in a wide skillet over medium heat (350°F/175°C). Add onion and green peppers. Cook 6-7 minutes until soft.",
    "Add garlic, jalapeno, cumin, and coriander. Cook 1 minute.",
    "Add kale and cook 3 minutes, stirring. Add spinach and cook until wilted, about 2 minutes. Season with salt, pepper, and lemon juice.",
    "Flatten the greens base with a spoon. Create 8 wells (4 for whole eggs, 4 for egg whites).",
    "Carefully crack a whole egg into 4 wells. Pour egg whites into the remaining 4 wells.",
    "Cover and cook over medium-low heat for 6-8 minutes until whites are set but yolks are still slightly runny.",
    "Top with crumbled feta if using. Serve with whole wheat pita."
]

