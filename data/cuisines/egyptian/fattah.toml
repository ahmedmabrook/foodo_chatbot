# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 large plate (approximately 500g)"
servings_per_recipe = 6
prep_time_minutes = 30
cook_time_minutes = 90

[recipe.standard.ingredients]
items = [
    "1.5 kg bone-in lamb or beef (shoulder or shank)",
    "2 cups Egyptian short-grain rice",
    "4 large pita bread rounds, torn into pieces and toasted",
    "2 cups plain full-fat yogurt",
    "6 cloves garlic, minced",
    "2 cups tomato sauce (from simmered tomatoes with garlic)",
    "2 large onions (1 halved for broth, 1 diced for sauce)",
    "2 tbsp white vinegar",
    "2 tbsp ghee or butter",
    "1 tbsp cumin",
    "1 cinnamon stick",
    "3 cardamom pods",
    "Salt and black pepper to taste",
    "Fresh parsley, chopped (for garnish)"
]

[recipe.standard.instructions]
steps = [
    "Place meat in a large pot with halved onion, cinnamon stick, cardamom pods, cumin, salt, and pepper. Cover with water and bring to a boil. Skim foam. Reduce to a simmer and cook 1.5 hours until very tender.",
    "Remove meat and strain the broth. Reserve 4 cups of broth. Cook rice in 2 cups broth plus 1.5 cups water with a pinch of salt and a tbsp of ghee until fluffy, about 18 minutes.",
    "Make the tomato sauce: sauté diced onion in 1 tbsp ghee until soft. Add garlic, cook 1 minute. Add tomato sauce and vinegar. Season with salt, cumin, and pepper. Simmer 15 minutes until thickened.",
    "Toast pita bread pieces in the oven at 375°F (190°C) for 8-10 minutes until crispy and golden.",
    "Shred or slice the cooked meat off the bone.",
    "To assemble: place toasted pita pieces in a large deep serving dish. Ladle 1-2 cups of hot meat broth over the bread to slightly soften it.",
    "Spread a layer of cooked rice over the soaked bread. Arrange meat on top.",
    "Pour tomato sauce over everything. Drizzle cold yogurt generously on top. Garnish with parsley. Serve immediately while the layers are hot."
]

[recipe.standard.macros]
calories = 560
protein_g = 32
carbs_g = 72
fat_g = 16
fiber_g = 4
sugar_g = 6
sodium_mg = 620
