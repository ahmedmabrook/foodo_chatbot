# SUBSTITUTIONS
# ============================================================
[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "lamb shoulder", substitute = "beef chuck or beef shank", saving_percent = 40, reason = "Beef is significantly cheaper than lamb and becomes equally tender when slow-braised" },
    { original = "full-fat yogurt", substitute = "sour cream diluted with 2 tbsp milk", saving_percent = 20, reason = "Diluted sour cream provides similar richness and tang for the topping" },
    { original = "ghee", substitute = "vegetable oil or butter", saving_percent = 60, reason = "Ghee is clarified butter — regular butter or neutral oil works well for cooking the rice and sauce" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "Egyptian short-grain rice", substitute = "Arborio or any short-grain white rice", reason = "Egyptian rice is similar to Arborio; any short-grain white rice gives the correct texture" },
    { original = "pita bread", substitute = "any flatbread or thick white bread, toasted", reason = "The bread layer just needs to be sturdy enough to absorb broth without dissolving" },
    { original = "cardamom pods", substitute = "1/4 tsp ground cardamom or omit", reason = "Ground cardamom is widely available; the dish works without it if unavailable" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "tomato sauce", substitute = "2 tbsp tomato paste + 1 cup water, simmered", reason = "Tomato paste is a common pantry staple that creates a quick cooking sauce" },
    { original = "plain yogurt (for topping)", substitute = "sour cream or cream mixed with lemon juice", reason = "Any tangy dairy topping replicates the cooling effect of yogurt" },
    { original = "white vinegar", substitute = "lemon juice", reason = "Lemon juice provides the same acidity needed to cut through the richness of the dish" }
]
