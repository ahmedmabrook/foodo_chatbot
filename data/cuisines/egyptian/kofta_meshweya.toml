# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "4 kofta skewers (approximately 300g)"
servings_per_recipe = 4
prep_time_minutes = 20
cook_time_minutes = 15

[recipe.standard.ingredients]
items = [
    "700g ground beef (80% lean) or mixed beef and lamb",
    "1 large onion, grated (squeeze out excess liquid)",
    "1/2 cup fresh parsley, very finely chopped",
    "4 cloves garlic, minced",
    "1 tsp cumin",
    "1 tsp coriander",
    "1 tsp paprika",
    "1/2 tsp allspice",
    "1/2 tsp cinnamon",
    "1/2 tsp black pepper",
    "1/2 tsp chili flakes (optional)",
    "Salt to taste",
    "Wooden or metal skewers"
]

[recipe.standard.instructions]
steps = [
    "Combine ground meat with grated onion (liquid squeezed out), parsley, garlic, cumin, coriander, paprika, allspice, cinnamon, black pepper, chili flakes, and salt. Mix very thoroughly with your hands for 3 minutes until the mixture becomes cohesive and sticky.",
    "Refrigerate the mixture for at least 15 minutes (or up to overnight) to allow the spices to meld and the mixture to firm up — this prevents the kofta from falling off the skewers.",
    "Divide mixture into 16 equal portions. Wet your hands with cold water. Take each portion and mold it firmly around a flat metal skewer or dampened wooden skewer, pressing and squeezing to create a long oval shape about 12-15cm.",
    "Preheat grill or grill pan to high heat (450°F/230°C). Lightly oil the grates.",
    "Grill kofta for 3-4 minutes per side, turning carefully once, until cooked through and nicely charred. Total cooking time about 12-15 minutes. Internal temperature should reach 160°F (71°C).",
    "Rest 2 minutes off the heat. Serve with pita bread, sliced tomatoes, onion rings, and tahini sauce."
]

[recipe.standard.macros]
calories = 370
protein_g = 34
carbs_g = 8
fat_g = 22
fiber_g = 2
sugar_g = 2
sodium_mg = 420
