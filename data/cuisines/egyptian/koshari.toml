[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "Ditalini pasta", substitute = "Broken spaghetti or any small pasta on hand", saving_percent = 40, reason = "Specialty small pasta shapes are more expensive; any short pasta works identically in this dish" },
    { original = "Brown lentils", substitute = "Split red lentils (reduce cook time to 12 min)", saving_percent = 20, reason = "Red lentils are often cheaper and more widely available, though they soften more" },
    { original = "Crushed tomatoes (canned)", substitute = "Fresh tomatoes blended and cooked down", saving_percent = 35, reason = "Fresh tomatoes in season cost far less and produce an equally authentic sauce" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "Egyptian short-grain rice", substitute = "Any short-grain or medium-grain white rice", reason = "The sticky texture of short-grain rice is key; any short or medium grain variety produces nearly identical results" },
    { original = "Vermicelli noodles (sha'riya)", substitute = "Orzo pasta or thin broken angel hair", reason = "Traditional Egyptian vermicelli may not be available outside Egypt; orzo replicates the toasted noodle flavor when browned in oil" },
    { original = "White vinegar (for da'a sauce)", substitute = "Apple cider vinegar or lemon juice", reason = "The acidic tang of the sauce can be replicated with apple cider vinegar or fresh lemon juice" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "Vegetable oil for frying", substitute = "Any neutral cooking oil (sunflower, canola)", reason = "Any high smoke-point neutral oil works perfectly for frying the onions" },
    { original = "Tomato paste", substitute = "Extra crushed tomatoes reduced longer", reason = "Cooking down extra canned tomatoes for 10 more minutes concentrates flavor similarly to paste" },
    { original = "Ground coriander", substitute = "Extra cumin (double the quantity)", reason = "Cumin is the dominant spice in koshari; omitting coriander and adding extra cumin keeps the flavor authentic" }
]
