[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "brioche buns", substitute = "standard sesame-seed hamburger buns", saving_percent = 55, reason = "Brioche buns cost 2–3x more; standard buns hold the burger just as well for everyday cooking" },
    { original = "80/20 ground beef", substitute = "store-brand ground chuck (75/25)", saving_percent = 20, reason = "Store-brand chuck is nearly identical in flavor; drain excess fat after cooking to reduce grease" },
    { original = "beefsteak tomato", substitute = "roma tomatoes, sliced", saving_percent = 30, reason = "Roma tomatoes are consistently cheaper and available year-round while providing the same fresh flavor" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "American cheese slices", substitute = "cheddar or Colby Jack slices", reason = "American cheese can be hard to find outside the US; cheddar melts similarly and is globally available" },
    { original = "dill pickles", substitute = "any brined cucumber pickles or pickled jalapeños", reason = "Dill pickles are a regional product; any tangy pickled vegetable provides the same acidity and crunch" },
    { original = "brioche buns", substitute = "any soft white or potato rolls", reason = "Brioche is a specialty item in many markets; soft potato or milk rolls offer the same tender texture" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "cast-iron skillet", substitute = "any heavy-bottomed stainless steel or nonstick pan", reason = "Cast iron retains heat best but any sturdy pan on high heat will produce a good crust" },
    { original = "garlic powder", substitute = "2 cloves fresh garlic, minced and mixed into the meat", reason = "Fresh garlic works perfectly mixed into the patty; use approximately 1/2 teaspoon per clove replacing powder" },
    { original = "mayonnaise", substitute = "softened butter or sour cream", reason = "Both provide richness and help the condiment adhere; butter is almost always on hand" }
]
