difficulty = "easy"
total_time_minutes = 55

[recipe.standard]
serving_size = "6 wings (approximately 300g)"
servings_per_recipe = 4
prep_time_minutes = 15
cook_time_minutes = 40

[recipe.standard.ingredients]
items = [
    "1.2 kg chicken wings, split at joint into flats and drumettes",
    "1/2 cup hot sauce (Frank's RedHot or similar)",
    "1/3 cup unsalted butter",
    "1 tbsp white vinegar",
    "1/2 tsp garlic powder",
    "1/2 tsp Worcestershire sauce",
    "1 tsp baking powder (for crispiness — not baking soda)",
    "Salt to taste",
    "Vegetable oil for deep frying (or baking as alternative)",
    "Blue cheese dressing and celery sticks for serving"
]

[recipe.standard.instructions]
steps = [
    "Pat wings completely dry with paper towels — this is critical for crispiness.",
    "Toss wings with baking powder and salt. For maximum crispiness, refrigerate uncovered on a wire rack for 1-8 hours to dry out the skin.",
    "Deep fry option: heat oil to 375°F (190°C) in a deep pot. Fry wings in batches for 10-12 minutes until golden brown and cooked through (165°F/74°C internal). Drain on paper towels.",
    "Alternatively, bake: preheat oven to 425°F (220°C). Place wings on a wire rack over a baking sheet. Bake 40-45 minutes, flipping halfway, until crispy.",
    "Make the Buffalo sauce: melt butter in a small saucepan over low heat. Add hot sauce, vinegar, garlic powder, and Worcestershire. Whisk until smooth. Do not boil.",
    "Immediately toss the hot crispy wings in the Buffalo sauce until fully coated.",
    "Serve immediately with blue cheese dressing and celery sticks."
]

