[recipe.standard]
serving_size = "1 plate (approximately 400g)"
servings_per_recipe = 6
prep_time_minutes = 20
cook_time_minutes = 40

[recipe.standard.ingredients]
items = [
    "300g andouille sausage (or smoked sausage), sliced",
    "300g shrimp, peeled and deveined",
    "300g chicken thighs, boneless, cut into 2cm pieces",
    "2 cups long-grain white rice",
    "1 large onion, diced",
    "1 green bell pepper, diced",
    "3 stalks celery, diced",
    "4 cloves garlic, minced",
    "400g canned diced tomatoes",
    "2 cups chicken broth",
    "2 tbsp vegetable oil",
    "1 tsp paprika",
    "1 tsp dried thyme",
    "1 tsp dried oregano",
    "1/2 tsp cayenne pepper",
    "1 tsp Worcestershire sauce",
    "1 bay leaf",
    "Salt and black pepper to taste",
    "Green onions for garnish"
]

[recipe.standard.instructions]
steps = [
    "Heat oil in a large heavy pot or Dutch oven over medium-high heat (375°F/190°C). Brown andouille sausage slices for 3-4 minutes. Remove.",
    "Season chicken with salt, pepper, and paprika. Brown in the same pot for 4-5 minutes. Remove.",
    "Sauté the 'holy trinity': onion, bell pepper, and celery until softened, about 6 minutes. Add garlic and cook 1 minute.",
    "Add tomatoes, paprika, thyme, oregano, cayenne, Worcestershire, and bay leaf. Cook 3 minutes, scraping any browned bits from the bottom.",
    "Return sausage and chicken to the pot. Add chicken broth. Bring to a boil.",
    "Add rice. Stir once to distribute. Reduce heat to low, cover tightly, and cook 20 minutes without lifting the lid.",
    "Lift lid and nestle shrimp into the rice. Replace lid and cook 5 more minutes until shrimp are pink and cooked through.",
    "Remove bay leaf. Fluff with a fork. Garnish with sliced green onions. Serve hot."
]

