[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "Gruyère cheese", substitute = "Swiss cheese or shredded mozzarella", saving_percent = 60, reason = "Gruyère is a specialty import cheese; Swiss or mozzarella melt smoothly and cost a fraction of the price" },
    { original = "heavy cream", substitute = "whole milk or evaporated milk", saving_percent = 50, reason = "Evaporated milk adds creaminess at far lower cost; shake the can well before using" },
    { original = "panko breadcrumbs", substitute = "crushed plain crackers or day-old bread crumbs", saving_percent = 70, reason = "Blitzed stale bread or crushed Ritz crackers make an excellent topping at nearly zero extra cost" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "Gruyère cheese", substitute = "Emmental or any mild melting cheese", reason = "Gruyère is unavailable in many regions; Emmental is its close relative and widely available globally" },
    { original = "elbow macaroni", substitute = "any short pasta shape (penne, shells, cavatappi)", reason = "The sauce works with any pasta that has nooks to hold cheese; shells and cavatappi are particularly good" },
    { original = "dry mustard powder", substitute = "1 tablespoon Dijon mustard or yellow mustard", reason = "Dry mustard is a pantry staple in the US but not universally available; prepared mustard adds the same tang" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "9×13-inch baking dish", substitute = "any large oven-safe pot or Dutch oven", reason = "A Dutch oven or large cast-iron pan works perfectly; skip the breadcrumb crust or broil briefly at the end" },
    { original = "freshly shredded cheese blocks", substitute = "pre-shredded bagged cheese", reason = "Pre-shredded cheese has anti-caking agents that can make sauce slightly grainy; whisk sauce vigorously over low heat to compensate" },
    { original = "smoked paprika", substitute = "regular sweet paprika plus a drop of liquid smoke", reason = "Smoked paprika can be swapped with sweet paprika; add one small drop of liquid smoke to approximate the smoky depth" }
]
