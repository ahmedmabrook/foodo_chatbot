[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "anchovy fillets", substitute = "1 tsp Worcestershire sauce + a small piece of canned tuna", saving_percent = 60, reason = "Worcestershire already contains anchovies; a bit of tuna adds depth without buying anchovy tins" },
    { original = "Parmesan (freshly grated)", substitute = "any hard Italian cheese (Pecorino Romano or Grana Padano)", saving_percent = 20, reason = "Pecorino Romano is sharper and often cheaper; use slightly less as it has more intense flavor" },
