items = [
    { original = "anchovy fillets", substitute = "anchovy paste (1 tsp) or Worcestershire sauce alone", reason = "Anchovy paste in a tube is widely available and more convenient; Worcestershire provides similar umami" },
    { original = "raw egg yolks", substitute = "1 tbsp mayonnaise", reason = "Mayo is already emulsified egg yolk and oil; use 2 tbsp for a similar base dressing" },
    { original = "romaine lettuce", substitute = "iceberg lettuce or little gem lettuce", reason = "Both provide the crispy texture of romaine; iceberg has less flavor but good crunch" }
]

