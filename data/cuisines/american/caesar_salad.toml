category = "salad"
tags = ["american_classic", "contains_dairy", "contains_eggs", "contains_gluten", "high_protein"]
allergens = ["dairy", "eggs", "gluten", "shellfish"]
difficulty = "medium"
total_time_minutes = 30

[recipe.standard]
serving_size = "1 large salad plate (approximately 320g)"
servings_per_recipe = 4
prep_time_minutes = 25
cook_time_minutes = 5

[recipe.standard.ingredients]
items = [
    "2 heads romaine lettuce, torn",
    "4 slices sourdough or baguette, cubed (for croutons)",
    "60g Parmesan cheese, freshly grated",
    "2 tbsp olive oil (for croutons)",
    "Dressing: 3 cloves garlic, 6 anchovy fillets",
    "Dressing: 2 egg yolks",
    "Dressing: 2 tbsp lemon juice",
    "Dressing: 1 tsp Dijon mustard",
    "Dressing: 1/2 cup olive oil",
    "Dressing: 2 tbsp Worcestershire sauce",
    "Salt and black pepper to taste"
]

[recipe.standard.instructions]
steps = [
    "Make croutons: toss bread cubes with 2 tbsp olive oil, salt, and pepper. Spread on a baking sheet. Bake at 375°F (190°C) for 10-12 minutes until golden and crispy. Cool completely.",
    "Make the dressing: on a cutting board, finely mince garlic and anchovy fillets together into a paste. Transfer to a bowl.",
    "Whisk in egg yolks, lemon juice, and Dijon mustard until combined.",
    "Slowly drizzle in olive oil while whisking constantly to emulsify the dressing. Season with Worcestershire, salt, and lots of black pepper.",
    "Wash and dry romaine leaves thoroughly. Tear into large pieces.",
    "In a large bowl, toss romaine with just enough dressing to coat every leaf — do not overdress.",
    "Add most of the croutons and half the Parmesan. Toss again. Divide among plates.",
    "Top with remaining croutons, Parmesan, and cracked black pepper. Serve immediately."
]

