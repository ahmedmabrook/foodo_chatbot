[recipe.standard]
serving_size = "2 slices (approximately 250g)"
servings_per_recipe = 6
prep_time_minutes = 20
cook_time_minutes = 60

[recipe.standard.ingredients]
items = [
    "700g ground beef (80% lean)",
    "1 cup breadcrumbs",
    "1/2 cup whole milk",
    "2 large eggs",
    "1 small onion, finely diced",
    "3 cloves garlic, minced",
    "2 tbsp Worcestershire sauce",
    "1 tbsp ketchup (in mix) + 1/4 cup for glaze",
    "1 tbsp brown sugar (for glaze)",
    "1 tsp mustard (for glaze)",
    "1 tsp dried thyme",
    "1 tsp salt",
    "1/2 tsp black pepper",
    "1/2 tsp paprika"
]

[recipe.standard.instructions]
steps = [
    "Preheat oven to 350°F (175°C). Line a loaf pan with parchment or lightly grease.",
    "Soak breadcrumbs in milk for 5 minutes — this is the panade and keeps the meatloaf moist.",
    "In a large bowl, combine ground beef, soaked breadcrumbs, eggs, onion, garlic, Worcestershire, 1 tbsp ketchup, thyme, salt, pepper, and paprika. Mix gently with your hands until just combined — do not overwork.",
    "Transfer mixture to the loaf pan. Shape into a loaf with rounded top. Do not pack too tightly.",
    "Make glaze: mix 1/4 cup ketchup + 1 tbsp brown sugar + 1 tsp mustard. Spread half over the top of the loaf.",
    "Bake for 45 minutes. Remove and spread remaining glaze over the top.",
    "Bake another 15 minutes until internal temperature reaches 160°F (71°C).",
    "Let rest 10 minutes before slicing. Serve with mashed potatoes and green beans."
]

