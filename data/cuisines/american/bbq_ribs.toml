dish_name = "BBQ Pork Ribs"
alternate_names = ["Baby Back Ribs", "St. Louis Ribs", "Slow-Smoked Ribs"]
category = "main_course"
tags = ["high_protein", "grilled", "comfort_food", "american_classic", "bbq"]
allergens = ["none"]
difficulty = "hard"
total_time_minutes = 270

[recipe.standard]
serving_size = "4-5 ribs (approximately 350g)"
servings_per_recipe = 4
prep_time_minutes = 30
cook_time_minutes = 240

[recipe.standard.ingredients]
items = [
    "1 full rack pork baby back ribs (about 1.4 kg)",
    "1/4 cup brown sugar",
    "2 tbsp paprika",
    "1 tbsp garlic powder",
    "1 tbsp onion powder",
    "1 tsp cayenne pepper",
    "1 tsp black pepper",
    "2 tsp salt",
    "1 tsp cumin",
    "1 cup BBQ sauce (store-bought or homemade)"
]

[recipe.standard.instructions]
steps = [
    "Remove the silver membrane from the back of the ribs by loosening an edge with a knife and pulling it off with a paper towel.",
    "Mix brown sugar, paprika, garlic powder, onion powder, cayenne, black pepper, salt, and cumin into a dry rub. Coat both sides of the ribs generously. Wrap in plastic and refrigerate overnight or at least 2 hours.",
    "Preheat oven to 300°F (150°C). Place ribs bone-side down on a large piece of foil. Wrap tightly. Place on a baking sheet.",
    "Bake for 2.5 hours until very tender and meat has pulled back from the bone tips.",
    "Carefully open the foil. Drain excess liquid. Brush both sides generously with BBQ sauce.",
    "Increase oven to 425°F (220°C) or switch to broil. Cook uncovered for 10-15 minutes until BBQ sauce caramelizes and edges char slightly.",
    "Rest 10 minutes before slicing between bones. Serve with extra BBQ sauce."
]

