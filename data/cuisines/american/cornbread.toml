dish_name = "Southern Cornbread"
alternate_names = ["Buttermilk Cornbread", "Cast Iron Cornbread", "Southern Skillet Cornbread"]
category = "side_dish"
tags = ["vegetarian", "comfort_food", "american_classic", "contains_gluten", "contains_dairy", "contains_eggs", "baked"]
allergens = ["gluten", "dairy", "eggs"]
difficulty = "easy"
total_time_minutes = 35

[recipe.standard]
serving_size = "1 wedge (approximately 100g)"
servings_per_recipe = 8
prep_time_minutes = 10
cook_time_minutes = 25

[recipe.standard.ingredients]
items = [
    "1 cup yellow cornmeal",
    "1 cup all-purpose flour",
    "1/4 cup sugar",
    "1 tbsp baking powder",
    "1/2 tsp salt",
    "1 cup buttermilk",
    "2 large eggs",
    "1/3 cup vegetable oil",
    "2 tbsp butter (for the cast-iron skillet)"
]

[recipe.standard.instructions]
steps = [
    "Preheat oven to 425°F (220°C). Place a 10-inch cast-iron skillet in the oven while it preheats — a very hot pan is key to a crispy crust.",
    "Whisk together cornmeal, flour, sugar, baking powder, and salt in a large bowl.",
    "In a separate bowl, whisk buttermilk, eggs, and vegetable oil until combined.",
    "Pour the wet ingredients into the dry ingredients. Stir until just combined — do not overmix. A few lumps are fine.",
    "Carefully remove the hot skillet from the oven. Add butter and swirl to coat the bottom and sides. The butter will sizzle and brown — this creates the crust.",
    "Quickly pour the batter into the hot buttered skillet. Return immediately to oven.",
    "Bake for 20-25 minutes until the top is golden brown and a toothpick inserted in the center comes out clean.",
    "Cool 5 minutes in the pan. Run a knife around the edges, flip onto a plate, and slice into wedges."
]

