[recipe.standard.ingredients]
items = [
    "1.5 cups all-purpose flour",
    "1.5 tbsp sugar",
    "1.5 tsp baking powder",
    "1/2 tsp baking soda",
    "1/2 tsp salt",
    "1.5 cups buttermilk",
    "2 large eggs",
    "3 tbsp unsalted butter, melted",
    "1 tsp vanilla extract",
    "Butter for the griddle",
    "Maple syrup and fresh berries for serving"
]

[recipe.standard.instructions]
steps = [
    "Whisk flour, sugar, baking powder, baking soda, and salt in a large bowl.",
    "In a separate bowl, whisk buttermilk, eggs, melted butter, and vanilla together.",
    "Pour wet ingredients into dry ingredients. Stir gently with a few strokes — lumps are okay and even desirable. Do not overmix; overmixing develops gluten and makes pancakes tough.",
    "Let the batter rest 5 minutes while heating the griddle.",
    "Heat a griddle or large non-stick pan over medium heat (350°F/175°C). Add a small pat of butter.",
    "Pour 1/4 cup batter per pancake. Cook until bubbles form on the surface and edges look set, about 2-3 minutes.",
    "Flip once and cook 1-2 more minutes until golden on the bottom.",
    "Serve immediately with maple syrup and fresh berries."
]

