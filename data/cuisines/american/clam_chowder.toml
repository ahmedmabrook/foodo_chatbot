[metadata]
doc_id = "american_clam_chowder"
cuisine = "American"
dish_name = "New England Clam Chowder"
alternate_names = ["Boston Clam Chowder", "White Clam Chowder", "Clam Chowdah"]
category = "soup"
tags = ["comfort_food", "american_classic", "contains_dairy", "contains_shellfish", "seafood"]
allergens = ["shellfish", "dairy", "gluten"]
difficulty = "medium"
total_time_minutes = 50

[recipe.standard]
serving_size = "1 bowl (approximately 380g)"
servings_per_recipe = 4
prep_time_minutes = 15
cook_time_minutes = 35

[recipe.standard.ingredients]
items = [
    "2 cans (400g each) chopped clams, juice reserved",
    "4 slices bacon, diced",
    "1 large onion, diced",
    "3 stalks celery, diced",
    "3 medium potatoes, peeled and cubed",
    "2 cups heavy cream",
    "1 cup whole milk",
    "3 tbsp butter",
    "3 tbsp all-purpose flour",
    "1 tsp dried thyme",
    "1 bay leaf",
    "Salt and white pepper to taste",
    "Fresh parsley and oyster crackers for serving"
]

[recipe.standard.instructions]
steps = [
    "Cook diced bacon in a large pot over medium heat until crispy. Remove bacon and set aside. Leave bacon fat in the pot.",
    "Add butter to the bacon fat. Sauté onion and celery until soft, about 5 minutes. Add flour and stir for 2 minutes to make a roux.",
    "Add reserved clam juice and enough water to make 2 cups total liquid. Whisk until smooth. Bring to a simmer.",
    "Add cubed potatoes, thyme, and bay leaf. Cook for 12-15 minutes until potatoes are tender.",
    "Add heavy cream and milk. Reduce heat to low — do not boil after adding cream.",
    "Add chopped clams. Cook on low heat for 5 minutes until clams are heated through. Taste and season with salt and white pepper.",
    "Serve in bowls topped with crispy bacon, fresh parsley, and oyster crackers."
]

