# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 large mutabbaq (approximately 320g)"
servings_per_recipe = 4
prep_time_minutes = 30
cook_time_minutes = 30

[recipe.standard.ingredients]
items = [
    "Dough: 2 cups all-purpose flour, 1/2 tsp salt, 3/4 cup warm water, 2 tbsp ghee",
    "400g ground beef or lamb",
    "4 large eggs",
    "2 medium onions (1 for filling, 1 for dipping sauce)",
    "4 cloves garlic, minced",
    "2 green onions, chopped",
    "1/2 cup fresh parsley, chopped",
    "1 tsp baharat",
    "1 tsp cumin",
    "1/2 tsp turmeric",
    "Salt and black pepper to taste",
    "Ghee or oil for frying",
    "Vinegar and sliced onion for dipping sauce"
]

[recipe.standard.instructions]
steps = [
    "Make the dough: knead flour, salt, water, and 1 tbsp ghee into a smooth, elastic dough. Cover and rest 30 minutes. Divide into 4 balls.",
    "Cook filling: heat 1 tbsp ghee over medium-high heat (375°F/190°C). Sauté diced onion until golden. Add garlic, cook 1 minute. Add ground meat and cook through, breaking it up. Add baharat, cumin, turmeric, salt, and pepper. Cook until liquid evaporates. Let cool slightly.",
    "Mix the cooled meat with beaten eggs, green onions, and parsley.",
    "Stretch one dough ball on an oiled surface into a very thin sheet (almost translucent), using your palms and fingers.",
    "Place a quarter of the meat-egg mixture in the center. Fold the dough edges over the filling to form a square parcel.",
    "Heat a flat griddle or skillet over medium heat with a generous amount of ghee.",
    "Cook the stuffed parcel for 3-4 minutes per side until golden and crispy, pressing down gently. The egg inside should be fully cooked.",
    "Serve hot with a simple dipping sauce of vinegar, water, and sliced onions."
]

[recipe.standard.macros]
calories = 540
protein_g = 28
carbs_g = 44
fat_g = 26
fiber_g = 3
sugar_g = 3
sodium_mg = 560
