# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 bowl (approximately 380g)"
servings_per_recipe = 6
prep_time_minutes = 20
cook_time_minutes = 130

[recipe.standard.ingredients]
items = [
    "2 cups coarse cracked wheat (jareesh)",
    "600g chicken pieces (bone-in, skin-on)",
    "1 large onion, finely diced",
    "4 cloves garlic, minced",
    "2 tbsp ghee",
    "1 cup plain yogurt",
    "1 tsp baharat",
    "1 tsp turmeric",
    "1 tsp cumin",
    "Salt to taste",
    "Water (approximately 1.5 liters)",
    "Caramelized onions and ghee for topping"
]

[recipe.standard.instructions]
steps = [
    "Wash the cracked wheat and soak in water for 1 hour. Drain.",
    "Boil chicken pieces in 1.5 liters of water with salt until fully cooked, about 30-35 minutes. Remove chicken. Reserve the broth. Shred chicken meat off the bone.",
    "In a large pot, heat ghee over medium heat. Sauté diced onion until golden brown, about 8 minutes. Add garlic and cook 1 minute.",
    "Add the drained cracked wheat. Stir to coat in the onion-ghee mixture. Pour in the reserved chicken broth.",
    "Bring to a boil, then reduce heat to very low. Cover and cook for 45-60 minutes, stirring every 10-15 minutes to prevent sticking. The wheat will break down and become porridge-like.",
    "Add baharat, turmeric, cumin, and shredded chicken. Stir well. Add yogurt and mix thoroughly.",
    "Continue cooking on very low heat for another 15-20 minutes, stirring frequently. The jareesh should be thick and creamy.",
    "For topping: fry sliced onions in ghee until deep golden and caramelized. Serve jareesh in bowls topped with caramelized onions and a drizzle of extra ghee."
]

[recipe.standard.macros]
calories = 460
protein_g = 28
carbs_g = 52
fat_g = 16
fiber_g = 6
sugar_g = 5
sodium_mg = 420
