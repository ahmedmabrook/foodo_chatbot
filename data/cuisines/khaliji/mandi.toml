# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 plate rice with lamb (approximately 500g)"
servings_per_recipe = 6
prep_time_minutes = 30
cook_time_minutes = 210

[recipe.standard.ingredients]
items = [
    "1.5 kg bone-in lamb (leg or shoulder)",
    "3 cups basmati rice, washed and soaked 30 minutes",
    "2 large onions, halved",
    "4 medium tomatoes, halved",
    "6 cloves garlic",
    "2 tbsp ghee",
    "2 tsp baharat",
    "1 tsp turmeric",
    "1 tsp cumin",
    "1 tsp coriander",
    "1/2 tsp saffron threads, soaked in 2 tbsp warm water",
    "4 cardamom pods",
    "2 cinnamon sticks",
    "3 dried limes (loomi), pierced",
    "Salt to taste",
    "A handful of raisins (for garnish)",
    "A handful of toasted almonds (for garnish)",
    "Fresh cilantro for garnish"
]

[recipe.standard.instructions]
steps = [
    "Make the marinade: combine baharat, turmeric, cumin, coriander, salt, and 1 tbsp ghee. Rub all over the lamb. Let marinate 2-4 hours or overnight in the refrigerator.",
    "In a large pot, add onions, tomatoes, garlic, cardamom pods, cinnamon sticks, dried limes, and enough water to cover the lamb (about 2 liters). Bring to a boil.",
    "Add the marinated lamb. Reduce heat to low and simmer covered for 2-2.5 hours until very tender and meat is nearly falling off the bone.",
    "Remove lamb. Strain and reserve the broth. Measure 4.5 cups of broth for the rice.",
    "In a large pot, heat 1 tbsp ghee. Add drained soaked rice and stir for 1 minute. Add the 4.5 cups of hot lamb broth and saffron water. Add salt. Bring to a boil, then reduce to very low heat. Cover tightly and cook 18-20 minutes.",
    "For the traditional smoky flavor: place a small piece of burning charcoal in a metal cup inside the pot of lamb (or rice) for 5 minutes before sealing with foil. This imparts the distinctive smoked flavor.",
    "To serve: spread rice on a large platter. Place lamb on top. Garnish with toasted almonds, raisins, and fresh cilantro."
]

[recipe.standard.macros]
calories = 580
protein_g = 38
carbs_g = 62
fat_g = 18
fiber_g = 4
sugar_g = 6
sodium_mg = 560
