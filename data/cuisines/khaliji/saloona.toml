# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 bowl with rice (approximately 420g)"
servings_per_recipe = 4
prep_time_minutes = 15
cook_time_minutes = 60

[recipe.standard.ingredients]
items = [
    "800g bone-in chicken pieces (thighs and drumsticks)",
    "2 cups basmati rice",
    "2 medium onions, diced",
    "3 medium tomatoes, diced",
    "2 medium zucchini, cubed",
    "2 medium carrots, cubed",
    "4 cloves garlic, minced",
    "2 tbsp tomato paste",
    "2 tbsp ghee",
    "1 tsp baharat",
    "1 tsp cumin",
    "1 tsp turmeric",
    "1/2 tsp cinnamon",
    "2 dried limes, pierced",
    "Salt and black pepper to taste",
    "Fresh cilantro for garnish"
]

[recipe.standard.instructions]
steps = [
    "Heat ghee in a large pot over medium-high heat (375°F/190°C). Brown chicken pieces on all sides, about 5-6 minutes. Remove.",
    "Sauté onions in the same pot until golden, about 6 minutes. Add garlic, tomato paste, and all spices. Cook 2 minutes.",
    "Add diced tomatoes and cook 3 minutes. Return chicken to the pot. Add dried limes.",
    "Pour in 1.5 liters of water. Season generously with salt and pepper. Bring to a boil, skim foam, then reduce heat. Simmer covered for 30 minutes.",
    "Add carrots. Cook 10 minutes. Add zucchini. Cook 10 more minutes until all vegetables are tender.",
    "Meanwhile, cook basmati rice using the strained broth from the stew for extra flavor.",
    "Serve saloona over or alongside the rice. Garnish with fresh cilantro."
]

[recipe.standard.macros]
calories = 490
protein_g = 32
carbs_g = 58
fat_g = 14
fiber_g = 6
sugar_g = 8
sodium_mg = 500
