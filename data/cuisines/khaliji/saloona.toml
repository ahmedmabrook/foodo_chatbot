# ============================================================
# SUBSTITUTIONS
# ============================================================
[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "bone-in chicken thighs", substitute = "whole chicken legs", saving_percent = 20, reason = "Whole legs are often sold at lower cost per kg and contain both thigh and drumstick" },
    { original = "basmati rice", substitute = "any long-grain white rice", saving_percent = 30, reason = "Any long-grain rice works well; basmati has a distinctive aroma but is not essential" },
    { original = "ghee", substitute = "vegetable oil", saving_percent = 60, reason = "Vegetable oil is functionally identical for sautéing and stewing" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "dried limes", substitute = "juice of 1 lemon + a strip of lemon peel", reason = "Provides the tartness and citrus note that dried limes contribute" },
    { original = "baharat spice mix", substitute = "allspice + cumin + black pepper + cinnamon", reason = "Standard warm spices available at any grocery store approximate baharat" },
    { original = "zucchini", substitute = "eggplant or any summer squash", reason = "Eggplant absorbs the stew flavors beautifully and cooks in a similar timeframe" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "dried limes", substitute = "1 tbsp lemon juice added at end of cooking", reason = "Lemon juice provides the sourness that defines the dish's flavor" },
    { original = "tomato paste", substitute = "2 tbsp ketchup or crushed canned tomatoes", reason = "Both provide the sweet tomato base needed for the stew" },
    { original = "baharat", substitute = "cumin + cinnamon + black pepper (equal parts)", reason = "These three pantry spices cover the essential flavor notes of baharat" }
]
