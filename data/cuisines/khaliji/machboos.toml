[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "whole chicken", substitute = "chicken drumsticks or thighs (bone-in)", saving_percent = 25, reason = "Drumsticks and thighs are consistently cheaper than whole chicken and have excellent flavor for braised rice dishes." },
    { original = "saffron threads", substitute = "0.25 teaspoon turmeric plus a pinch of sweet paprika", saving_percent = 90, reason = "Saffron is the world's most expensive spice; turmeric provides color and paprika adds warmth at negligible cost." },
    { original = "basmati rice", substitute = "parboiled long-grain white rice", saving_percent = 35, reason = "Parboiled rice holds up well in one-pot cooking and is widely available at lower cost." }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "loomi (dried black lime)", substitute = "strips of lime peel plus a squeeze of lime juice stirred in at the end", reason = "Dried limes are a Gulf specialty; fresh lime peel and juice approximate the sour-floral note." },
    { original = "machboos spice blend", substitute = "1 teaspoon allspice plus 0.5 teaspoon cinnamon plus 0.25 teaspoon nutmeg", reason = "This combination closely mirrors the warm, sweet-savory profile of a traditional machboos blend." },
    { original = "fresh coriander (cilantro)", substitute = "fresh flat-leaf parsley", reason = "Parsley provides a bright fresh garnish for those who dislike coriander's soapy notes." }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "ghee", substitute = "clarified unsalted butter or regular unsalted butter", reason = "Clarified butter is easy to make at home and provides the same nutty richness as ghee." },
    { original = "whole cloves", substitute = "0.25 teaspoon ground cloves", reason = "Ground cloves are a pantry staple that delivers the same flavor without needing whole spices." },
    { original = "chicken broth (store-bought)", substitute = "water with 1 chicken bouillon cube", reason = "A bouillon cube dissolved in hot water provides adequate savory depth when broth is not on hand." }
]
