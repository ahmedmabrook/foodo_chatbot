[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "lamb shoulder", substitute = "chicken thighs (bone-in)", saving_percent = 45, reason = "Chicken is significantly less expensive than lamb and cooks faster while absorbing kabsa spices well." },
    { original = "basmati rice", substitute = "long-grain white rice", saving_percent = 30, reason = "Long-grain rice is widely available and cheaper while still producing fluffy separate grains." },
    { original = "pine nuts", substitute = "roasted sunflower seeds or slivered almonds", saving_percent = 60, reason = "Pine nuts are among the most expensive nuts; these alternatives provide similar crunch at a fraction of the cost." }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "loomi (dried black lime)", substitute = "1 tablespoon lime zest plus 1 tablespoon lime juice added at end of cooking", reason = "Loomi is specialty Middle Eastern ingredient; lime zest and juice replicate the sour citrus note." },
    { original = "kabsa spice mix (baharat)", substitute = "equal parts allspice, cinnamon, coriander, and a pinch of nutmeg", reason = "Baharat is a pre-blended spice mix that can be approximated with these pantry staples." },
    { original = "bone-in lamb shoulder", substitute = "beef chuck or bone-in beef short ribs", reason = "Beef chuck provides the same rich, gelatinous braising quality and is available in most supermarkets." }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "whole cardamom pods", substitute = "0.5 teaspoon ground cardamom", reason = "Ground cardamom is a common pantry spice that delivers the same flavor without sourcing whole pods." },
    { original = "ghee", substitute = "unsalted butter or neutral vegetable oil", reason = "Butter closely mimics ghee's richness; vegetable oil works for a dairy-free version." },
    { original = "whole peeled tomatoes (canned)", substitute = "3 fresh ripe tomatoes, roughly chopped", reason = "Fresh tomatoes are a standard home ingredient and work identically once cooked down." }
]
