[metadata]
doc_id = "khaliji_kabsa"
cuisine = "Khaliji"
dish_name = "Kabsa"
alternate_names = ["Al Kabsa", "Saudi Rice", "Machboos Al-Lahm"]
category = "main_course"
tags = ["rice", "lamb", "spiced", "one-pot", "celebratory", "national-dish"]
allergens = ["none"]
difficulty = "medium"
total_time_minutes = 120

[recipe.standard]
serving_size = "1 plate (approximately 450g)"
servings_per_recipe = 6
prep_time_minutes = 25
cook_time_minutes = 95

[recipe.standard.ingredients]
items = [
    "1 kg bone-in lamb shoulder, cut into large pieces",
    "3 cups basmati rice, rinsed and soaked 30 minutes",
    "2 large onions, finely diced",
    "4 cloves garlic, minced",
    "1 can (400g) whole peeled tomatoes, crushed",
    "3 tablespoons tomato paste",
    "4 tablespoons ghee",
    "1 cinnamon stick",
    "6 cardamom pods, bruised",
    "4 cloves",
    "2 bay leaves",
    "2 loomi (dried black limes), pierced",
    "1 teaspoon turmeric",
    "1.5 teaspoons kabsa spice mix (baharat)",
    "1 teaspoon cumin",
    "0.5 teaspoon black pepper",
    "0.5 teaspoon ground coriander",
    "Salt to taste",
    "4.5 cups water or lamb broth",
    "Handful of raisins",
    "Handful of toasted pine nuts, for garnish",
    "Fresh parsley, for garnish"
]

[recipe.standard.instructions]
steps = [
    "Heat ghee in a large heavy-bottomed pot over medium-high heat. Brown the lamb pieces on all sides for 8–10 minutes until deep golden. Remove and set aside.",
    "In the same pot, sauté the diced onions over medium heat for 10 minutes until soft and golden. Add garlic and cook 2 more minutes.",
    "Add crushed tomatoes and tomato paste. Stir well and cook for 5 minutes until the mixture darkens slightly.",
    "Return lamb to the pot. Add all whole spices (cinnamon stick, cardamom pods, cloves, bay leaves, loomi), ground spices (turmeric, kabsa mix, cumin, black pepper, coriander), and salt. Stir to coat.",
    "Pour in 4.5 cups of water or broth. Bring to a boil, then reduce heat to low, cover tightly, and simmer for 60 minutes until lamb is tender and broth is fragrant.",
    "Remove lamb pieces and set aside. Strain the broth and measure out 3 cups. Discard solids except the loomi.",
    "Return the 3 cups of spiced broth to the pot and bring to a boil. Drain the soaked rice and add to the pot along with the raisins and the reserved loomi. Stir once.",
    "Place the lamb pieces on top of the rice. Cover tightly and cook on low heat (250°F / 120°C) for 20 minutes. Remove from heat and let steam, covered, for 10 more minutes.",
    "Gently fluff the rice and transfer to a large serving platter. Arrange lamb on top and garnish with toasted pine nuts and fresh parsley."
]

[recipe.standard.macros]
calories = 620
protein_g = 38
carbs_g = 68
fat_g = 20
fiber_g = 3
sugar_g = 5
sodium_mg = 580

