    "1.5 teaspoons kabsa spice mix (baharat)",
    "1 teaspoon cumin",
    "0.5 teaspoon black pepper",
    "0.5 teaspoon ground coriander",
    "Salt to taste",
    "5 cups low-sodium lamb or chicken broth",
    "Fresh parsley, for garnish"
]

[recipe.healthy_variant.instructions]
steps = [
    "Heat olive oil in a large heavy-bottomed pot over medium-high heat. Brown lean lamb chunks on all sides for 8–10 minutes. Remove and set aside.",
    "Sauté diced onions in the same pot over medium heat for 10 minutes. Add garlic and cook 2 more minutes.",
    "Add crushed tomatoes and tomato paste. Cook 5 minutes until darkened.",
    "Return lamb, add all whole and ground spices, and salt. Stir to coat well.",
    "Pour in 5 cups of low-sodium broth. Bring to boil, reduce to low, cover, and simmer 70 minutes until lamb is tender.",
