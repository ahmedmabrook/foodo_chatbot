# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 plate with egg (approximately 280g)"
servings_per_recipe = 4
prep_time_minutes = 10
cook_time_minutes = 25

[recipe.standard.ingredients]
items = [
    "250g thin vermicelli noodles",
    "4 large eggs",
    "1/2 cup sugar",
    "3 tbsp ghee",
    "1 tsp cardamom (ground)",
    "1/2 tsp saffron threads soaked in 2 tbsp warm water",
    "1/4 tsp turmeric",
    "1/2 cup raisins",
    "1/4 cup toasted almonds or pine nuts (for garnish)",
    "Rose water (1 tsp, optional)",
    "Salt (a small pinch)"
]

[recipe.standard.instructions]
steps = [
    "Break vermicelli into 4-5cm pieces. Heat 2 tbsp ghee in a large pan over medium heat (350°F/175°C). Fry the dry vermicelli, stirring constantly, for 3-4 minutes until golden brown.",
    "Add 2 cups boiling water to the pan. Add sugar, cardamom, saffron water, turmeric, raisins, and rose water. Stir well.",
    "Cover and cook over low heat for 8-10 minutes until vermicelli absorbs all liquid and is cooked through. Stir gently once or twice.",
    "Meanwhile, heat the remaining 1 tbsp ghee in a separate non-stick pan over medium heat (350°F/175°C). Beat eggs with a pinch of salt. Pour in and scramble gently, pulling from the edges, until just barely set and still creamy. Remove from heat immediately.",
    "Fluff the sweet vermicelli with a fork. Taste and adjust sweetness.",
    "Plate the sweet vermicelli. Place the scrambled eggs on top or alongside. Garnish with toasted almonds or pine nuts.",
    "Serve immediately while warm. The contrast of sweet noodles with savory egg is the signature of this dish."
]

[recipe.standard.macros]
calories = 520
protein_g = 14
carbs_g = 72
fat_g = 20
fiber_g = 3
sugar_g = 32
sodium_mg = 200
