# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 bowl (approximately 400g)"
servings_per_recipe = 6
prep_time_minutes = 20
cook_time_minutes = 160

[recipe.standard.ingredients]
items = [
    "500g whole wheat grains (harees wheat), soaked overnight",
    "1 whole chicken (about 1.5 kg), skin removed",
    "1 large onion, halved",
    "4 cardamom pods",
    "1 cinnamon stick",
    "3 tbsp ghee",
    "1 tsp cumin",
    "Salt to taste",
    "Water (approximately 2 liters)"
]

[recipe.standard.instructions]
steps = [
    "Drain soaked wheat. Rinse well.",
    "In a large heavy pot, combine soaked wheat, whole chicken pieces, halved onion, cardamom pods, cinnamon stick, and salt. Cover with about 2 liters of water.",
    "Bring to a boil over high heat. Skim foam. Reduce heat to low, cover, and simmer for 2.5-3 hours, stirring every 20-30 minutes to prevent sticking.",
    "Once the chicken is falling off the bone and the wheat is fully broken down and porridge-like, remove the chicken. Remove bones and cartilage. Shred the meat finely.",
    "Return shredded chicken to the pot. Continue cooking over low heat, stirring vigorously and continuously with a wooden spoon, for 20-30 more minutes. The mixture should become smooth and thick, like a dense porridge.",
    "Add cumin. Taste and adjust salt.",
    "Serve in bowls topped with a generous pour of hot ghee and a sprinkle of cinnamon. Traditionally eaten with the hands."
]

[recipe.standard.macros]
calories = 480
protein_g = 32
carbs_g = 52
fat_g = 16
fiber_g = 6
sugar_g = 2
sodium_mg = 380
