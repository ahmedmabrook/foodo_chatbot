    { original = "dried limes (loomi)", substitute = "zest of 1 lime + 1 tsp lime juice", reason = "Fresh lime provides tartness; dried lime has an earthier flavor but the lime brightness is the key element" },
    { original = "baharat spice mix", substitute = "equal parts allspice, black pepper, coriander, and cinnamon", reason = "Baharat is a blend; this combination approximates the warm, complex Gulf spice profile" },
    { original = "ruqaq bread", substitute = "pita bread, slightly stale works best", reason = "Day-old pita absorbs broth well without disintegrating" }
]

