# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 large plate (approximately 450g)"
servings_per_recipe = 4
prep_time_minutes = 20
cook_time_minutes = 80

[recipe.standard.ingredients]
items = [
    "600g bone-in lamb (shoulder or ribs), cut into pieces",
    "2 large round flatbreads (ruqaq or thin Arabic bread), torn into pieces",
    "2 medium onions, diced",
    "3 medium tomatoes, diced",
    "2 medium zucchini, cubed",
    "2 medium carrots, cubed",
    "1 medium potato, cubed",
    "4 cloves garlic, minced",
    "2 tbsp tomato paste",
    "2 tbsp ghee",
    "1 tsp baharat spice mix",
    "1 tsp cumin",
    "1 tsp turmeric",
    "1/2 tsp cinnamon",
    "3 dried limes (loomi), pierced",
    "Salt and black pepper to taste",
    "Fresh parsley or cilantro for garnish"
]

[recipe.standard.instructions]
steps = [
    "Heat ghee in a large heavy pot over medium-high heat (375°F/190°C). Brown lamb pieces on all sides, about 6-8 minutes. Remove and set aside.",
    "In the same pot, sauté onions until golden, about 6 minutes. Add garlic and cook 1 minute. Add tomato paste and cook 2 minutes.",
    "Return lamb to the pot. Add diced tomatoes, baharat, cumin, turmeric, cinnamon, and pierced dried limes. Season with salt and pepper.",
    "Add 1.5 liters of water. Bring to a boil, skim foam, then reduce heat to low. Simmer covered for 45 minutes.",
    "Add carrots and potatoes. Cook 15 minutes. Add zucchini and cook 10 more minutes until all vegetables are tender.",
    "Arrange torn flatbread pieces in the bottom of a large deep serving dish. The bread should cover the base generously.",
    "Ladle the hot stew broth over the bread — enough to fully soak and soften it without making it mushy.",
    "Arrange the lamb pieces and vegetables on top of the soaked bread. Garnish with fresh herbs. Serve immediately."
]

[recipe.standard.macros]
calories = 520
protein_g = 30
carbs_g = 58
fat_g = 18
fiber_g = 6
sugar_g = 8
sodium_mg = 520
