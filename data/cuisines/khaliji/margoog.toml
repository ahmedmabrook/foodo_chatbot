# ============================================================
# STANDARD (TRADITIONAL) RECIPE
# ============================================================
[recipe.standard]
serving_size = "1 deep plate (approximately 450g)"
servings_per_recipe = 4
prep_time_minutes = 25
cook_time_minutes = 95

[recipe.standard.ingredients]
items = [
    "600g bone-in lamb or beef, cut into large pieces",
    "Dough pieces: 1 cup flour + 1/2 cup water + pinch salt (thin flatbread torn into pieces)",
    "2 medium onions, diced",
    "3 medium tomatoes, diced",
    "2 medium zucchini, cubed",
    "2 medium carrots, cubed",
    "1 medium potato, cubed",
    "1 medium sweet potato, cubed",
    "4 cloves garlic, minced",
    "2 tbsp tomato paste",
    "2 tbsp ghee",
    "2 tsp baharat",
    "1 tsp cumin",
    "1 tsp turmeric",
    "2 dried limes, pierced",
    "Salt and black pepper to taste",
    "Fresh cilantro for garnish"
]

[recipe.standard.instructions]
steps = [
    "Make the dough: mix flour, water, and salt into a stiff dough. Cover and rest 30 minutes. Roll thinly and tear into rustic pieces.",
    "Heat ghee in a large heavy pot over medium-high heat (375°F/190°C). Brown meat pieces on all sides, about 6-8 minutes. Remove.",
    "Sauté onions in the same pot until golden. Add garlic and tomato paste. Cook 2 minutes. Add diced tomatoes, baharat, cumin, and turmeric.",
    "Return meat to pot. Add dried limes. Pour in 1.5 liters of water. Season with salt and pepper. Bring to a boil, skim foam, then simmer covered for 50 minutes.",
    "Add carrots, potatoes, and sweet potato. Cook 15 minutes. Add zucchini and cook 10 more minutes.",
    "Drop the torn raw dough pieces directly into the simmering stew. They will cook through in 8-12 minutes, becoming thick, chewy pasta-like pieces. Stir gently to prevent sticking.",
    "The stew should be thick and hearty. Adjust seasoning. Garnish with fresh cilantro. Serve hot."
]

[recipe.standard.macros]
