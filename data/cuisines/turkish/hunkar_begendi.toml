total_time_minutes = 75

[recipe.standard]
serving_size = "1 plate with purée (approximately 400g)"
servings_per_recipe = 4
prep_time_minutes = 20
cook_time_minutes = 55

[recipe.standard.ingredients]
items = [
    "600g boneless lamb shoulder, cut into 4cm cubes",
    "1 large onion, finely diced",
    "3 cloves garlic, minced",
    "2 large tomatoes, diced (or 400g canned)",
    "1 green bell pepper, diced",
    "2 tbsp tomato paste",
    "3 tbsp olive oil",
    "1 tsp cumin, 1 tsp paprika, 1/2 tsp cinnamon",
    "Salt and black pepper to taste",
    "Béchamel-eggplant purée: 4 large eggplants (about 1.2kg)",
    "Béchamel: 2 tbsp butter, 2 tbsp flour, 1 cup warm milk",
    "Béchamel: 60g aged kaşar or parmesan cheese, grated",
    "Salt, white pepper, and nutmeg for béchamel",
    "Fresh parsley for garnish"
]

[recipe.standard.instructions]
steps = [
    "Make lamb stew: heat olive oil in a heavy pot over medium-high heat. Brown lamb cubes in batches until deeply seared on all sides, about 4 minutes per batch. Remove and set aside.",
    "In the same pot, sauté onion until soft. Add garlic and bell pepper. Cook 3 minutes. Add tomato paste and stir for 2 minutes.",
    "Return lamb. Add diced tomatoes, cumin, paprika, cinnamon, salt, and pepper. Add 1/2 cup water. Bring to a boil, then reduce to a low simmer. Cover and cook 45-50 minutes until lamb is very tender.",
    "Char eggplants: directly over a gas flame or under a broiler, char the eggplants all over, turning regularly, until completely blackened outside and fully soft inside, about 15-20 minutes. Allow to cool slightly.",
    "Peel charred eggplants and discard blackened skin. Place flesh in a colander and press gently to remove excess liquid. Chop flesh finely.",
    "Make béchamel: melt butter in a saucepan over medium heat. Whisk in flour and cook 1-2 minutes. Gradually whisk in warm milk. Cook, stirring, until thick and smooth, about 5 minutes. Season with salt, white pepper, and nutmeg.",
    "Combine eggplant purée with béchamel. Stir in grated cheese. Heat gently.",
    "Serve by spreading eggplant béchamel on plates and topping with lamb stew. Garnish with fresh parsley."
]

