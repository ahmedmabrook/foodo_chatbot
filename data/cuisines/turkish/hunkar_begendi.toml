alternate_names = ["Hunkar Begendi", "Sultan's Delight", "Lamb on Smoked Eggplant Purée"]
category = "main_course"
tags = ["comfort_food", "festive", "high_protein", "traditional", "contains_dairy"]
allergens = ["dairy"]
