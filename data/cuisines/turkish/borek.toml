[recipe.standard]
serving_size = "1 slice (approximately 250g)"
servings_per_recipe = 8
prep_time_minutes = 40
cook_time_minutes = 50

[recipe.standard.ingredients]
items = [
    "1 package (500g) yufka or phyllo dough sheets",
    "400g white cheese (beyaz peynir) or feta, crumbled",
    "3 eggs",
    "1 cup whole milk",
    "1/2 cup plain yogurt",
    "1/2 cup olive oil or vegetable oil",
    "1 bunch flat-leaf parsley, finely chopped",
    "Salt to taste (feta may be salty enough)",
    "1 tsp black pepper",
    "1 egg yolk + 1 tbsp milk (for brushing)",
    "1 tbsp sesame seeds or nigella seeds for topping"
]

[recipe.standard.instructions]
steps = [
    "Preheat oven to 375°F (190°C). Grease a 9×13-inch (23×33cm) baking dish with oil.",
    "Make the soaking mixture: whisk together eggs, milk, yogurt, and oil. Season lightly with salt and pepper.",
    "Make the cheese filling: combine crumbled white cheese, chopped parsley, and black pepper. Taste for salt.",
    "Lay the first sheet of yufka/phyllo in the baking dish. Brush or drizzle generously with the soaking mixture. Repeat with 3-4 more layers.",
    "Spread the cheese filling evenly over the layered dough.",
    "Continue layering remaining yufka sheets on top, brushing each layer with the soaking mixture. Pour any remaining soaking mixture over the top layer.",
    "Mix egg yolk with 1 tbsp milk and brush the top. Sprinkle sesame or nigella seeds.",
    "Bake at 375°F (190°C) for 40-50 minutes until deep golden brown and crisp on top. Rest 10 minutes before slicing.",
    "Cut into squares and serve warm. Su böreği should be flaky on top and soft inside."
]

