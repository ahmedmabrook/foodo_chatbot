category = "soup"
tags = ["vegan", "vegetarian", "gluten_free", "high_fiber", "high_protein", "traditional", "quick_meal"]
allergens = ["none"]
difficulty = "easy"
total_time_minutes = 40

[recipe.standard]
serving_size = "1 bowl (approximately 350g)"
servings_per_recipe = 6
prep_time_minutes = 10
cook_time_minutes = 30

[recipe.standard.ingredients]
items = [
    "1.5 cups red lentils, rinsed",
    "1 large onion, diced",
    "2 carrots, diced",
    "3 cloves garlic, minced",
    "2 tbsp tomato paste",
    "3 tbsp olive oil",
    "1 tsp cumin",
    "1 tsp paprika",
    "1/2 tsp turmeric",
    "1 liter chicken or vegetable broth",
    "Salt and black pepper to taste",
    "Topping: 2 tbsp butter, 1 tsp dried mint, 1 tsp red pepper flakes, 1/2 tsp paprika",
    "Lemon wedges and flatbread for serving"
]

[recipe.standard.instructions]
steps = [
    "Heat olive oil in a large pot over medium heat. Sauté diced onion until soft and golden, about 6 minutes. Add garlic and cook 1 minute.",
    "Add carrots. Cook 3 minutes. Add tomato paste and stir for 2 minutes until darkened.",
    "Add rinsed red lentils, cumin, paprika, and turmeric. Stir to coat in the spices.",
    "Add broth. Bring to a boil. Reduce heat and simmer covered for 20-25 minutes until lentils and carrots are completely soft.",
    "Use an immersion blender to blend the soup completely smooth. Adjust thickness with water if needed. Season with salt and pepper.",
    "Make the topping: melt butter in a small pan over medium heat. When foam subsides, add dried mint and red pepper flakes. Swirl 30 seconds — do not burn. Remove from heat and stir in paprika.",
    "Serve soup in bowls. Drizzle the red butter swirl over each bowl. Serve with lemon wedges and warm bread."
]

