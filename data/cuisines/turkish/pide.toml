dish_name = "Pide"
alternate_names = ["Turkish Flatbread Pizza", "Et Pide", "Kiymali Pide"]
category = "main_course"
tags = ["street_food", "comfort_food", "high_protein", "contains_gluten", "contains_eggs"]
allergens = ["gluten", "eggs"]
difficulty = "medium"
total_time_minutes = 90

[recipe.standard]
serving_size = "1 pide (approximately 350g)"
servings_per_recipe = 4
prep_time_minutes = 45
cook_time_minutes = 45

[recipe.standard.ingredients]
items = [
    "Dough: 3 cups all-purpose flour, 7g instant yeast, 1 tsp sugar, 1 tsp salt, 1 cup warm water, 2 tbsp olive oil",
    "Filling (kiymali): 400g ground beef",
    "Filling: 2 medium tomatoes, finely diced",
    "Filling: 1 large green bell pepper, finely diced",
    "Filling: 1 large onion, finely diced",
    "Filling: 4 cloves garlic, minced",
    "Filling: 1 tsp cumin, 1 tsp paprika, 1/2 tsp black pepper, salt",
    "1 egg yolk (for egg pide) — optional",
    "Butter for brushing (after baking)",
    "Parsley and lemon for serving"
]

[recipe.standard.instructions]
steps = [
    "Make dough: combine flour, yeast, sugar, and salt. Add warm water and olive oil. Knead 8-10 minutes until smooth and elastic. Cover and rise 45-60 minutes until doubled.",
    "Make filling: sauté onion in a little oil until soft. Add garlic, bell pepper. Add ground beef and brown. Add diced tomatoes, cumin, paprika, pepper, and salt. Cook until liquid evaporates completely — a dry filling prevents soggy pide.",
    "Preheat oven to 500°F (260°C) with a baking stone or inverted heavy baking sheet inside.",
    "Divide dough into 4 pieces. Roll each into a long oval (boat shape), about 30cm long and 15cm wide.",
    "Place filling down the center of each oval. Fold up the long sides and pinch the ends tightly together to form a pointed boat shape.",
    "Slide onto hot baking stone. Bake 10-12 minutes until crust is golden and filling is bubbling.",
    "Optional: crack an egg over filling in the last 3-4 minutes of baking for egg pide.",
    "Brush crust with butter immediately. Serve with fresh parsley and lemon wedges."
]

