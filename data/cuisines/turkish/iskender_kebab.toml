[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "lamb leg (doner-style)", substitute = "chicken thigh, thinly sliced and marinated", saving_percent = 45, reason = "Chicken thigh is significantly cheaper than lamb while still delivering juicy, flavorful results when grilled over high heat" },
    { original = "full-fat plain yogurt", substitute = "homemade strained yogurt from whole milk", saving_percent = 35, reason = "Straining store-brand whole-milk yogurt overnight produces thick yogurt nearly identical to premium brands at a fraction of the cost" },
    { original = "red pepper paste (biber salçası)", substitute = "roasted red peppers blended with a pinch of chili flakes", saving_percent = 40, reason = "Jarred roasted peppers blended smooth and seasoned replicate the depth of biber salçası without the specialty-store price" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "pide bread (Turkish flatbread)", substitute = "naan bread or thick pita bread, cut into cubes", reason = "Naan or thick pita bread have a similar chewy, dense crumb that toasts well and soaks up the tomato sauce without disintegrating" },
    { original = "biber salçası (Turkish red pepper paste)", substitute = "harissa paste diluted with a small amount of olive oil", reason = "Harissa is widely available in supermarkets and provides a similar smoky-spicy depth; use half the quantity as it is more intense" },
    { original = "fresh doner-style lamb slices", substitute = "lamb kebab mince formed into thin patties and grilled", reason = "Ground lamb is available in most supermarkets; formed into thin oval patties and grilled, it delivers the same flavor profile when sliced before serving" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "cast-iron grill pan", substitute = "heavy-bottomed stainless steel skillet", reason = "A heavy skillet heated to high heat will sear the meat and develop similar char marks; press meat down with a spatula to maximize contact" },
    { original = "unsalted butter (for browning)", substitute = "salted butter, reducing added salt elsewhere", reason = "Salted butter browns identically to unsalted; simply reduce the salt in the tomato sauce by half a teaspoon to compensate" },
    { original = "baking sheet for toasting bread", substitute = "dry skillet or griddle on stovetop", reason = "Pide cubes can be toasted in a dry skillet over medium heat, tossing frequently, to achieve the same golden crust without an oven" }
]
