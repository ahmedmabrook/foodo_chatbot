]

[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "ground lamb", substitute = "ground beef (80% lean)", saving_percent = 35, reason = "Ground beef is widely available and cheaper than lamb; the bold spice mix of cumin, paprika, and biber salçası ensures the flavor remains rich and authentic" },
    { original = "fresh tomatoes (for topping)", substitute = "drained canned diced tomatoes, finely chopped", saving_percent = 40, reason = "Canned tomatoes are cheaper year-round and have consistent moisture content; press them very dry with a cloth to prevent a soggy topping" },
    { original = "biber salçası (red pepper paste)", substitute = "double-concentrated tomato paste mixed with 1/4 teaspoon smoked paprika and pinch of chili", saving_percent = 50, reason = "This combination approximates the sweet-smoky heat of biber salçası using pantry staples found in any kitchen" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "baking stone", substitute = "cast-iron skillet preheated on stovetop, then finished under broiler", reason = "A preheated cast-iron pan on the stovetop followed by 2 minutes under the broiler replicates the intense bottom heat of a baking stone, producing a crisp base" },
    { original = "biber salçası", substitute = "harissa paste (use half the quantity)", reason = "Harissa is available in most international grocery sections; its smoky chili base closely mirrors biber salçası though it is more intense, so reduce the quantity" },
    { original = "sumac (for serving)", substitute = "lemon zest mixed with a pinch of citric acid or extra lemon juice", reason = "Sumac's primary role is tartness; fresh lemon zest with a touch of extra lemon juice replicates that bright sour note in the topping" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "baking stone or heavy sheet pan", substitute = "inverted cast-iron skillet or thick cookie sheet preheated 30 minutes", reason = "Any heavy, oven-safe surface preheated thoroughly will conduct heat the same way; the key is 30 minutes of preheating at maximum oven temperature" },
    { original = "stand mixer with dough hook", substitute = "mixing by hand with a wooden spoon and 10 minutes of kneading", reason = "Lahmacun dough is soft and low-hydration, making hand-kneading straightforward; no equipment needed beyond a flat work surface" },
    { original = "rolling pin", substitute = "smooth wine bottle or tall glass", reason = "A smooth glass bottle is an effective rolling pin substitute for thin dough; dust lightly with flour to prevent sticking" }
]
