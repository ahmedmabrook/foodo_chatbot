doc_id = "turkish_adana_kebab"
cuisine = "Turkish"
dish_name = "Adana Kebab"
alternate_names = ["Adana Kebabı", "Kıyma Kebab", "Turkish Minced Meat Kebab", "Spicy Lamb Kebab"]
category = "main_course"
tags = ["street_food", "high_protein", "traditional", "gluten_free", "spicy"]
allergens = ["none"]
difficulty = "medium"
total_time_minutes = 45

[recipe.standard]
serving_size = "2 skewers with accompaniments (approximately 350g)"
servings_per_recipe = 4
prep_time_minutes = 30
cook_time_minutes = 15

[recipe.standard.ingredients]
items = [
    "600g ground lamb (20% fat preferred)",
    "100g lamb tail fat (kuyruk yağı) or regular lamb fat, finely chopped",
    "1 large onion, finely grated and moisture squeezed out",
    "4 cloves garlic, minced",
    "2 tbsp red pepper paste (biber salçası)",
    "1 tbsp dried red chili flakes (pul biber)",
    "1 tsp sweet paprika",
    "1 tsp cumin",
    "1 tsp black pepper",
    "1/2 tsp allspice",
    "Salt to taste",
    "Serving: 4 flatbreads (lavash or pide)",
    "Serving: grilled tomatoes and green peppers, sumac onions, fresh parsley"
]

[recipe.standard.instructions]
steps = [
    "Combine ground lamb, lamb fat, squeezed grated onion, garlic, red pepper paste, chili flakes, paprika, cumin, black pepper, allspice, and salt. Mix by hand very thoroughly for 5-7 minutes until the mixture is cohesive and slightly sticky. This hand-mixing develops the myosin proteins that hold the kebab on the skewer.",
    "Divide into 8 portions (about 90g each). Roll each into a sausage shape. Thread onto flat metal skewers, pressing and molding the meat along the length of the skewer into a flat elongated shape, about 15cm long.",
    "Refrigerate 30 minutes to firm up (optional but helps shape hold).",
    "Prepare charcoal grill or gas grill to very high heat (500°F/260°C). Grill kebabs 6-8 minutes, turning regularly, until charred on the outside and cooked through.",
    "Simultaneously grill whole tomatoes and green peppers on the grill.",
    "Make sumac onions: thinly slice onion, toss with sumac, salt, and fresh parsley.",
    "Serve kebabs on warm flatbread with grilled vegetables, sumac onions, fresh parsley, and a squeeze of lemon."
]

[recipe.standard.macros]
calories = 480
protein_g = 32
carbs_g = 24
fat_g = 28
fiber_g = 3
sugar_g = 4
sodium_mg = 580
