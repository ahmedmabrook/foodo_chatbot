[metadata]
doc_id = "turkish_imam_bayildi"
cuisine = "Turkish"
dish_name = "İmam Bayıldı"
alternate_names = ["Imam Bayildi", "Stuffed Braised Eggplant", "The Imam Fainted"]
category = "main_course"
tags = ["vegan", "vegetarian", "gluten_free", "traditional", "comfort_food"]
allergens = ["none"]
difficulty = "medium"
total_time_minutes = 90

[recipe.standard]
serving_size = "1 stuffed eggplant half (approximately 350g)"
servings_per_recipe = 4
prep_time_minutes = 20
cook_time_minutes = 70

[recipe.standard.ingredients]
items = [
    "4 medium eggplants",
    "3 large onions, thinly sliced",
    "6 cloves garlic, thinly sliced",
    "4 large tomatoes, diced (or 400g canned)",
    "1 green bell pepper, diced",
    "1/2 cup extra-virgin olive oil",
    "1 tsp sugar",
    "1 tsp cumin",
    "1/2 tsp cinnamon",
    "Salt and black pepper to taste",
    "Fresh parsley for garnish",
    "Lemon juice for serving"
]

[recipe.standard.instructions]
steps = [
    "Salt eggplants all over and let sit 20 minutes. Pat dry.",
    "Heat 3 tbsp olive oil in a large pan over medium-high heat (375°F/190°C). Fry eggplants, turning, until golden on all sides, about 8-10 minutes. The eggplant should be partially cooked.",
    "Make filling: in the same pan, heat 2 tbsp olive oil. Slowly cook sliced onions until very soft and golden, 15-20 minutes. Add garlic and bell pepper. Cook 5 minutes. Add tomatoes, cumin, cinnamon, sugar, salt, and pepper. Cook until thick, about 10 minutes.",
    "Slit each eggplant lengthwise down the center (do not cut all the way through). Gently open like a pocket.",
    "Stuff each eggplant generously with the onion-tomato filling.",
    "Place stuffed eggplants in a deep baking dish. Pour remaining olive oil and 1/2 cup water around them.",
    "Cover tightly and bake at 350°F (175°C) for 30-35 minutes until very tender and flavors melded.",
    "Serve at room temperature with a squeeze of lemon and fresh parsley. Imam Bayıldı improves as it rests — best the next day."
]

[recipe.standard.macros]
calories = 280
