doc_id = "turkish_menemen"
cuisine = "Turkish"
dish_name = "Menemen"
alternate_names = ["Turkish Scrambled Eggs", "Turkish Shakshuka", "Menemen Breakfast"]
category = "breakfast"
tags = ["vegetarian", "gluten_free", "quick_meal", "high_protein", "traditional", "street_food"]
allergens = ["eggs"]
difficulty = "easy"
total_time_minutes = 20

[recipe.standard]
serving_size = "1 pan portion (approximately 300g)"
servings_per_recipe = 2
prep_time_minutes = 5
cook_time_minutes = 15

[recipe.standard.ingredients]
items = [
    "4 large eggs",
    "3 medium tomatoes, diced (or 400g canned diced tomatoes, drained)",
    "2 green Turkish peppers (carliston or banana peppers), diced",
    "1 small onion, finely diced (optional — purists debate this)",
    "2 tbsp olive oil",
    "1 tsp sweet paprika",
    "1/2 tsp dried red chili flakes (pul biber)",
    "Salt and black pepper to taste",
    "Fresh parsley for garnish",
    "Crusty bread or simit for serving"
]

[recipe.standard.instructions]
steps = [
    "Heat olive oil in a wide, shallow pan over medium heat. Add the diced onion (if using) and cook until soft, about 4 minutes.",
    "Add diced green peppers. Cook 3-4 minutes until softened.",
    "Add diced fresh tomatoes, paprika, and chili flakes. Cook over medium heat, stirring occasionally, for 5-6 minutes until the tomatoes break down into a thick, saucy base. Season with salt and pepper.",
    "Create small wells in the tomato mixture. Crack eggs directly into the pan (or beat lightly first for a more scrambled result — both are authentic).",
    "Cook over low-medium heat, gently folding the eggs into the tomato mixture as they set. Remove from heat while eggs are still slightly soft — they continue cooking in the residual heat.",
    "Garnish with fresh parsley and a pinch of chili flakes. Serve immediately directly from the pan with crusty bread for dipping."
]

