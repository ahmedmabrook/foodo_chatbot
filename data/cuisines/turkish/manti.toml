[recipe.standard.ingredients]
items = [
    "Dough: 2 cups all-purpose flour, 1 egg, 1/2 tsp salt, 6 tbsp water",
    "Filling: 200g ground beef or lamb",
    "Filling: 1 small onion, grated",
    "Filling: 1/4 tsp black pepper, 1/4 tsp cumin, salt",
    "Yogurt sauce: 2 cups full-fat Greek yogurt, 3 cloves garlic, salt",
    "Butter sauce: 4 tbsp butter",
    "Butter sauce: 2 tbsp dried mint",
    "Butter sauce: 1 tsp red pepper flakes",
    "Butter sauce: 1 tsp sweet paprika",
    "Sumac for garnish"
]

[recipe.standard.instructions]
steps = [
    "Make dough: knead flour, egg, salt, and water into a stiff, smooth dough. Cover and rest 30 minutes.",
    "Make filling: combine ground meat with grated onion, black pepper, cumin, and salt. Mix well.",
    "Roll dough very thin (2mm). Cut into 3cm squares.",
    "Place a tiny amount of filling (about 1/4 tsp) in the center of each square. Fold up the corners to meet at the top, pinching all edges tightly to seal.",
    "Arrange on a lightly floured surface. Traditional mantı are very small — the challenge and art of the dish.",
    "Make garlic yogurt sauce: mix yogurt with minced garlic and salt.",
    "Boil mantı in salted water for 10-12 minutes until they float and the dough is cooked through.",
    "Make butter sauce: melt butter in a small pan. Add red pepper flakes and paprika. Watch carefully — do not burn.",
    "Plate mantı. Pour garlic yogurt sauce over. Drizzle hot paprika butter over the yogurt. Sprinkle with dried mint and sumac."
]

