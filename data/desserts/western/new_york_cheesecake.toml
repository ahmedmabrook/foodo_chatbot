[metadata]
doc_id = "western_new_york_cheesecake"
cuisine = "Western Dessert"
dish_name = "New York Cheesecake"
alternate_names = ["NY-Style Cheesecake", "Classic American Cheesecake", "Cream Cheese Cake"]
category = "dessert"
tags = ["cheesecake", "American", "baked", "cream cheese", "classic", "party dessert"]
allergens = ["gluten", "dairy", "eggs"]
difficulty = "medium"
total_time_minutes = 420

[recipe.standard]
serving_size = "1 slice (approximately 140g)"
servings_per_recipe = 12
prep_time_minutes = 30
cook_time_minutes = 90

[recipe.standard.ingredients]
items = [
    "For the crust: 200g (2 cups) graham cracker crumbs",
    "For the crust: 50g (1/4 cup) granulated sugar",
    "For the crust: 115g (1/2 cup) unsalted butter, melted",
    "For the filling: 900g (four 8-oz blocks) full-fat cream cheese, room temperature",
    "For the filling: 300g (1 1/2 cups) granulated sugar",
    "For the filling: 240g (1 cup) full-fat sour cream, room temperature",
    "For the filling: 1 tsp pure vanilla extract",
    "For the filling: 1 tbsp fresh lemon juice",
    "For the filling: 1/2 tsp fine sea salt",
    "For the filling: 4 large eggs, room temperature",
    "For the filling: 2 large egg yolks, room temperature"
]

[recipe.standard.instructions]
steps = [
    "Preheat oven to 350°F (175°C). Wrap the outside of a 9-inch (23cm) springform pan tightly with two layers of heavy-duty aluminum foil to prevent water from seeping in during the water bath.",
    "Combine graham cracker crumbs, sugar, and melted butter in a bowl and mix until the mixture resembles wet sand. Press firmly and evenly into the bottom of the prepared pan. Bake the crust at 350°F (175°C) for 10 minutes, then remove and let cool. Reduce oven temperature to 325°F (160°C).",
    "Beat the room-temperature cream cheese in a stand mixer on medium speed until completely smooth and free of lumps, about 3 minutes. Scrape down the sides and bottom of the bowl thoroughly.",
    "Add the sugar and beat on medium speed for 2 minutes. Add the sour cream, vanilla extract, lemon juice, and salt; beat until just combined.",
    "Add the eggs and egg yolks one at a time, beating on low speed after each addition until just incorporated. Do not overbeat — overmixing incorporates air, which causes cracking.",
    "Pour the filling over the cooled crust. Place the foil-wrapped springform pan in a large roasting pan. Fill the roasting pan with enough hot water to come 1 inch (2.5cm) up the sides of the springform pan.",
    "Bake at 325°F (160°C) for 85–95 minutes, until the edges are set and puffed and the center 2 inches (5cm) jiggle gently like firm Jell-O when the pan is nudged.",
    "Turn off the oven, crack the door open 1 inch, and let the cheesecake cool inside the oven for 1 hour. This gradual cooling prevents cracking.",
    "Remove from the water bath, remove foil, and cool completely on a wire rack to room temperature, about 2 hours. Refrigerate uncovered for at least 4 hours, preferably overnight, before slicing and serving."
]

[recipe.standard.macros]
calories = 480
protein_g = 8
carbs_g = 40
fat_g = 32
fiber_g = 0
sugar_g = 32
sodium_mg = 340

[recipe.healthy_variant]
variant_name = "Greek Yogurt Cheesecake"
variant_type = "low_calorie"
description = "A lighter baked cheesecake using reduced-fat cream cheese blended with thick Greek yogurt, an oat-and-almond crust, and honey as the primary sweetener, delivering the same creamy texture with significantly fewer calories."
serving_size = "1 slice (approximately 130g)"
servings_per_recipe = 12
prep_time_minutes = 30
cook_time_minutes = 70

[recipe.healthy_variant.ingredients]
items = [
    "For the crust: 120g (1 1/4 cups) rolled oats, blended to a coarse flour",
    "For the crust: 50g (1/2 cup) almond flour",
    "For the crust: 3 tablespoons honey",
    "For the crust: 3 tablespoons coconut oil, melted",
    "For the crust: 1/4 tsp cinnamon",
    "For the filling: 450g (two 8-oz blocks) reduced-fat cream cheese, room temperature",
    "For the filling: 480g (2 cups) full-fat plain Greek yogurt, room temperature",
    "For the filling: 100g (5 tbsp) honey",
    "For the filling: 1 tsp pure vanilla extract",
    "For the filling: 1 tbsp fresh lemon juice",
    "For the filling: 1/4 tsp fine sea salt",
    "For the filling: 3 large eggs, room temperature"
]

[recipe.healthy_variant.instructions]
steps = [
    "Preheat oven to 325°F (160°C). Wrap a 9-inch springform pan with foil. Blend rolled oats into a coarse flour in a food processor.",
    "Combine oat flour, almond flour, honey, melted coconut oil, and cinnamon; mix until combined. Press firmly into the bottom of the springform pan. Bake for 10 minutes, then cool.",
    "Beat reduced-fat cream cheese until smooth. Add Greek yogurt and beat until fully incorporated and lump-free.",
    "Add honey, vanilla extract, lemon juice, and salt; beat on low until combined.",
    "Add eggs one at a time, beating on low speed after each until just incorporated. Do not overmix.",
    "Pour filling over cooled crust. Place pan in a roasting pan with 1 inch of hot water.",
    "Bake at 325°F (160°C) for 65–75 minutes until edges are set and center jiggles gently. Cool in oven with door cracked for 1 hour.",
    "Cool to room temperature, then refrigerate for at least 4 hours before slicing."
]

