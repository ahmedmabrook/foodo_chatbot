[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "Name-brand full-fat cream cheese (4 blocks)", substitute = "Store-brand or generic full-fat cream cheese", saving_percent = 40, reason = "Generic cream cheese has identical fat content and behaves identically in baked cheesecake" },
    { original = "Graham crackers for homemade crumbs", substitute = "Digestive biscuits or vanilla wafer cookies", saving_percent = 25, reason = "Both produce a firm, sweet crust with the same texture after baking; digestive biscuits are often cheaper per gram" },
    { original = "Full-fat sour cream", substitute = "Plain whole-milk yogurt, well-stirred", saving_percent = 30, reason = "Whole-milk yogurt has a similar fat percentage and tangy profile; the texture difference is imperceptible in the baked filling" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "9-inch springform pan", substitute = "9-inch round cake pan lined with parchment, chilled and sliced in the pan", reason = "A standard cake pan works if you do not need to unmold the whole cake; serve slices directly from the pan" },
    { original = "Stand mixer", substitute = "Hand electric mixer or vigorous hand whisking", reason = "A hand mixer achieves the same lump-free result; ensure cream cheese is fully at room temperature first to ease mixing" },
    { original = "Large roasting pan for water bath", substitute = "Two nested oven-safe pans or baking the cheesecake on a rack above a pan of water on the shelf below", reason = "Steam from a lower pan creates enough humidity to prevent major cracking without a full submersion water bath" }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "Graham cracker crumbs (pre-packaged)", substitute = "Any plain sweet biscuit or cracker crushed in a zip-lock bag with a rolling pin", reason = "Any crisp, lightly sweet biscuit produces a workable crumb crust when combined with butter" },
    { original = "Heavy-duty aluminum foil for water bath", substitute = "Two layers of regular foil pressed tightly together and crimped up the sides", reason = "Double-layering standard foil provides adequate waterproofing for the duration of the bake" },
    { original = "Fine-mesh strainer for smooth filling", substitute = "Blending the filling briefly in a blender at low speed to remove lumps", reason = "A blender achieves lump-free filling quickly, though it must be used on low speed to avoid incorporating air" },
    { original = "Springform pan release mechanism", substitute = "Running a thin, sharp knife dipped in hot water around the entire edge before releasing", reason = "A warmed knife cleanly releases the cheesecake from the pan wall without tearing the edge" },
    { original = "Instant-read thermometer to check doneness", substitute = "Jiggle test: gently shake the pan — a 2-inch wobbling center with firm edges indicates doneness", reason = "The visual jiggle test is the traditional method used before thermometers and works reliably for cheesecake" },
    { original = "Offset spatula for smoothing top", substitute = "Butter knife dipped in warm water and dragged across the surface", reason = "A warm butter knife smooths the top filling just as effectively as an offset spatula" }
]
