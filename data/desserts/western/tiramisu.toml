[recipe.standard]
serving_size = "1 portion (approximately 180g)"
servings_per_recipe = 8
prep_time_minutes = 30
cook_time_minutes = 0

[recipe.standard.ingredients]
items = [
    "500g mascarpone cheese",
    "4 large eggs, separated",
    "100g caster sugar",
    "300ml strong espresso or very strong coffee, cooled",
    "3 tbsp dark rum or Marsala wine (optional)",
    "200g ladyfinger biscuits (savoiardi)",
    "Unsweetened cocoa powder for dusting",
    "50g dark chocolate, finely grated (optional)"
]

[recipe.standard.instructions]
steps = [
    "Beat egg yolks and sugar together with an electric mixer until pale, thick, and the mixture falls in ribbons, about 3-4 minutes.",
    "Add mascarpone to the egg yolk mixture and fold gently until smooth and creamy.",
    "In a clean bowl, beat egg whites to stiff peaks. Gently fold into the mascarpone mixture in two additions, keeping as much air as possible.",
    "Combine cooled espresso and rum/Marsala in a shallow bowl. Quickly dip each ladyfinger (1-2 seconds per side — do not soak) in the coffee mixture.",
    "Arrange a layer of dipped ladyfingers in the base of a 9×13-inch (23×33cm) dish or individual glasses.",
    "Spread half the mascarpone cream over the ladyfingers. Add a second layer of dipped ladyfingers. Top with remaining cream.",
    "Dust generously with unsweetened cocoa powder. Cover and refrigerate for at least 4 hours (overnight is best). Dust with more cocoa and grated chocolate before serving."
]

