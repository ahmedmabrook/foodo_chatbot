[recipe.standard]
serving_size = "1 slice (approximately 90g)"
servings_per_recipe = 10
prep_time_minutes = 15
cook_time_minutes = 60

[recipe.standard.ingredients]
items = [
    "3 very ripe bananas (about 300g mashed)",
    "240g all-purpose flour",
    "1 tsp baking soda",
    "1/2 tsp salt",
    "1 tsp cinnamon",
    "115g unsalted butter, melted",
    "150g granulated sugar",
    "2 large eggs",
    "1 tsp vanilla extract",
    "60ml sour cream or plain yogurt",
    "100g chocolate chips or chopped walnuts (optional)"
]

[recipe.standard.instructions]
steps = [
    "Preheat oven to 350°F (175°C). Grease a 9×5-inch (23×13cm) loaf pan.",
    "Mash bananas thoroughly in a large bowl until almost smooth.",
    "Whisk in melted butter, sugar, eggs, vanilla, and sour cream until combined.",
    "Add flour, baking soda, salt, and cinnamon. Fold until just combined — lumps are fine. Do not overmix.",
    "Fold in chocolate chips or walnuts if using.",
    "Pour into prepared pan. Bake at 350°F (175°C) for 55-65 minutes until a toothpick inserted in the center comes out clean. If browning too quickly, tent with foil after 40 minutes.",
    "Cool in pan 10 minutes, then turn out onto a wire rack. Slice when completely cool for best texture."
]

