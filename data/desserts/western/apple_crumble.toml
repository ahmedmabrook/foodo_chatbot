[recipe.standard.ingredients]
items = [
    "Apple filling: 1kg (about 6) Bramley or Granny Smith apples, peeled, cored, sliced",
    "Apple filling: 3 tbsp caster sugar",
    "Apple filling: 1 tsp cinnamon, 1/4 tsp nutmeg",
    "Apple filling: 1 tbsp lemon juice",
    "Crumble topping: 200g plain flour",
    "Crumble topping: 100g cold butter, cubed",
    "Crumble topping: 100g demerara sugar",
    "Crumble topping: 50g rolled oats",
    "Crumble topping: 1/2 tsp cinnamon",
    "Serving: vanilla ice cream or custard"
]

[recipe.standard.instructions]
steps = [
    "Preheat oven to 375°F (190°C). Grease a 9×9-inch (23×23cm) baking dish.",
    "Prepare filling: toss sliced apples with caster sugar, cinnamon, nutmeg, and lemon juice. Spread evenly in the baking dish.",
    "Make crumble: place flour and cold cubed butter in a bowl. Rub butter into flour with fingertips until mixture resembles coarse breadcrumbs. Stir in demerara sugar, oats, and cinnamon.",
    "Spread crumble topping evenly over apples. Press down slightly — do not pack tightly.",
    "Bake at 375°F (190°C) for 35-40 minutes until the topping is golden brown and the apple juices are bubbling at the edges.",
    "Rest 5 minutes before serving warm with vanilla ice cream or custard."
]

