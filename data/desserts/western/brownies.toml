[metadata]
doc_id = "western_brownies"
cuisine = "American"
dish_name = "Brownies"
alternate_names = ["Chocolate Brownies", "Fudgy Brownies", "Classic Brownies"]
category = "dessert"
tags = ["american", "chocolate", "comfort_food", "contains_gluten", "contains_dairy", "contains_eggs", "vegetarian"]
allergens = ["gluten", "dairy", "eggs"]
difficulty = "easy"
total_time_minutes = 50

[recipe.standard]
serving_size = "1 brownie (approximately 70g)"
servings_per_recipe = 16
prep_time_minutes = 15
cook_time_minutes = 35

[recipe.standard.ingredients]
items = [
    "200g dark chocolate (70% cocoa), chopped",
    "200g unsalted butter",
    "300g granulated sugar",
    "4 large eggs",
    "1 tsp pure vanilla extract",
    "120g all-purpose flour",
    "40g cocoa powder",
    "1/2 tsp salt",
    "100g dark chocolate chips or chunks (optional mix-in)",
    "100g chopped walnuts (optional)"
]

[recipe.standard.instructions]
steps = [
    "Preheat oven to 350°F (175°C). Line a 9×13-inch (23×33cm) baking pan with parchment paper. Butter the parchment.",
    "Melt chocolate and butter together in a heatproof bowl over a pot of simmering water (double boiler), stirring until smooth. Remove from heat and let cool slightly.",
    "Whisk sugar into the chocolate-butter mixture. Add eggs one at a time, whisking vigorously after each addition. Add vanilla.",
    "Sift in flour, cocoa powder, and salt. Fold until just combined — do not overmix. Fold in chocolate chips and walnuts if using.",
    "Pour batter into prepared pan and spread evenly.",
    "Bake at 350°F (175°C) for 25-30 minutes until a toothpick inserted 2 inches from the edge comes out with moist crumbs (not raw batter). The center should still appear slightly underdone — it will firm up as it cools.",
    "Cool completely in the pan before cutting into 16 squares. For cleaner cuts, refrigerate for 1 hour first."
]

[recipe.standard.macros]
calories = 320
