[recipe.standard.ingredients]
items = [
    "280g all-purpose flour",
    "30g cocoa powder",
    "1 tsp baking soda",
    "1 tsp baking powder",
    "1/2 tsp salt",
    "240ml buttermilk",
    "2 tbsp red food coloring (liquid) or 1 tsp red gel coloring",
    "1 tsp white wine vinegar",
    "1 tsp vanilla extract",
    "230g unsalted butter, softened",
    "300g caster sugar",
    "2 large eggs",
    "Cream cheese frosting: 450g full-fat cream cheese, softened",
    "Frosting: 120g unsalted butter, softened",
    "Frosting: 400g powdered sugar",
    "Frosting: 1 tsp vanilla extract"
]

[recipe.standard.instructions]
steps = [
    "Preheat oven to 350°F (175°C). Grease and line two 9-inch round cake pans.",
    "Whisk together flour, cocoa, baking soda, baking powder, and salt. Set aside.",
    "Combine buttermilk, food coloring, vinegar, and vanilla in a jug.",
    "Beat softened butter and sugar until light and fluffy, about 4 minutes. Add eggs one at a time, beating well after each.",
    "Alternately fold in the flour mixture and buttermilk mixture in 3 additions, beginning and ending with flour. Mix until just combined.",
    "Divide batter evenly between prepared pans. Bake at 350°F (175°C) for 30-35 minutes until a toothpick comes out clean. Cool completely.",
    "Make frosting: beat cream cheese and butter until smooth. Add powdered sugar and vanilla. Beat until light and fluffy.",
    "Level cake layers. Place first layer on a plate, spread with frosting, top with second layer, frost the top and sides. Garnish with red velvet crumbs."
]

