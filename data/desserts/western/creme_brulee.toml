[metadata]
doc_id = "western_creme_brulee"
cuisine = "French"
dish_name = "Crème Brûlée"
alternate_names = ["Creme Brulee", "Burnt Cream", "Trinity Cream"]
category = "dessert"
tags = ["french", "classic", "elegant", "contains_dairy", "contains_eggs", "gluten_free"]
allergens = ["dairy", "eggs"]
difficulty = "medium"
total_time_minutes = 90

[recipe.standard]
serving_size = "1 ramekin (approximately 150g)"
servings_per_recipe = 6
prep_time_minutes = 20
cook_time_minutes = 70

[recipe.standard.ingredients]
items = [
    "500ml heavy cream (double cream)",
    "6 large egg yolks",
    "100g caster sugar (plus extra for brûlée topping)",
    "1 vanilla bean (or 2 tsp pure vanilla extract)",
    "Pinch of salt"
]

[recipe.standard.instructions]
steps = [
    "Preheat oven to 325°F (160°C). Place 6 ramekins in a deep roasting pan.",
    "Split vanilla bean and scrape seeds. Heat cream with vanilla bean and seeds in a saucepan over medium heat until just steaming (180°F/82°C) — do not boil. Remove from heat and let steep 10 minutes. Remove vanilla pod.",
    "Whisk egg yolks with caster sugar and salt until pale and slightly thickened, about 2 minutes. Do not create foam.",
    "Slowly pour hot cream into the egg mixture while whisking constantly to temper. Strain through a fine mesh sieve.",
    "Pour custard into ramekins. Pour hot water into the roasting pan to reach halfway up the sides of the ramekins (bain-marie).",
    "Bake at 325°F (160°C) for 35-40 minutes until custard is just set with a slight jiggle in the center. Remove from water bath. Cool to room temperature, then refrigerate at least 2 hours.",
    "To serve: sprinkle 1.5 tsp caster sugar evenly over each custard. Use a kitchen torch to caramelize until deep amber and crackling. Serve immediately."
]

