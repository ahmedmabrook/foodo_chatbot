dish_name = "Macarons"
alternate_names = ["French Macarons", "Macarons de Paris", "French Almond Cookies"]
category = "dessert"
tags = ["french", "elegant", "gluten_free", "contains_dairy", "contains_eggs", "contains_nuts"]
allergens = ["dairy", "eggs", "nuts"]
difficulty = "hard"
total_time_minutes = 90

[recipe.standard]
serving_size = "2 macarons (approximately 40g)"
servings_per_recipe = 20
prep_time_minutes = 60
cook_time_minutes = 30

[recipe.standard.ingredients]
items = [
    "200g almond flour (fine, blanched)",
    "200g powdered sugar",
    "150g egg whites, aged at room temperature (about 4-5 eggs)",
    "150g caster sugar",
    "Food coloring gel (optional)",
    "Vanilla buttercream filling: 100g unsalted butter, softened",
    "Buttercream filling: 200g powdered sugar",
    "Buttercream filling: 1-2 tbsp heavy cream",
    "Buttercream filling: 1 tsp vanilla extract"
]

[recipe.standard.instructions]
steps = [
    "Sift almond flour and powdered sugar together twice. Discard any large pieces. This is the 'tant pour tant'.",
    "Make Italian meringue: place caster sugar in a saucepan with just enough water to moisten (about 50ml). Heat without stirring to 244°F (118°C). While syrup heats, begin beating egg whites to soft peaks. Stream hot syrup into egg whites while beating at high speed. Continue beating until stiff, glossy, and the bowl is cool.",
    "Add food coloring to meringue if using.",
    "Fold almond mixture into meringue using macaronage technique: fold with a spatula, pressing batter against the bowl, until it flows like lava and falls in a continuous ribbon from the spatula. Do not over-mix or under-mix.",
    "Pipe 3cm rounds onto parchment-lined baking sheets. Tap sheets firmly on the counter to pop air bubbles. Let rest 30-60 minutes until a dry skin forms (shells should not stick to your finger).",
    "Bake at 300°F (150°C) for 12-14 minutes. Shells should develop feet and slide cleanly off parchment when cool.",
    "Make buttercream: beat softened butter, powdered sugar, cream, and vanilla until smooth. Pipe onto half the shells, sandwich with remaining shells.",
    "Mature in the refrigerator for 24 hours before serving for best texture."
]

