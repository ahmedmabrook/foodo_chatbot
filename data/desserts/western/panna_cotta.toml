[metadata]
doc_id = "western_panna_cotta"
cuisine = "Italian"
dish_name = "Panna Cotta"
alternate_names = ["Vanilla Panna Cotta", "Italian Cream Pudding", "Cooked Cream"]
category = "dessert"
tags = ["italian", "classic", "no_bake", "gluten_free", "contains_dairy", "elegant"]
allergens = ["dairy"]
difficulty = "easy"
total_time_minutes = 20

[recipe.standard]
serving_size = "1 ramekin (approximately 160g)"
servings_per_recipe = 6
prep_time_minutes = 10
cook_time_minutes = 10

[recipe.standard.ingredients]
items = [
    "600ml heavy cream",
    "100ml whole milk",
    "70g caster sugar",
    "1 vanilla bean (or 2 tsp vanilla extract)",
    "2.5 tsp (7g) powdered gelatin (or 3 gelatin sheets)",
    "Pinch of salt",
    "Berry coulis for serving: 200g mixed berries, 2 tbsp sugar, 1 tbsp lemon juice"
]

[recipe.standard.instructions]
steps = [
    "Bloom gelatin: sprinkle powdered gelatin over 3 tbsp cold water in a small bowl. Let stand 5 minutes until absorbed and spongy.",
    "In a saucepan, combine cream, milk, sugar, and vanilla (scraped seeds + pod). Heat over medium heat, stirring, until sugar dissolves and mixture just begins to steam (170°F/77°C) — do not boil.",
    "Remove from heat. Remove vanilla pod. Add bloomed gelatin and stir until completely dissolved.",
    "Strain through a fine sieve into a pourable jug. Skim any foam.",
    "Lightly oil 6 ramekins or dariole moulds with a flavourless oil. Pour in the cream mixture.",
    "Allow to cool to room temperature, then refrigerate 4-6 hours until fully set.",
    "Make berry coulis: simmer berries, sugar, and lemon juice for 5 minutes. Blend and strain.",
    "To serve: run a knife around the edge and invert onto plates, or serve directly in ramekins. Spoon berry coulis over the top."
]

