[recipe.standard]
serving_size = "1 slice with ice cream (approximately 180g)"
servings_per_recipe = 6
prep_time_minutes = 10
cook_time_minutes = 20

[recipe.standard.ingredients]
items = [
    "170g unsalted butter",
    "150g granulated sugar",
    "100g brown sugar, packed",
    "2 large eggs",
    "1 tsp pure vanilla extract",
    "280g all-purpose flour",
    "1 tsp baking soda",
    "1/2 tsp salt",
    "300g dark chocolate chips",
    "Serving: 2-3 scoops vanilla ice cream"
]

[recipe.standard.instructions]
steps = [
    "Preheat oven to 350°F (175°C). Generously butter a 10-inch cast-iron skillet.",
    "Melt butter in the skillet over medium heat until lightly browned (it will smell nutty). Remove from heat and cool slightly.",
    "Whisk both sugars into the browned butter in the skillet. Add eggs and vanilla, whisking until combined.",
    "Add flour, baking soda, and salt. Stir until just combined.",
    "Fold in chocolate chips.",
    "Press dough evenly into the buttered skillet.",
    "Bake at 350°F (175°C) for 18-22 minutes until the edges are golden but the center still looks underdone and slightly glossy. The center will set as it cools.",
    "Serve immediately from the skillet topped with scoops of vanilla ice cream. Eat while warm."
]

