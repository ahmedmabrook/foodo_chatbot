[recipe.standard.ingredients]
items = [
    "Sweet pastry (pâte sucrée): 180g all-purpose flour",
    "Pastry: 90g cold butter, cubed",
    "Pastry: 60g powdered sugar",
    "Pastry: 1 large egg yolk",
    "Pastry: 1-2 tbsp cold water",
    "Pastry: pinch of salt",
    "Lemon curd filling: 3 large lemons, zest and juice (about 120ml juice)",
    "Filling: 150g caster sugar",
    "Filling: 3 large eggs + 2 egg yolks",
    "Filling: 120g cold butter, cubed",
    "Serving: powdered sugar and lemon slices for garnish"
]

[recipe.standard.instructions]
steps = [
    "Make pastry: pulse flour, butter, and sugar in a food processor until breadcrumbs. Add egg yolk and water. Pulse until dough just comes together. Press into a disc, wrap, and refrigerate 30 minutes.",
    "Roll pastry thin (3mm) and line a 9-inch (23cm) tart tin. Trim edges. Refrigerate 15 minutes.",
    "Blind bake: prick base, line with parchment and baking beans. Bake at 375°F (190°C) for 15 minutes. Remove beans and bake 8-10 more minutes until golden. Cool.",
    "Make lemon curd: whisk lemon zest, juice, sugar, eggs, and yolks in a heavy saucepan. Cook over medium-low heat (165°F/74°C), stirring constantly, until thickened, about 8-10 minutes.",
    "Remove from heat. Strain through a fine sieve. Add cold butter cubes and whisk until incorporated and glossy.",
    "Pour warm curd into the cooled tart shell. Refrigerate 2 hours until set.",
    "Dust with powdered sugar and garnish with lemon slices before serving."
]

