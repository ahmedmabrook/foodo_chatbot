[recipe.standard]
serving_size = "3 profiteroles with sauce (approximately 160g)"
servings_per_recipe = 6
prep_time_minutes = 30
cook_time_minutes = 45

[recipe.standard.ingredients]
items = [
    "Choux pastry: 120ml whole milk",
    "Choux pastry: 120ml water",
    "Choux pastry: 100g unsalted butter",
    "Choux pastry: 1/2 tsp salt, 1 tsp sugar",
    "Choux pastry: 140g all-purpose flour",
    "Choux pastry: 4 large eggs",
    "Cream filling: 400ml heavy cream",
    "Cream filling: 2 tbsp powdered sugar",
    "Cream filling: 1 tsp vanilla extract",
    "Chocolate sauce: 150g dark chocolate",
    "Chocolate sauce: 150ml heavy cream",
    "Chocolate sauce: 1 tbsp butter"
]

[recipe.standard.instructions]
steps = [
    "Make choux pastry: bring milk, water, butter, salt, and sugar to a full boil in a saucepan. Remove from heat. Add flour all at once and beat vigorously until dough pulls from sides and forms a smooth ball.",
    "Return to low heat and cook, stirring, for 1-2 minutes to dry out the dough.",
    "Transfer to a bowl. Beat in eggs one at a time — the dough should be smooth, glossy, and fall from a spoon in a V-shape. It will look curdled at first; keep beating.",
    "Pipe or spoon 18 mounds (about 3cm diameter) onto parchment-lined baking sheets, spaced apart.",
    "Bake at 400°F (200°C) for 20-25 minutes until deeply golden and hollow-sounding when tapped. Do not open the oven for the first 15 minutes. Cool completely.",
    "Make filling: whip cold heavy cream with powdered sugar and vanilla to firm peaks.",
    "Make sauce: heat cream and butter until simmering. Pour over chopped chocolate. Stir until smooth.",
    "Fill profiteroles: pierce the base of each puff and pipe cream in, or slice and fill. Stack on a platter, pour warm chocolate sauce over. Serve immediately."
]

