[recipe.standard]
serving_size = "6 churros with chocolate sauce (approximately 180g)"
servings_per_recipe = 4
prep_time_minutes = 10
cook_time_minutes = 25

[recipe.standard.ingredients]
items = [
    "Churro dough: 240ml water",
    "Churro dough: 1 tbsp granulated sugar",
    "Churro dough: 1/2 tsp salt",
    "Churro dough: 2 tbsp vegetable oil",
    "Churro dough: 150g all-purpose flour",
    "For frying: vegetable oil (about 1 liter)",
    "Coating: 50g granulated sugar + 1 tsp cinnamon, mixed",
    "Chocolate dipping sauce: 100g dark chocolate, chopped",
    "Chocolate sauce: 120ml heavy cream",
    "Chocolate sauce: 1 tbsp butter"
]

[recipe.standard.instructions]
steps = [
    "Make dough: bring water, sugar, salt, and oil to a boil in a saucepan. Remove from heat. Add flour all at once and stir vigorously until a smooth, non-sticky dough forms and pulls from the sides of the pan.",
    "Let dough cool 5 minutes. Transfer to a piping bag fitted with a large star tip.",
    "Heat oil in a deep pot to 350°F (175°C). Carefully pipe 15cm strips of dough directly into the hot oil, using scissors to cut. Fry in batches, turning occasionally, for 3-4 minutes until deep golden brown.",
    "Drain on paper towels. Immediately toss in cinnamon sugar.",
    "Make chocolate sauce: heat cream until simmering. Pour over chopped chocolate and butter. Stir until smooth.",
    "Serve churros hot with chocolate dipping sauce."
]

