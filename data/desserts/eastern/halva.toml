[recipe.standard]
serving_size = "1 slice/portion (approximately 100g)"
servings_per_recipe = 8
prep_time_minutes = 5
cook_time_minutes = 25

[recipe.standard.ingredients]
items = [
    "Semolina halva: 250g coarse semolina",
    "Semolina halva: 200g unsalted butter",
    "Semolina halva: 600ml whole milk",
    "Semolina halva: 150g caster sugar",
    "Semolina halva: 50g pine nuts or blanched almonds",
    "Semolina halva: 1 tsp ground cinnamon",
    "Semolina halva: 1/4 tsp ground cardamom",
    "Optional: 40g raisins"
]

[recipe.standard.instructions]
steps = [
    "Heat milk and sugar together in a saucepan until sugar dissolves and milk is hot (not boiling). Keep warm.",
    "Melt butter in a heavy-bottomed pot over medium heat. Add pine nuts and toast until golden, stirring, about 2 minutes.",
    "Add semolina to the butter-nut mixture. Cook, stirring constantly, over medium heat for 8-10 minutes until the semolina turns a deep golden-amber color and smells nutty. This toasting step is essential for flavor.",
    "Remove from heat briefly. Carefully pour in hot milk mixture (it will sputter). Stir vigorously.",
    "Return to low heat. Stir constantly for 3-5 minutes until the mixture comes together as a thick, non-sticky mass and pulls from the sides of the pan.",
    "Add raisins if using. Stir to combine.",
    "Press into a greased dish or mould and smooth the top. Dust with cinnamon.",
    "Let rest 10 minutes. Unmould or cut into diamonds/squares. Serve warm or at room temperature."
]

