[metadata]
doc_id = "eastern_riz_bi_haleeb"
cuisine = "Lebanese"
dish_name = "Riz bi Haleeb"
alternate_names = ["Roz bel Laban", "Middle Eastern Rice Pudding", "Lebanese Rice Pudding", "Riz au Lait"]
category = "dessert"
tags = ["lebanese", "arab", "gluten_free", "vegetarian", "comfort_food", "contains_dairy"]
allergens = ["dairy"]
difficulty = "easy"
total_time_minutes = 40

[recipe.standard]
serving_size = "1 bowl (approximately 250g)"
servings_per_recipe = 6
prep_time_minutes = 5
cook_time_minutes = 35

[recipe.standard.ingredients]
items = [
    "150g short-grain rice (arborio or Egyptian rice), rinsed",
    "1 liter whole milk",
    "200ml heavy cream",
    "100g caster sugar",
    "1 tbsp cornstarch, dissolved in 2 tbsp cold water",
    "1 tsp rose water",
    "1 tsp orange blossom water",
    "Ground pistachios and cinnamon for garnish"
]

[recipe.standard.instructions]
steps = [
    "Combine rinsed rice and milk in a heavy saucepan. Bring to a gentle boil over medium heat, stirring frequently.",
    "Reduce heat to low. Simmer uncovered, stirring regularly, for 20-25 minutes until rice is fully soft and the mixture has thickened considerably.",
    "Add heavy cream and sugar. Stir until sugar dissolves. Cook a further 5 minutes.",
    "Add dissolved cornstarch. Stir continuously for 2-3 minutes until the pudding thickens to a creamy, pourable consistency.",
    "Remove from heat. Stir in rose water and orange blossom water.",
    "Pour into individual serving bowls or one large dish. Allow to cool to room temperature, then refrigerate.",
    "Serve cold or at room temperature. Garnish with ground pistachios and a dusting of cinnamon."
]

