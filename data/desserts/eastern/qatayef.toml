[recipe.standard.ingredients]
items = [
    "Batter: 250g all-purpose flour",
    "Batter: 1 tsp instant yeast",
    "Batter: 1 tbsp sugar",
    "Batter: 1/2 tsp baking powder",
    "Batter: 350ml warm water",
    "Cheese filling: 300g akkawi cheese or mozzarella, shredded",
    "Cheese filling: 2 tbsp caster sugar",
    "Cheese filling: 1 tbsp rose water",
    "Nut filling (alternative): 150g chopped walnuts, 2 tbsp sugar, 1 tsp cinnamon",
    "For frying: vegetable oil",
    "Sugar syrup: 250g sugar, 200ml water, 1 tbsp lemon juice, 1 tsp orange blossom water"
]

[recipe.standard.instructions]
steps = [
    "Make batter: whisk flour, yeast, sugar, baking powder, and warm water until smooth. Rest 20-30 minutes until bubbles form on the surface.",
    "Make sugar syrup: combine sugar and water, bring to boil, simmer 5 minutes. Add lemon juice and orange blossom water. Cool.",
    "Cook pancakes: heat a non-stick pan over medium heat (no oil). Pour about 3 tbsp batter per pancake. Cook only one side until surface bubbles form and the top is set (no longer wet). Pancakes should be cooked on one side only. Stack with bubbly side up.",
    "Prepare cheese filling: mix shredded akkawi with sugar and rose water. Or prepare walnut filling: mix walnuts with sugar and cinnamon.",
    "Fill and fold: place filling on the uncooked (bubbly) side. Fold in half and pinch edges firmly to seal into a half-moon shape.",
    "Fry sealed qatayef in hot oil (350°F/175°C) for 2-3 minutes per side until golden.",
    "Remove and immediately dip in cool sugar syrup (or drizzle over). Serve warm."
]

