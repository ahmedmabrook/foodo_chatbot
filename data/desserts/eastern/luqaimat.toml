[recipe.standard.ingredients]
items = [
    "Batter: 250g all-purpose flour",
    "Batter: 1 tsp instant yeast",
    "Batter: 1 tsp sugar",
    "Batter: 1/2 tsp salt",
    "Batter: 1/2 tsp ground cardamom",
    "Batter: 1/4 tsp ground saffron or turmeric (for color)",
    "Batter: 300ml warm water",
    "For frying: vegetable oil",
    "Toppings: 100g honey or date syrup (dibs)",
    "Toppings: 1 tsp sesame seeds, ground cinnamon"
]

[recipe.standard.instructions]
steps = [
    "Make batter: combine flour, yeast, sugar, salt, cardamom, and saffron/turmeric in a bowl. Add warm water and mix until smooth. The batter should be thick but pourable — similar to thick pancake batter. Cover and rest 30-40 minutes until bubbly.",
    "Heat oil in a deep pot to 350°F (175°C).",
    "Using wet hands or two wet spoons, scoop small balls (about 1.5 tablespoon each) and drop into hot oil. Fry in batches without overcrowding for 3-4 minutes, turning, until deep golden brown all over.",
    "Remove with a slotted spoon and drain briefly on paper towels.",
    "Pile onto a serving plate. Drizzle generously with warm honey or date syrup. Sprinkle with sesame seeds and cinnamon.",
    "Serve immediately — luqaimat are best eaten hot and crispy."
]

