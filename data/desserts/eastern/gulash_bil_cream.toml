[recipe.standard.ingredients]
items = [
    "500g phyllo pastry sheets",
    "200g unsalted butter, melted",
    "Cream filling: 500ml whole milk",
    "Cream filling: 200ml heavy cream",
    "Cream filling: 60g cornstarch",
    "Cream filling: 80g caster sugar",
    "Cream filling: 1 tsp vanilla extract",
    "Cream filling: 1 tsp rose water",
    "Sugar syrup: 300g sugar, 250ml water, 1 tbsp lemon juice, 1 tsp rose water",
    "Crushed pistachios for garnish"
]

[recipe.standard.instructions]
steps = [
    "Make cream filling: whisk milk, cream, cornstarch, and sugar in a saucepan until smooth. Cook over medium heat, stirring constantly, until very thick (holds shape when pressed). Add vanilla and rose water. Cool completely — the filling must be cold before assembly.",
    "Make syrup: boil sugar and water 5 minutes. Add lemon juice and rose water. Cool.",
    "Preheat oven to 375°F (190°C). Grease a 9×13-inch baking dish.",
    "Layer half the phyllo sheets in the baking dish, brushing each sheet with melted butter.",
    "Spread the cold cream filling evenly over the layered phyllo.",
    "Layer remaining phyllo sheets on top, brushing each with melted butter. Score the top into squares before baking.",
    "Bake at 375°F (190°C) for 35-40 minutes until deeply golden.",
    "Immediately pour cooled syrup over the hot pastry. Allow to absorb 20 minutes before cutting along scored lines.",
    "Sprinkle with crushed pistachios. Serve at room temperature."
]

