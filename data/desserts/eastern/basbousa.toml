[recipe.standard]
serving_size = "1 square (approximately 80g)"
servings_per_recipe = 16
prep_time_minutes = 15
cook_time_minutes = 35

[recipe.standard.ingredients]
items = [
    "300g coarse semolina",
    "100g fine semolina",
    "150g caster sugar",
    "200g plain yogurt",
    "120ml vegetable oil",
    "1 tsp baking powder",
    "1 tsp vanilla extract",
    "Blanched almonds for topping",
    "Simple syrup: 250ml water, 200g caster sugar, 1 tbsp lemon juice, 1 tsp rose water or orange blossom water"
]

[recipe.standard.instructions]
steps = [
    "Preheat oven to 350°F (175°C). Grease a 9×13-inch (23×33cm) baking pan with oil.",
    "Mix together coarse and fine semolina, sugar, and baking powder in a large bowl.",
    "Add yogurt, vegetable oil, and vanilla. Mix well until combined. The batter should be thick and spreadable.",
    "Spread evenly into the prepared pan, smoothing the top. Let rest 10 minutes (this allows semolina to absorb moisture).",
    "Score the top into diamonds or squares with a knife. Press an almond into the center of each piece.",
    "Bake at 350°F (175°C) for 30-35 minutes until deep golden brown and a skewer comes out clean.",
    "While basbousa bakes, make syrup: combine water and sugar in a saucepan. Bring to a boil, stirring. Simmer 5 minutes. Add lemon juice and rose water.",
    "Immediately pour hot syrup over hot basbousa as it comes from the oven. Allow to absorb completely (15-20 minutes) before cutting."
]

