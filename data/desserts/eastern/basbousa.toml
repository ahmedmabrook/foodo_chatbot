cuisine = "Egyptian"
dish_name = "Basbousa"
alternate_names = ["Basboosa", "Semolina Cake", "Revani", "Hareesa"]
category = "dessert"
tags = ["egyptian", "arab", "classic", "vegan_optional", "contains_gluten", "contains_dairy", "vegetarian"]
allergens = ["gluten", "dairy"]
difficulty = "easy"
