[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "Pistachios", substitute = "Sunflower seeds or pumpkin seeds", saving_percent = 65, reason = "Pistachios are one of the most expensive nuts; seeds provide crunch and healthy fats at a fraction of the cost." },
    { original = "Almonds", substitute = "Peanuts (roasted, unsalted)", saving_percent = 50, reason = "Peanuts are among the most affordable nuts and add a pleasant richness to the filling." },
    { original = "Orange blossom water", substitute = "A strip of orange zest simmered in the syrup", saving_percent = 60, reason = "Orange zest steeped in the syrup gives the same citrus-floral aroma without buying specialty water." }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "Phyllo dough (fresh)", substitute = "Frozen phyllo dough, thawed overnight in fridge", reason = "Fresh phyllo is rarely available outside specialty stores; frozen phyllo is carried in most supermarkets and works identically." },
    { original = "Mixed raw nuts", substitute = "Pre-mixed roasted nut blend (unsalted)", reason = "Pre-mixed roasted nut blends are available in most grocery stores and eliminate the need to buy three separate types." },
    { original = "Rose water", substitute = "A small strip of dried rose petals steeped in warm syrup", reason = "Dried rose petals are often easier to find than bottled rose water in general supermarkets." }
]

[recipe.substitutions.home_essentials]
items = [
    { original = "Pastry brush", substitute = "A clean paintbrush or silicone brush", reason = "Any clean, unused paintbrush works perfectly to butter phyllo sheets evenly." },
    { original = "Sharp knife for cutting", substitute = "Pizza wheel/roller cutter", reason = "A pizza roller cuts through phyllo layers cleanly without tearing and is a common kitchen tool." },
    { original = "9x13 inch baking pan", substitute = "Any oven-safe dish of similar volume", reason = "Two smaller pans or a round casserole dish of equivalent volume work equally well; adjust cut patterns accordingly." },
    { original = "Nut grinder or food processor", substitute = "Zip-lock bag and rolling pin", reason = "Sealing nuts in a bag and crushing with a rolling pin produces the same coarse chop without any special equipment." },
    { original = "Clarified butter", substitute = "Unsalted regular butter, slowly melted and skimmed", reason = "Skimming the white milk solids from the surface of melted regular butter produces a functional clarified butter substitute." },
    { original = "Large flat serving tray", substitute = "The baking pan itself lined with parchment", reason = "Baklava is traditionally served directly from the pan; lining with parchment before baking allows clean removal." }
]
