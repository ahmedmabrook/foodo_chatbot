alternate_names = ["Znood El Sit", "Lady's Arms", "Fried Cream Rolls", "Lebanese Cream Cigars"]
category = "dessert"
tags = ["lebanese", "levantine", "fried", "festive", "ramadan", "contains_gluten", "contains_dairy", "vegetarian"]
allergens = ["gluten", "dairy"]
difficulty = "medium"
total_time_minutes = 50

[recipe.standard]
serving_size = "3 rolls with syrup (approximately 180g)"
servings_per_recipe = 6
prep_time_minutes = 25
cook_time_minutes = 25

[recipe.standard.ingredients]
items = [
    "12 sheets spring roll pastry or thin yufka",
    "Ashta (clotted cream) filling: 250ml heavy cream",
    "Ashta filling: 1 tbsp cornstarch",
    "Ashta filling: 1 tbsp sugar",
    "Ashta filling: 1 tsp rose water",
    "Ashta filling: 1 tsp orange blossom water",
    "For frying: vegetable oil",
    "Sugar syrup: 250g sugar, 200ml water, 1 tbsp lemon juice, 1 tsp rose water",
    "Crushed pistachios for garnish"
]

[recipe.standard.instructions]
steps = [
    "Make ashta filling: whisk cream, cornstarch, and sugar in a saucepan. Cook over medium heat, stirring constantly, until very thick (holds its shape). Remove from heat, stir in rose water and orange blossom water. Cool completely in the refrigerator.",
    "Make syrup: combine sugar and water, boil 5 minutes. Add lemon juice and rose water. Keep warm.",
    "Cut spring roll pastry sheets into 12×12cm squares.",
    "Place 1 tbsp of cold ashta along one edge of a pastry square. Roll tightly into a cigar shape, tucking the ends in. Seal with a paste of flour and water.",
    "Heat oil to 350°F (175°C). Fry rolls in batches for 2-3 minutes until golden and crisp.",
    "Immediately dip hot rolls in warm sugar syrup for 1-2 minutes.",
    "Arrange on a platter, sprinkle with crushed pistachios. Serve warm."
]

