[recipe.standard.ingredients]
items = [
    "Choux dough: 240ml water",
    "Choux dough: 100g unsalted butter or vegetable oil",
    "Choux dough: 1 tsp sugar",
    "Choux dough: 1/2 tsp salt",
    "Choux dough: 150g all-purpose flour",
    "Choux dough: 3-4 large eggs",
    "For frying: vegetable oil",
    "Sugar syrup: 300g sugar, 250ml water, 1 tbsp lemon juice, 1 tsp vanilla, 1 tsp rose water"
]

[recipe.standard.instructions]
steps = [
    "Make choux dough: bring water, butter, sugar, and salt to a full boil. Remove from heat. Add flour all at once and stir vigorously until a smooth ball forms and pulls from the sides.",
    "Beat in eggs one at a time until dough is smooth, glossy, and drops from the spoon in a V-shape.",
    "Make syrup: combine sugar and water, boil 8-10 minutes until lightly syrupy. Add lemon juice, vanilla, and rose water. Keep warm.",
    "Heat oil to 350°F (175°C). Transfer dough to a piping bag with a large star tip.",
    "Pipe 8-10cm lengths into the hot oil, cutting with scissors. Fry in batches, turning occasionally, for 4-5 minutes until deep golden brown and cooked through.",
    "Immediately submerge in warm sugar syrup for 2-3 minutes.",
    "Serve warm."
]

