[recipe.standard]
serving_size = "2 maamoul cookies (approximately 70g)"
servings_per_recipe = 20
prep_time_minutes = 60
cook_time_minutes = 30

[recipe.standard.ingredients]
items = [
    "Dough: 300g fine semolina",
    "Dough: 150g all-purpose flour",
    "Dough: 200g unsalted butter, melted",
    "Dough: 3 tbsp caster sugar",
    "Dough: 1 tsp mahlab or 1/2 tsp ground anise",
    "Dough: 6-8 tbsp warm water or rose water",
    "Date filling: 400g Medjool dates, pitted",
    "Date filling: 1 tbsp butter",
    "Date filling: 1 tsp cinnamon, 1/2 tsp ground fennel",
    "Walnut filling (alternative): 200g walnuts, finely chopped, 2 tbsp sugar, 1 tsp cinnamon, 1 tbsp rose water",
    "Powdered sugar for dusting"
]

[recipe.standard.instructions]
steps = [
    "Mix semolina, flour, melted butter, sugar, and mahlab. Add warm water or rose water a tablespoon at a time until the dough just comes together and is pliable but not sticky. Do not knead vigorously. Rest 30 minutes.",
    "Make date filling: warm dates in a pan with butter, cinnamon, and fennel. Mash into a smooth paste. Cool.",
    "Preheat oven to 350°F (175°C).",
    "Divide dough into 40 equal balls (about 20g each). Flatten each ball in your palm. Place a small amount of filling (walnut or date) in the center.",
    "Wrap dough around filling, pinching closed. Shape by hand or press into a maamoul mould to create the traditional decorative pattern.",
    "Place on baking sheets. Bake at 350°F (175°C) for 20-25 minutes until barely turning golden at the edges — maamoul should stay pale.",
    "Cool completely. Dust generously with powdered sugar. Store in an airtight container — maamoul improves with 1-2 days of resting."
]

