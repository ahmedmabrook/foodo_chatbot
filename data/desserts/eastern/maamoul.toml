[recipe.substitutions]

[recipe.substitutions.cheaper]
items = [
    { original = "Medjool dates", substitute = "any dried dates, soaked in hot water 10 minutes to soften", saving_percent = 50, reason = "Common dried dates produce identical filling when softened; Medjool dates are simply larger and moister" },
    { original = "mahlab (cherry pit spice)", substitute = "1/4 tsp anise seed or skip (mahlab is optional)", saving_percent = 100, reason = "Mahlab adds a subtle floral-cherry note; anise or simply omitting it produces fine maamoul" },
    { original = "maamoul wooden mould", substitute = "hand-shape into balls or flatten with a fork pattern", saving_percent = 100, reason = "Hand-shaping with fork patterns produces authentic-tasting maamoul without specialty moulds" }
]

[recipe.substitutions.more_accessible]
items = [
    { original = "mahlab spice", substitute = "ground anise or ground fennel (similar aromatic quality)", reason = "Ground anise or fennel provides the warm, slightly sweet spice note mahlab adds to the dough" },
