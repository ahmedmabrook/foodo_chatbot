total_time_minutes = 40

[recipe.standard]
serving_size = "3 rolls with syrup (approximately 180g)"
servings_per_recipe = 6
prep_time_minutes = 20
cook_time_minutes = 20

[recipe.standard.ingredients]
items = [
    "300g akkawi or mozzarella cheese, shredded",
    "100g fine semolina",
    "150ml water",
    "50g sugar",
    "Ashta (cream) filling: 200ml heavy cream",
    "Ashta filling: 1 tbsp sugar",
    "Ashta filling: 1 tbsp cornstarch",
    "Ashta filling: 1 tsp rose water",
    "Sugar syrup: 200g sugar, 150ml water, 1 tbsp lemon juice, 1 tsp orange blossom water",
    "Ground pistachios for garnish"
]

[recipe.standard.instructions]
steps = [
    "Make syrup: combine sugar and water in a saucepan, boil 5 minutes. Add lemon juice and orange blossom water. Cool.",
    "Make ashta filling: whisk cream, sugar, and cornstarch in a small saucepan. Cook over medium heat, stirring constantly, until very thick (5-7 minutes). Add rose water. Cool and refrigerate.",
    "Soak shredded akkawi in cold water for 30 minutes to remove excess salt. Drain and squeeze dry.",
    "In a heavy saucepan, combine water and sugar. Add drained cheese and semolina. Cook over medium heat, stirring constantly, until the dough comes together into a smooth, stretchy, non-sticky mass (about 8-10 minutes).",
    "Roll the hot cheese dough thin (about 3mm) on a work surface lightly greased with oil. Work quickly as the dough firms as it cools.",
    "Cut into rectangles (about 8×10cm). Place a small spoon of ashta in the center. Roll into cylinders.",
    "Arrange on a platter. Drizzle with sugar syrup. Sprinkle ground pistachios. Serve at room temperature or slightly chilled."
]

