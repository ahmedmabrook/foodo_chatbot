[recipe.standard]
serving_size = "1 portion (approximately 220g)"
servings_per_recipe = 6
prep_time_minutes = 15
cook_time_minutes = 30

[recipe.standard.ingredients]
items = [
    "300g puff pastry sheets (or day-old croissants, torn)",
    "1 liter whole milk",
    "200ml heavy cream",
    "150g caster sugar",
    "1 tsp vanilla extract",
    "50g raisins",
    "50g shredded coconut",
    "50g chopped mixed nuts (almonds, pistachios, walnuts)",
    "1 tsp ground cinnamon",
    "Topping: 100ml heavy cream (for drizzling before baking)"
]

[recipe.standard.instructions]
steps = [
    "If using puff pastry: bake at 400°F (200°C) for 15 minutes until golden and puffed. Cool and tear into rough pieces.",
    "Preheat oven to 375°F (190°C).",
    "Heat milk, heavy cream, sugar, and vanilla in a saucepan until sugar dissolves and mixture is hot (170°F/77°C). Do not boil.",
    "Arrange torn pastry pieces loosely in a large baking dish (9×13 inch). Scatter raisins, coconut, nuts, and cinnamon over and between the pastry.",
    "Pour hot milk mixture evenly over everything. Press pastry down gently to absorb.",
    "Drizzle remaining 100ml cream over the top.",
    "Bake at 375°F (190°C) for 20-25 minutes until the top is golden and bubbling.",
    "Serve immediately while hot and creamy — umm ali does not keep well and should be eaten fresh from the oven."
]

