[recipe.standard.ingredients]
items = [
    "Dough: 250g all-purpose flour",
    "Dough: 1 tsp instant yeast",
    "Dough: 1 tsp sugar",
    "Dough: 1/2 tsp salt",
    "Dough: 250ml warm water",
    "For frying: vegetable oil (about 1 liter)",
    "Sugar syrup: 300g sugar",
    "Sugar syrup: 200ml water",
    "Sugar syrup: 1 tbsp lemon juice",
    "Sugar syrup: 1 tsp cinnamon",
    "Topping: ground cinnamon and sesame seeds"
]

[recipe.standard.instructions]
steps = [
    "Make dough: whisk flour, yeast, sugar, and salt. Add warm water and mix into a smooth, sticky batter (thicker than pancake batter, thinner than bread dough). Cover and rest 30-40 minutes until doubled and bubbly.",
    "Make syrup: combine sugar, water, and lemon juice in a saucepan. Bring to a boil, stirring. Simmer 8-10 minutes until slightly thickened. Add cinnamon. Keep warm.",
    "Heat oil in a deep pot to 350°F (175°C).",
    "Using two wet spoons or a small ice cream scoop, drop teaspoon-sized balls of dough into the hot oil. Do not overcrowd. Fry 3-4 minutes, turning, until golden brown all over.",
    "Remove with a slotted spoon and immediately submerge in warm sugar syrup for 1-2 minutes.",
    "Transfer to a serving plate. Sprinkle with cinnamon and sesame seeds. Serve immediately while warm and crispy."
]

